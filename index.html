act').value.trim(),\n          phone=g('b-phone').value.trim(),date=g('b-date').value.trim(),\n          material=g('b-material').value.trim(),ts=g('b-time-start').value,te=g('b-time-end').value;\n    ['b-company','b-contact','b-phone','b-material','b-date','b-time-start','b-time-end'].forEach(id=>{const el=g(id);if(el)el.style.borderColor='';});\n    const errs=[];\n    if(!company){errs.push('Compagnie / sous-traitant');g('b-company').style.borderColor='var(--red)';}\n    if(!contact){errs.push('Nom du contact');g('b-contact').style.borderColor='var(--red)';}\n    if(!phone){errs.push('Numéro de téléphone');g('b-phone').style.borderColor='var(--red)';}\n    if(!date){errs.push('Date de livraison');g('b-date').style.borderColor='var(--red)';}\n    if(!material){errs.push('Matériel / description');g('b-material').style.borderColor='var(--red)';}\n    if(!selZone)errs.push('Zone de dépôt — sélectionnez une zone');\n    if(!ts)errs.push('Heure de début');\n    if(!te)errs.push('Heure de fin');\n    const errEl=g('err-box');\n    if(errs.length){errEl.innerHTML='<strong>Champs manquants :<\u002Fstrong><br>'+errs.map(e=>'• '+e).join('<br>');errEl.style.display='block';errEl.scrollIntoView({behavior:'smooth',block:'nearest'});return;}\n    errEl.style.display='none';\n    // 2-week advance booking limit for non-admins\n    if(!isAdmin()){\n      const maxDate = new Date(); maxDate.setDate(maxDate.getDate()+14);\n      if(new Date(date+'T12:00:00') > maxDate){\n        errEl.innerHTML='Les réservations sont limitées à 2 semaines à l’avance.';\n        errEl.style.display='block'; return;\n      }\n    }\n    const ov=deliveries.find(d=>d.zone===selZone&&d.date===date&&d.status==='approved'&&overlap(ts,te,d.timeStart||d.time,d.timeEnd||d.time));\n    if(ov){alert('Chevauche une livraison approuvée pour '+ov.company+' ('+(ov.timeStart||ov.time)+'–'+(ov.timeEnd||ov.time)+').');return;}\n    const d={id:'D'+Date.now(),company,contact,phone,material,date,time:ts,timeStart:ts,timeEnd:te,\n      truck:g('b-truck').value||'',notes:g('b-notes').value.trim(),zone:selZone,status:(projectInfo.autoApprove!==false?'approved':'pending'),submittedAt:new Date().toISOString(),\n      userId: firebaseUser ? firebaseUser.uid : null,\n      userEmail: firebaseUser ? firebaseUser.email : null};\n    deliveries.unshift(d);\n    notif('Nouvelle livraison : '+company+' — '+fmtDate(date)+' '+ts+'–'+te+' ('+(zones.find(z=>z.id===selZone)||{name:'?'}).name+')','pending');\n    saveDelivery(d);\n    if(d.status === 'approved') sendDeliveryEmail(d, 'approved');\n    activeBookingTemplate = null;\n    const tplBanner=g('booking-template-banner'); if(tplBanner) tplBanner.style.display='none';\n    g('booking-content').style.display='none';\n    const msgEl=g('booking-success-msg');\n    if(msgEl) msgEl.textContent = d.status==='approved'\n      ? 'Votre livraison a été approuvée automatiquement.'\n      : 'Votre demande a été soumise et sera examinée par l’équipe de chantier.';\n    g('booking-success').style.display='block';\n    renderWeekCalendar();updateBadges();\n  }catch(err){alert('Erreur : '+err.message);console.error(err);}\n}\nfunction resetBooking(){\n  clearBookingTemplate(true);\n  g('booking-content').style.display='';g('booking-success').style.display='none';g('err-box').style.display='none';\n  ['b-company','b-contact','b-phone','b-material','b-notes'].forEach(id=>{const el=g(id);if(el){el.value='';el.style.borderColor='';}});\n  g('b-truck').value='';g('b-date').value=today();\n  g('b-time-start').value='';g('b-time-end').innerHTML='<option value=\"\">Sélectionner fin…<\u002Foption>';\n  selZone=zones.length>0?zones[0].id:null;renderZonePicker();renderStartTimes();\n}\n\n// ── DETAIL MODAL ──────────────────────────────────────────\nfunction openDetail(id,e){\n  if(Date.now() < _suppressCalendarClickUntil){ if(e) e.stopPropagation(); return; }\n  if(e)e.stopPropagation();\n  const d=deliveries.find(x=>x.id===id);if(!d)return;\n  const z=zones.find(z=>z.id===d.zone),sc=d.status==='approved'?'var(--green)':d.status==='pending'?'var(--amber)':'var(--red)';\n  const tdisp=(d.timeStart||d.time)+(d.timeEnd?' – '+d.timeEnd:'');\n  const adm=isAdmin();\n  const ownEditable = !!firebaseUser && d.userId===firebaseUser.uid && d.status!=='cancelled';\n  const statusLabel = d.status==='approved' ? 'APPROUVÉE' : d.status==='pending' ? 'EN ATTENTE' : d.status==='cancelled' ? 'ANNULÉE' : 'REJETÉE';\n  let html=`\n    <div class=\"sheet-head\">\n      <div class=\"sheet-grab\"><\u002Fdiv>\n      <div class=\"sheet-head-row\">\n        <h2>${escapeHtml(d.company)}<\u002Fh2>\n        <button class=\"btn btn-gh sheet-x\" onclick=\"closeModal('modal-detail')\">✕<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"df-grid\">\n      ${[['Contact',escapeHtml(d.contact)],['Téléphone',escapeHtml(d.phone)||'—'],['Matériel',escapeHtml(d.material)],['Camion',escapeHtml(d.truck)||'—'],\n         ['Zone',escapeHtml(z?.name||d.zone)],['Date',fmtDate(d.date)],['Heure',tdisp],\n         ['Statut',`<span style=\"color:${sc};font-weight:700;\">${statusLabel}<\u002Fspan>`]\n        ].map(([k,v])=>`<div><div class=\"df-lbl\">${k}<\u002Fdiv><div class=\"df-val\">${v}<\u002Fdiv><\u002Fdiv>`).join('')}\n    <\u002Fdiv>`;\n  if(d.notes)html+=`<div style=\"background:var(--bg3);border-radius:var(--r);padding:9px 12px;font-size:12px;color:var(--text2);margin-bottom:14px;\"><strong>Notes :<\u002Fstrong> ${escapeHtml(d.notes)}<\u002Fdiv>`;\n  if(d.rejectionNote&&d.status!=='cancelled')html+=`<div style=\"background:var(--red-dim);border-radius:var(--r);padding:9px 12px;font-size:12px;color:var(--red);margin-bottom:14px;\">Motif : ${escapeHtml(d.rejectionNote)}<\u002Fdiv>`;\n  if(adm){\n    if(d.status==='pending'){\n      html+=`<div style=\"display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;\">\n        <input id=\"det-note\" placeholder=\"Motif de rejet (optionnel)…\" style=\"flex:1;min-width:140px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:8px 11px;color:var(--text);font-size:12px;outline:none;\">\n        <button class=\"btn btn-gr\" onclick=\"decideDetail('${d.id}','approved')\">Approuver<\u002Fbutton>\n        <button class=\"btn btn-re\" onclick=\"decideDetail('${d.id}','rejected')\">Rejeter<\u002Fbutton>\n        <button class=\"btn btn-bl\" onclick=\"closeModal('modal-detail');openEdit('${d.id}')\">Modifier<\u002Fbutton>\n      <\u002Fdiv>`;\n    } else if(d.status==='approved'){\n      html+=`<div style=\"display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;\">\n        <button class=\"btn btn-bl\" onclick=\"closeModal('modal-detail');openEdit('${d.id}')\">Modifier la livraison<\u002Fbutton>\n        <button class=\"btn\" style=\"background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber-bd);\" onclick=\"cancelDel('${d.id}',true)\">Annuler la livraison<\u002Fbutton>\n      <\u002Fdiv>`;\n    }\n  } else if(ownEditable) {\n    html+=`<div style=\"display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;\">\n      <button class=\"btn btn-bl\" onclick=\"closeModal('modal-detail');userEditDelivery('${d.id}')\">Modifier cette livraison<\u002Fbutton>\n    <\u002Fdiv>`;\n  }\n  html+=`<div class=\"m-actions\"><button class=\"btn btn-gh\" onclick=\"closeModal('modal-detail')\">Fermer<\u002Fbutton><\u002Fdiv>`;\n  g('modal-detail-body').innerHTML=html;\n  g('modal-detail').classList.add('open');\n}\nfunction decideDetail(id,status){\n  const d=deliveries.find(x=>x.id===id);if(!d)return;\n  if(status==='approved'){\n    const cf=deliveries.find(x=>x.id!==id&&x.zone===d.zone&&x.date===d.date&&x.status==='approved'&&overlap(d.timeStart||d.time,d.timeEnd||d.time,x.timeStart||x.time,x.timeEnd||x.time));\n    if(cf){alert('Pris par '+cf.company+'.');return;}\n  }\n  const note=g('det-note')?.value.trim()||'';\n  d.status=status;if(note)d.rejectionNote=note;\n  notif(d.company+' — '+statusFr(status)+' ('+fmtDate(d.date)+' '+(d.timeStart||d.time)+').',status);\n  saveDelivery(d);\n  if(status === 'approved') sendDeliveryEmail(d, 'approved');\n  closeModal('modal-detail');renderAdmin();renderWeekCalendar();\n}\n\n// ── ADMIN ─────────────────────────────────────────────────\nfunction renderAdminKPIs(){\n  const activeNoticeCount = siteNotices.filter(n=>isSiteNoticeActive(n)).length;\n  const activeBlackouts = blackoutDates.filter(b=> today()>=b.dateFrom && today()<=b.dateTo).length;\n  const pendingCount = deliveries.filter(d=>d.status==='pending').length;\n  const cards = [\n    {label:'Livraisons en attente', value: pendingCount, sub:'À traiter rapidement', cls:'c-amber'},\n    {label:'Avis actifs', value: activeNoticeCount, sub:'Affichés sur le tableau de bord', cls:'c-blue'},\n    {label:'Blocages actifs', value: activeBlackouts, sub:'Zones temporairement indisponibles', cls:'c-red'},\n    {label:'Zones', value: zones.length, sub:'Zones configurées sur le plan', cls:'c-green'},\n    {label:'Sous-traitants', value: subcontractors.length, sub:'Compagnies enregistrées', cls:''}\n  ];\n  const el = g('admin-kpis'); if(!el) return;\n  el.innerHTML = cards.map(c=>`<div class=\"admin-kpi\"><div class=\"admin-kpi-lbl\">${c.label}<\u002Fdiv><div class=\"admin-kpi-val ${c.cls||''}\">${c.value}<\u002Fdiv><div class=\"admin-kpi-sub\">${c.sub}<\u002Fdiv><\u002Fdiv>`).join('');\n}\nfunction expandAdminPanels(){ document.querySelectorAll('#view-admin .panel').forEach(p=>p.classList.remove('collapsed')); }\nfunction collapseAdminPanels(){ document.querySelectorAll('#view-admin .panel').forEach(p=>p.classList.add('collapsed')); g('panel-all-del')?.classList.remove('collapsed'); }\n\n// ── APPROVALS VIEW ─────────────────────────────────\nfunction renderApprovals(){\n  updateBadges();\n  const pend=deliveries\n    .filter(d=>d.status==='pending')\n    .sort((a,b)=>(a.date||'').localeCompare(b.date||'')||(a.timeStart||a.time||'').localeCompare(b.timeStart||b.time||''));\n  const cnt=g('approvals-count-lg'); if(cnt) cnt.textContent=pend.length;\n  const sub=g('approvals-sub');\n  if(sub) sub.textContent=pend.length\n    ? pend.length+' demande'+(pend.length>1?'s':'')+' en attente de décision'\n    : 'Aucune demande en attente';\n  const wrap=g('approvals-groups'); if(!wrap) return;\n  if(!pend.length){\n    wrap.innerHTML='<div class=\"appr-empty\">'\n      +'<div class=\"appr-empty-icon\">✓<\u002Fdiv>'\n      +'<div style=\"font-size:15px;font-weight:600;color:var(--text);\">Tout est traité<\u002Fdiv>'\n      +'<div style=\"font-size:13px;color:var(--text3);margin-top:4px;\">Les nouvelles demandes de livraison apparaîtront ici.<\u002Fdiv>'\n      +'<\u002Fdiv>';\n    return;\n  }\n  const byDate={};\n  pend.forEach(d=>{(byDate[d.date]=byDate[d.date]||[]).push(d);});\n  wrap.innerHTML=Object.keys(byDate).sort().map(ds=>{\n    const full=new Date(ds+'T12:00:00').toLocaleDateString('fr-CA',{weekday:'long',day:'numeric',month:'long'});\n    const label=full.charAt(0).toUpperCase()+full.slice(1);\n    const isT=ds===today();\n    return '<div class=\"appr-day\">'+label+(isT?' <span class=\"appr-today-tag\">Aujourd’hui<\u002Fspan>':'')+'<\u002Fdiv>'\n      + byDate[ds].map(d=>apprCardHTML(d)).join('');\n  }).join('');\n}\nfunction apprCardHTML(d){\n  const z=zones.find(z=>z.id===d.zone);\n  const ts=d.timeStart||d.time, teRaw=d.timeEnd||ts, te=d.timeEnd?(' – '+d.timeEnd):'';\n  const conflict=deliveries.find(x=>x.id!==d.id&&x.zone===d.zone&&x.date===d.date&&x.status==='approved'&&overlap(ts,teRaw,x.timeStart||x.time,x.timeEnd||x.time));\n  const rivals=deliveries.filter(x=>x.id!==d.id&&x.zone===d.zone&&x.date===d.date&&x.status==='pending'&&overlap(ts,teRaw,x.timeStart||x.time,x.timeEnd||x.time)).length;\n  const blackout=isZoneBlackedOut(d.zone,d.date);\n  let warns='';\n  if(conflict) warns+='<div class=\"appr-warn red\">⚠ Chevauche une livraison approuvée : '+escapeHtml(conflict.company)+' ('+(conflict.timeStart||conflict.time)+(conflict.timeEnd?' – '+conflict.timeEnd:'')+')<\u002Fdiv>';\n  if(blackout) warns+='<div class=\"appr-warn red\">⛔ Zone bloquée à cette date<\u002Fdiv>';\n  if(rivals) warns+='<div class=\"appr-warn amber\">'+rivals+' autre'+(rivals>1?'s':'')+' demande'+(rivals>1?'s':'')+' pour ce créneau — approuver celle-ci laissera les autres en attente<\u002Fdiv>';\n  const meta=[d.contact,d.phone,d.truck].filter(Boolean).map(escapeHtml).join(' · ');\n  return '<div class=\"appr-card\">'\n    +'<div class=\"appr-card-top\">'\n    +  '<div style=\"min-width:0;\">'\n    +    '<div class=\"appr-co\">'+escapeHtml(d.company)+'<\u002Fdiv>'\n    +    (meta?'<div class=\"appr-meta\">'+meta+'<\u002Fdiv>':'')\n    +  '<\u002Fdiv>'\n    +  '<div class=\"appr-badges\">'\n    +    (z?'<span class=\"badge b-zone\" style=\"background:'+z.color+'22;color:'+z.color+';border-color:'+z.color+'55;\">'+escapeHtml(z.name)+'<\u002Fspan>':'')\n    +    '<span class=\"badge b-time\">'+ts+te+'<\u002Fspan>'\n    +  '<\u002Fdiv>'\n    +'<\u002Fdiv>'\n    +(d.material?'<div class=\"appr-material\">'+escapeHtml(d.material)+'<\u002Fdiv>':'')\n    +(d.notes?'<div class=\"appr-notes\">« '+escapeHtml(d.notes)+' »<\u002Fdiv>':'')\n    +warns\n    +'<div class=\"appr-acts\">'\n    +  '<input class=\"dr-note\" id=\"note-'+d.id+'\" placeholder=\"Motif de rejet (optionnel)…\">'\n    +  '<button class=\"act act-approve\" onclick=\"decide(\\''+d.id+'\\',\\'approved\\')\">Approuver<\u002Fbutton>'\n    +  '<button class=\"act act-reject\" onclick=\"decide(\\''+d.id+'\\',\\'rejected\\')\">Rejeter<\u002Fbutton>'\n    +  '<button class=\"act act-edit\" onclick=\"openEdit(\\''+d.id+'\\')\">Modifier<\u002Fbutton>'\n    +'<\u002Fdiv>'\n    +'<\u002Fdiv>';\n}\n\nfunction renderAdmin(){\n  updateBadges();\n  renderAdminKPIs();\n  const pend=deliveries\n    .filter(d=>d.status==='pending')\n    .sort((a,b)=>(a.date||'').localeCompare(b.date||'') || (a.timeStart||a.time||'').localeCompare(b.timeStart||b.time||''));\n  const pendingEmpty = '<div class=\"empty\">Aucune demande en attente.<\u002Fdiv>';\n  if(g('ap-count')) g('ap-count').textContent=pend.length+' demande'+(pend.length!==1?'s':'');\n  if(g('approval-count')) g('approval-count').textContent=pend.length;\n  if(g('pending-list')) g('pending-list').innerHTML=pend.length?pend.map(d=>drHTML(d,true)).join(''):pendingEmpty;\n  if(g('approval-list')) g('approval-list').innerHTML=pend.length?pend.map(d=>drHTML(d,true)).join(''):pendingEmpty;\n  const cfs=getConflicts();\n  g('conflict-count').textContent=cfs.length?cfs.length+' conflit'+(cfs.length!==1?'s':''):'Aucun';\n  g('conflict-list').innerHTML=cfs.length?cfs.map(grp=>{\n    const f=grp[0],z=zones.find(z=>z.id===f.zone);\n    return `<div class=\"cg\"><div class=\"cg-hd\">⚡ ${z?.name||''} · ${fmtDate(f.date)} · ${f.timeStart||f.time} — choisissez-en une<\u002Fdiv>\n      ${grp.map(d=>`<div class=\"ci\"><div class=\"ci-info\"><strong>${escapeHtml(d.company)}<\u002Fstrong><br><span style=\"color:var(--text2);\">${escapeHtml(d.contact)}${d.truck?' · '+escapeHtml(d.truck):''}<\u002Fspan><\u002Fdiv>\n      <button class=\"ci-pick\" onclick=\"pickSlot('${d.id}')\">Approuver celle-ci<\u002Fbutton><\u002Fdiv>`).join('')}<\u002Fdiv>`;\n  }).join(''):'<div class=\"empty\">Aucun conflit.<\u002Fdiv>';\n  const nonCan=deliveries.filter(d=>d.status!=='cancelled'&&d.status!=='rejected');\n  g('all-list').innerHTML=nonCan.length?nonCan.slice(0,30).map(d=>drHTML(d,false)).join(''):'<div class=\"empty\">Aucune livraison pour le moment.<\u002Fdiv>';\n  const can=deliveries.filter(d=>d.status==='cancelled'||d.status==='rejected');\n  g('cancelled-count').textContent=can.length||'Aucune';\n  g('cancelled-list').innerHTML=can.length?can.map(d=>drHTML(d,false)).join(''):'<div class=\"empty\">Aucune livraison annulée.<\u002Fdiv>';\n  g('zone-mgr').innerHTML=zones.map(z=>`<div class=\"zm-row\">\n    <button type=\"button\" class=\"zm-current-color\" style=\"background:${z.color}\" title=\"Modifier la couleur de ${z.name}\" onclick=\"openZoneColorModal('${z.id}')\"><\u002Fbutton>\n    <div class=\"zm-main\">\n      <div class=\"zm-topline\">\n        <input class=\"zm-input\" value=\"${z.name}\" onchange=\"renameZone('${z.id}',this.value)\">\n        <button class=\"zm-del\" onclick=\"deleteZone('${z.id}')\">×<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>`).join('');\n  renderScheduleMgr();\n  renderSubList();\n  renderSiteNoticesAdmin();\n  renderImList();\n  renderBlackoutPanel();\n  g('notif-log').innerHTML=notifications.length?notifications.slice(0,15).map(n=>\n    `<div class=\"ni\"><span class=\"ni-dot\" style=\"background:${n.type==='approved'?'var(--green)':n.type==='rejected'?'var(--red)':'var(--amber)'}\"><\u002Fspan>\n    <span class=\"ni-msg\">${n.msg}<\u002Fspan><span class=\"ni-t\">${n.time}<\u002Fspan><\u002Fdiv>`).join('')\n    :'<div class=\"empty\">Aucune notification.<\u002Fdiv>';\n  syncMobAdminTab();\n}\n\nfunction drHTML(d,showPend){\n  const z=zones.find(z=>z.id===d.zone),td=(d.timeStart||d.time)+(d.timeEnd?' – '+d.timeEnd:'');\n  let acts='';\n  if(showPend&&d.status==='pending'){\n    acts=`<div class=\"dr-acts\">\n      <input class=\"dr-note\" id=\"note-${d.id}\" placeholder=\"Motif de rejet…\">\n      <button class=\"act act-approve\" onclick=\"decide('${d.id}','approved')\">Approuver<\u002Fbutton>\n      <button class=\"act act-reject\"  onclick=\"decide('${d.id}','rejected')\">Rejeter<\u002Fbutton>\n      <button class=\"act act-edit\"    onclick=\"openEdit('${d.id}')\">Modifier<\u002Fbutton>\n    <\u002Fdiv>`;\n  } else if(d.status==='approved'){\n    acts=`<div class=\"dr-acts\">\n      <button class=\"act act-edit\"   onclick=\"openEdit('${d.id}')\">Modifier<\u002Fbutton>\n      <button class=\"act act-cancel\" onclick=\"cancelDel('${d.id}')\">Annuler<\u002Fbutton>\n    <\u002Fdiv>`;\n  } else if(d.status==='cancelled'){\n    acts=`<div class=\"dr-acts\">\n      <button class=\"act act-uncancel\" onclick=\"uncancelDel('${d.id}')\">↩ Rétablir<\u002Fbutton>\n      <button class=\"act act-del\"      onclick=\"deleteDel('${d.id}')\">✕<\u002Fbutton>\n    <\u002Fdiv>`;\n  } else if(d.status==='rejected'){\n    acts=`<div class=\"dr-acts\">\n      <div style=\"font-size:11px;color:var(--red);padding:2px 0;\">${d.rejectionNote?'Raison : '+d.rejectionNote:''}<\u002Fdiv>\n      <button class=\"act act-uncancel\" onclick=\"uncancelDel('${d.id}')\">↩ Rétablir<\u002Fbutton>\n      <button class=\"act act-del\"      onclick=\"deleteDel('${d.id}')\">✕<\u002Fbutton>\n    <\u002Fdiv>`;\n  }\n  return `<div class=\"dr\">\n    <div class=\"dr-top\">\n      <div><div class=\"dr-co\">${escapeHtml(d.company)}<\u002Fdiv><div class=\"dr-meta\">${escapeHtml(d.contact)}${d.phone?' · '+escapeHtml(d.phone):''} · ${escapeHtml(d.material)}<\u002Fdiv><\u002Fdiv>\n      <span class=\"badge b-${d.status==='cancelled'?'cancelled':d.status}\">${\n        d.status==='approved'?'APPROUVÉE':\n        d.status==='pending'?'EN ATTENTE':\n        d.status==='rejected'?'REJETÉE':\n        d.status==='cancelled'?'ANNULÉE':d.status.toUpperCase()\n      }<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"dr-badges\">\n      ${z?`<span class=\"badge b-zone\" style=\"background:${z.color}22;color:${z.color};border-color:${z.color}55;\">${z.name}<\u002Fspan>`:''}\n      <span class=\"badge b-time\">${td}<\u002Fspan>\n      <span class=\"badge b-time\" style=\"font-family:inherit;\">${fmtDate(d.date)}<\u002Fspan>\n      ${d.truck?`<span class=\"badge\" style=\"background:var(--bg3);color:var(--text2);border:1px solid var(--border2);\">${escapeHtml(d.truck)}<\u002Fspan>`:''}\n    <\u002Fdiv>\n    ${acts}\n  <\u002Fdiv>`;\n}\n\nfunction decide(id,status){\n  const d=deliveries.find(x=>x.id===id);if(!d)return;\n  if(status==='approved'){\n    const cf=deliveries.find(x=>x.id!==id&&x.zone===d.zone&&x.date===d.date&&x.status==='approved'&&overlap(d.timeStart||d.time,d.timeEnd||d.time,x.timeStart||x.time,x.timeEnd||x.time));\n    if(cf){alert('Pris par '+cf.company+'.');return;}\n  }\n  const note=g('note-'+id)?.value.trim()||'';\n  d.status=status;if(note)d.rejectionNote=note;\n  notif(d.company+' — '+statusFr(status)+' ('+fmtDate(d.date)+' '+(d.timeStart||d.time)+').',status);\n  saveDelivery(d);\n  if(status === 'approved') sendDeliveryEmail(d, 'approved');\n  renderAdmin();renderWeekCalendar();\n  if(g('view-approvals')?.classList.contains('active')) renderApprovals();\n}\nfunction pickSlot(id){\n  const d=deliveries.find(x=>x.id===id);if(!d)return;\n  deliveries.filter(x=>x.zone===d.zone&&x.date===d.date&&(x.timeStart||x.time)===(d.timeStart||d.time)&&x.status==='pending'&&x.id!==id)\n    .forEach(x=>{x.status='rejected';x.rejectionNote='Un autre créneau a été sélectionné.';});\n  d.status='approved';\n  notif(d.company+' sélectionnée pour '+(zones.find(z=>z.id===d.zone)||{name:'?'}).name+' · '+(d.timeStart||d.time)+' · '+fmtDate(d.date)+'.','approved');\n  sendDeliveryEmail(d, 'approved');\n  // Save all affected deliveries\n  Promise.all(deliveries.filter(x=>x.zone===d.zone&&x.date===d.date).map(x=>saveDelivery(x)));\n  renderAdmin();renderWeekCalendar();\n}\nfunction cancelDel(id,fromModal){\n  const d=deliveries.find(x=>x.id===id);if(!d)return;\n  d.status='cancelled';d.rejectionNote='Annulée par le surintendant.';\n  notif('Annulée : '+d.company+' — '+fmtDate(d.date)+' '+(d.timeStart||d.time)+'.','rejected');\n  saveDelivery(d);\n  sendDeliveryEmail(d, 'cancelled');\n  if(fromModal)closeModal('modal-detail');renderAdmin();renderWeekCalendar();updateBadges();\n}\nfunction uncancelDel(id){\n  const d=deliveries.find(x=>x.id===id);if(!d)return;\n  const cf=deliveries.find(x=>x.id!==id&&x.zone===d.zone&&x.date===d.date&&x.status==='approved'&&overlap(d.timeStart||d.time,d.timeEnd||d.time,x.timeStart||x.time,x.timeEnd||x.time));\n  if(cf){alert('Créneau maintenant occupé par '+cf.company+'.');return;}\n  d.status='approved';delete d.rejectionNote;\n  notif('Rétablie : '+d.company+' — '+fmtDate(d.date)+' '+(d.timeStart||d.time)+'.','approved');\n  saveDelivery(d);renderAdmin();renderWeekCalendar();updateBadges();\n}\nfunction deleteDel(id){removeDelivery(id);renderAdmin();updateBadges();}\nfunction populateImIconSelect(){\n  const sel=g('im-icon'); if(!sel||sel.options.length>1) return;\n  sel.innerHTML=Object.entries(ZONE_ICONS).filter(([k])=>k!=='none')\n    .map(([k,v])=>`<option value=\"${k}\">${v.label}<\u002Foption>`).join('');\n}\nfunction renderImList(){\n  populateImIconSelect();\n  const el=g('im-list'); if(!el) return;\n  if(!iconMarkers.length){el.innerHTML='<div class=\"empty\">Aucun marqueur placé.<\u002Fdiv>';return;}\n  el.innerHTML=iconMarkers.map(m=>`<div style=\"display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);\">\n    <div style=\"width:24px;height:24px;border-radius:4px;background:${m.color||'#C9A96E'};display:flex;align-items:center;justify-content:center;flex-shrink:0;\">${zoneIconSVG(m.iconKey,14,'white')}<\u002Fdiv>\n    <span style=\"flex:1;font-size:13px;color:var(--text);\">${ZONE_ICONS[m.iconKey]?.label||m.iconKey}${m.label?' — '+m.label:''}<\u002Fspan>\n    <button onclick=\"removeIconMarker('${m.id}')\" style=\"padding:3px 9px;border-radius:var(--r);border:1px solid var(--red-bd);background:var(--red-dim);color:var(--red);font-size:11px;font-weight:700;cursor:pointer;\">✕<\u002Fbutton>\n  <\u002Fdiv>`).join('');\n}\nfunction addIconMarker(){\n  const iconKey=g('im-icon')?.value||'pin';\n  const label=(g('im-label')?.value||'').trim();\n  const color=g('im-color')?.value||'#C9A96E';\n  const m={id:'im'+Date.now(),iconKey,label,color,xPct:50,yPct:50};\n  iconMarkers.push(m);\n  saveIconMarkersConfig().catch(()=>{});\n  if(g('im-label')) g('im-label').value='';\n  renderImList();\n  renderIconMarkers();\n}\nfunction removeIconMarker(id){\n  iconMarkers=iconMarkers.filter(m=>m.id!==id);\n  saveIconMarkersConfig().catch(()=>{});\n  renderImList();\n  renderIconMarkers();\n}\n\nfunction normalizeHexColor(color){\n  if(!color) return '#4A8FD4';\n  const c = String(color).trim();\n  if(/^#[0-9a-fA-F]{6}$/.test(c)) return c.toUpperCase();\n  if(/^#[0-9a-fA-F]{3}$/.test(c)){\n    return ('#' + c.slice(1).split('').map(ch=>ch+ch).join('')).toUpperCase();\n  }\n  return '#4A8FD4';\n}\n\nfunction openZoneColorModal(id){\n  const z=zones.find(z=>z.id===id);\n  if(!z) return;\n  editingZoneColorId=id;\n  const current=normalizeHexColor(z.color);\n  const previewDot=g('zone-color-preview-dot');\n  const previewName=g('zone-color-preview-name');\n  const customInput=g('zone-color-custom-input');\n  const grid=g('zone-color-grid');\n  if(previewDot) previewDot.style.background=current;\n  if(previewName) previewName.textContent=z.name;\n  if(customInput) customInput.value=current;\n  if(grid){\n    grid.innerHTML=ZONE_COLOR_PALETTE.map(c=>`<button type=\"button\" class=\"zone-color-swatch ${normalizeHexColor(c)===current?'active':''}\" style=\"background:${c}\" title=\"${c}\" onclick=\"selectZoneColor('${c}')\"><\u002Fbutton>`).join('');\n  }\n  g('modal-zone-color').classList.add('open');\n}\n\nasync function selectZoneColor(color){\n  if(!editingZoneColorId) return;\n  await setZoneColor(editingZoneColorId,color);\n  closeModal('modal-zone-color');\n}\n\nasync function setZoneColor(id,color){\n  const z=zones.find(z=>z.id===id);\n  if(!z) return;\n  z.color=normalizeHexColor(color);\n  await saveZonesConfig();\n\n  // Re-render every area where the zone color is shown.\n  renderAdmin();\n  renderHome();\n  renderZonePicker();\n  renderZoneFilters();\n  renderWeekCalendar();\n  renderMobilePlanPanel();\n  renderBlackoutPanel();\n  updateBadges();\n}\n\nasync function renameZone(id,name){\n  const z=zones.find(z=>z.id===id);\n  if(!z) return;\n  z.name=name;\n  await saveZonesConfig();\n  renderHome();\n  renderZonePicker();\n  renderZoneFilters();\n  renderMobilePlanPanel();\n}\nasync function deleteZone(id){\n  if(!confirm('Supprimer cette zone ?')) return;\n\n  const deletedZone = zones.find(z => z.id === id);\n  zones = zones.filter(z => z.id !== id);\n\n  // Clean up UI state that may still point to the deleted zone.\n  activeZF.delete(id);\n  if(selZone === id) selZone = zones.length ? zones[0].id : null;\n\n  await saveZonesConfig();\n\n  // Optional: flag existing deliveries that still reference this removed zone.\n  if(deletedZone){\n    notifications.unshift({\n      msg: 'Zone supprimée : ' + deletedZone.name + '.',\n      type: 'rejected',\n      time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})\n    });\n    fbSaveConfig('notifications', notifications).catch(()=>{});\n  }\n\n  renderAdmin();\n  renderHome();\n  renderZonePicker();\n  renderZoneFilters();\n  renderWeekCalendar();\n  renderMobilePlanPanel();\n  updateBadges();\n}\n\n// ── EDIT DELIVERY ─────────────────────────────────────────\nfunction openEdit(id){\n  const d=deliveries.find(x=>x.id===id);if(!d)return;\n  g('ed-id').value=id;\n  g('ed-company').value=d.company||'';g('ed-contact').value=d.contact||'';g('ed-phone').value=d.phone||'';\n  g('ed-material').value=d.material||'';g('ed-date').value=d.date||'';\n  g('ed-notes').value=d.notes||'';g('ed-truck').value=d.truck||'';\n  if(d.truck && g('ed-truck').value!==d.truck){\n    const o=document.createElement('option');o.value=d.truck;o.textContent=d.truck;\n    g('ed-truck').appendChild(o);g('ed-truck').value=d.truck;\n  }\n  const ss=g('ed-start');\n  ss.innerHTML='<option value=\"\">Sélectionner…<\u002Foption>';\n  TIME_SLOTS.forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;if(t===(d.timeStart||d.time))o.selected=true;ss.appendChild(o);});\n  edStartChange();\n  setTimeout(()=>{const es=g('ed-end');for(let i=0;i<es.options.length;i++){if(es.options[i].value===d.timeEnd){es.selectedIndex=i;break;}}},20);\n  g('ed-zone-grid').innerHTML=zones.map(z=>`<button type=\"button\" class=\"zpick ${d.zone===z.id?'sel':''}\" id=\"ezp-${z.id}\"\n    onclick=\"document.querySelectorAll('#ed-zone-grid .zpick').forEach(b=>b.classList.remove('sel'));this.classList.add('sel');\">\n    <span class=\"zpick-dot\" style=\"background:${z.color}\"><\u002Fspan>${z.name}<\u002Fbutton>`).join('');\n  g('modal-edit').classList.add('open');\n}\nfunction edStartChange(){\n  const ss=g('ed-start'),es=g('ed-end');\n  es.innerHTML='<option value=\"\">Sélectionner…<\u002Foption>';\n  const si=TIME_SLOTS.indexOf(ss.value);if(si<0)return;\n  TIME_SLOTS.slice(si+1).forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;es.appendChild(o);});\n}\nfunction saveEdit(){\n  const id=g('ed-id').value,d=deliveries.find(x=>x.id===id);if(!d)return;\n  const company=g('ed-company').value.trim(),contact=g('ed-contact').value.trim(),\n        phone=g('ed-phone').value.trim(),material=g('ed-material').value.trim(),\n        date=g('ed-date').value.trim(),ts=g('ed-start').value,te=g('ed-end').value,\n        truck=g('ed-truck').value,notes=g('ed-notes').value.trim();\n  const selZ=document.querySelector('#ed-zone-grid .zpick.sel');\n  const newZone=selZ?selZ.id.replace('ezp-',''):d.zone;\n  const editingOwn = !!firebaseUser && d.userId===firebaseUser.uid && !isAdmin();\n  if(!company||!contact||!date||!material||!ts||!te||!selZ){alert('Veuillez remplir tous les champs obligatoires.');return;}\n  // Conflict check BEFORE mutating\n  if(d.status==='approved' || editingOwn){\n    const cf=deliveries.find(x=>x.id!==id&&x.zone===newZone&&x.date===date&&x.status==='approved'&&overlap(ts,te,x.timeStart||x.time,x.timeEnd||x.time));\n    if(cf){alert('Conflit d’horaire avec '+cf.company+' ('+(cf.timeStart||cf.time)+'–'+(cf.timeEnd||cf.time)+'). Résolvez-le d’abord.');return;}\n  }\n  // Apply\n  d.company=company;d.contact=contact;d.phone=phone;d.material=material;\n  d.date=date;d.time=ts;d.timeStart=ts;d.timeEnd=te;d.truck=truck;d.notes=notes;d.zone=newZone;\n  if(editingOwn){\n    delete d.rejectionNote;\n    if(projectInfo.autoApprove!==false){\n      d.status='approved';\n    } else if(d.status!=='approved') {\n      d.status='pending';\n    }\n  }\n  notif('Modifiée : '+company+' — '+fmtDate(date)+' '+ts+'–'+te+'.',d.status==='approved'?'approved':'pending');\n  saveDelivery(d);\n  sendDeliveryEmail(d, 'modified');\n  closeModal('modal-edit');renderAdmin();renderWeekCalendar();updateBadges();\n}\n\n// ── EXPORT ────────────────────────────────────────────────\nfunction renderScheduleMgr(){\n  const el = g('schedule-mgr'); if (!el) return;\n  const days = ['Mon','Tue','Wed','Thu','Fri'];\n  const dayLabels = { Mon:'Lun', Tue:'Mar', Wed:'Mer', Thu:'Jeu', Fri:'Ven' };\n  el.innerHTML = days.map(day => {\n    const sch = siteSchedule[day];\n    const timeOpts = TIME_SLOTS.map(t => `<option value=\"${t}\" ${t===sch.open?'selected':''} >${t}<\u002Foption>`).join('');\n    const timeOptsClose = TIME_SLOTS.map(t => `<option value=\"${t}\" ${t===sch.close?'selected':''} >${t}<\u002Foption>`).join('');\n    return `<div style=\"display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);flex-wrap:wrap;\">\n      <span style=\"font-size:12px;font-weight:700;color:var(--text);width:32px;flex-shrink:0;\">${dayLabels[day] || day}<\u002Fspan>\n      <label style=\"display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);cursor:pointer;\">\n        <input type=\"checkbox\" ${sch.closed?'':'checked'} onchange=\"setDayOpen('${day}',this.checked)\" style=\"cursor:pointer;\"> Ouvert\n      <\u002Flabel>\n      <div style=\"display:flex;align-items:center;gap:6px;${sch.closed?'opacity:0.3;pointer-events:none;':''}\">\n        <select onchange=\"setDayHour('${day}','open',this.value)\" style=\"background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:5px 8px;color:var(--text);font-size:12px;font-family:var(--mono);outline:none;\">${timeOpts}<\u002Fselect>\n        <span style=\"font-size:11px;color:var(--text3);\">à<\u002Fspan>\n        <select onchange=\"setDayHour('${day}','close',this.value)\" style=\"background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:5px 8px;color:var(--text);font-size:12px;font-family:var(--mono);outline:none;\">${timeOptsClose}<\u002Fselect>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('') + '<div style=\"font-size:11px;color:var(--text3);padding-top:10px;\">Aucune livraison la fin de semaine.<\u002Fdiv>';\n}\n\nfunction setDayOpen(day, isOpen){\n  siteSchedule[day].closed = !isOpen;\n  fbSaveConfig('siteSchedule', siteSchedule);\n  renderScheduleMgr();\n}\nfunction setDayHour(day, which, val){\n  siteSchedule[day][which] = val;\n  fbSaveConfig('siteSchedule', siteSchedule);\n}\n\nfunction renderSubList(){\n  const el=g('sub-list'); if(!el) return;\n  if(!subcontractors.length){\n    el.innerHTML='<div class=\"empty\">Aucun sous-traitant ajouté.<\u002Fdiv>'; return;\n  }\n  el.innerHTML=subcontractors.map((c,i)=>\n    `<div style=\"display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);\">\n      <span style=\"font-size:13px;color:var(--text);\">${c}<\u002Fspan>\n      <button onclick=\"removeSubcontractor(${i})\" style=\"padding:3px 10px;border-radius:var(--r);border:1px solid var(--red-bd);background:var(--red-dim);color:var(--red);font-size:11px;font-weight:700;cursor:pointer;\">✕ Retirer<\u002Fbutton>\n    <\u002Fdiv>`\n  ).join('');\n}\nfunction addSubcontractor(){\n  const inp=g('sub-input'); if(!inp) return;\n  const val=inp.value.trim();\n  if(!val) return;\n  const exists = subcontractors.some(c => String(c).toLowerCase() === val.toLowerCase());\n  if(exists){ alert('Cette compagnie existe déjà.'); return; }\n  subcontractors.push(val);\n  inp.value='';\n  renderSubList();\n  renderCompanyDropdowns(); // new company must appear in booking dropdowns immediately\n  saveSubcontractorsConfig().catch(()=>{});\n}\nfunction removeSubcontractor(idx){\n  subcontractors.splice(idx,1);\n  renderSubList();\n  renderCompanyDropdowns();\n  saveSubcontractorsConfig().catch(()=>{});\n}\n\nfunction renderBlackoutPanel(){\n  // Populate zone select\n  const zsel = g('bo-zone');\n  if(zsel){\n    zsel.innerHTML = zones.map(z => `<option value=\"${z.id}\">${z.name}<\u002Foption>`).join('');\n  }\n  // Render existing blackouts list\n  const list = g('blackout-list');\n  if(!list) return;\n  if(!blackoutDates.length){\n    list.innerHTML = '<div class=\"empty\">Aucun blocage actif.<\u002Fdiv>';\n    return;\n  }\n  list.innerHTML = blackoutDates.map(b => {\n    const z = zones.find(z => z.id === b.zoneId);\n    const dateRange = b.dateFrom === b.dateTo\n      ? fmtDate(b.dateFrom)\n      : fmtDate(b.dateFrom) + ' → ' + fmtDate(b.dateTo);\n    // Check for conflicts\n    const conflicts = deliveries.filter(d =>\n      d.zone === b.zoneId &&\n      d.date >= b.dateFrom && d.date <= b.dateTo &&\n      (d.status === 'approved' || d.status === 'pending')\n    );\n    const conflictBadge = conflicts.length\n      ? `<span style=\"font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:var(--red-dim);color:var(--red);border:1px solid var(--red-bd);margin-left:6px;\">⚠ ${conflicts.length} livraison${conflicts.length>1?'s':''} à reschedule<\u002Fspan>`\n      : '';\n    return `<div style=\"display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);flex-wrap:wrap;\">\n      <span style=\"width:10px;height:10px;border-radius:2px;background:${z?z.color:'#888'};flex-shrink:0;display:inline-block;\"><\u002Fspan>\n      <div style=\"flex:1;min-width:0;\">\n        <div style=\"font-size:13px;font-weight:600;color:var(--text);\">${z?z.name:'Zone inconnue'} — ${b.reason}<\u002Fdiv>\n        <div style=\"font-size:11px;color:var(--text2);margin-top:2px;\">${dateRange}${conflictBadge}<\u002Fdiv>\n        ${conflicts.length ? `<div style=\"font-size:11px;color:var(--red);margin-top:4px;\">${conflicts.map(d=>'• '+d.company+' ('+fmtDate(d.date)+' '+( d.timeStart||d.time)+')').join('<br>')}<\u002Fdiv>` : ''}\n      <\u002Fdiv>\n      <button onclick=\"removeBlackout('${b.id}')\" style=\"padding:4px 10px;border-radius:var(--r);border:1px solid var(--red-bd);background:var(--red-dim);color:var(--red);font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0;\">Supprimer<\u002Fbutton>\n    <\u002Fdiv>`;\n  }).join('');\n}\n\nfunction boReasonChange(){\n  const sel = g('bo-reason-sel');\n  const wrap = g('bo-reason-custom-wrap');\n  if(!sel||!wrap) return;\n  wrap.style.display = sel.value === 'Autre' ? '' : 'none';\n}\n\nfunction addBlackout(){\n  const zoneId = g('bo-zone')?.value;\n  const dateFrom = g('bo-date-from')?.value;\n  const dateTo = g('bo-date-to')?.value || dateFrom;\n  const reasonSel = g('bo-reason-sel')?.value;\n  const reasonCustom = g('bo-reason-custom')?.value?.trim();\n  const reason = reasonSel === 'Autre' ? (reasonCustom || 'Autre') : reasonSel;\n\n  if(!zoneId || !dateFrom){\n    alert('Veuillez sélectionner une zone et une date de début.');\n    return;\n  }\n  if(dateTo < dateFrom){\n    alert('La date de fin doit être après la date de début.');\n    return;\n  }\n\n  const entry = { id: 'bo' + Date.now(), zoneId, dateFrom, dateTo, reason };\n  blackoutDates.push(entry);\n  fbSaveConfig('blackoutDates', blackoutDates).catch(()=>{});\n\n  // Reset form\n  if(g('bo-date-from')) g('bo-date-from').value = '';\n  if(g('bo-date-to'))   g('bo-date-to').value   = '';\n  if(g('bo-reason-custom')) g('bo-reason-custom').value = '';\n  if(g('bo-reason-custom-wrap')) g('bo-reason-custom-wrap').style.display = 'none';\n  if(g('bo-reason-sel')) g('bo-reason-sel').value = 'Coulée de béton';\n\n  renderBlackoutPanel();\n  renderWeekCalendar();\n  renderStartTimes();\n}\n\nfunction removeBlackout(id){\n  blackoutDates = blackoutDates.filter(b => b.id !== id);\n  fbSaveConfig('blackoutDates', blackoutDates).catch(()=>{});\n  renderBlackoutPanel();\n  renderWeekCalendar();\n  renderStartTimes();\n}\n\nfunction renderAnalytics(){\n  const period = g('an-period') ? g('an-period').value : 'all';\n\n  // Filter deliveries by period\n  const now = new Date();\n  const weekAgo  = dk(new Date(now.getFullYear(), now.getMonth(), now.getDate() - 7));\n  const monthAgo = dk(new Date(now.getFullYear(), now.getMonth() - 1, now.getDate()));\n\n  function inPeriod(d){\n    if(period === 'week')  return d.date >= weekAgo;\n    if(period === 'month') return d.date >= monthAgo;\n    return true;\n  }\n\n  const filtered  = deliveries.filter(inPeriod);\n  const approved  = filtered.filter(d => d.status === 'approved');\n  const pending   = filtered.filter(d => d.status === 'pending');\n  const rejected  = filtered.filter(d => d.status === 'rejected');\n  const cancelled = filtered.filter(d => d.status === 'cancelled');\n  const total     = filtered.length;\n\n  // ── KPI strip ──────────────────────────────────────────────────────────────\n  const kpiEl = g('an-kpis');\n  if(kpiEl){\n    const kpis = [\n      { label:'Total',          val: total,            color:'var(--text)' },\n      { label:'Approuvées',     val: approved.length,  color:'var(--green)' },\n      { label:'En attente',     val: pending.length,   color:'var(--amber)' },\n      { label:'Annulées/Rej.', val: cancelled.length + rejected.length, color:'var(--red)' },\n    ];\n    kpiEl.innerHTML = kpis.map(k =>\n      `<div style=\"background:var(--bg2);padding:16px 20px;\">\n        <div class=\"stat-lbl\">${k.label}<\u002Fdiv>\n        <div class=\"stat-val\" style=\"color:${k.color};\">${k.val}<\u002Fdiv>\n      <\u002Fdiv>`\n    ).join('');\n  }\n\n  // ── By zone ────────────────────────────────────────────────────────────────\n  const zoneEl = g('an-by-zone');\n  if(zoneEl){\n    const maxZ = Math.max(...zones.map(z => approved.filter(d => d.zone === z.id).length), 1);\n    zoneEl.innerHTML = zones.map(z => {\n      const cnt  = approved.filter(d => d.zone === z.id).length;\n      const pct  = Math.round((cnt / maxZ) * 100);\n      const pend = pending.filter(d => d.zone === z.id).length;\n      return `<div style=\"display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);\">\n        <span style=\"width:10px;height:10px;border-radius:2px;background:${z.color};flex-shrink:0;\"><\u002Fspan>\n        <span style=\"font-size:13px;color:var(--text);min-width:64px;\">${z.name}<\u002Fspan>\n        <div style=\"flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;\">\n          <div style=\"width:${pct}%;height:100%;background:${z.color};border-radius:4px;transition:width .3s;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <span style=\"font-size:12px;color:var(--text2);min-width:24px;text-align:right;\">${cnt}<\u002Fspan>\n        ${pend ? `<span style=\"font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber-bd);\">${pend} att.<\u002Fspan>` : ''}\n      <\u002Fdiv>`;\n    }).join('') || '<div class=\"empty\">Aucune donnée.<\u002Fdiv>';\n  }\n\n  // ── By status ──────────────────────────────────────────────────────────────\n  const statusEl = g('an-by-status');\n  if(statusEl && total > 0){\n    const statuses = [\n      { label:'Approuvées',  cnt: approved.length,  color:'var(--green)' },\n      { label:'En attente',  cnt: pending.length,   color:'var(--amber)' },\n      { label:'Rejetées',    cnt: rejected.length,  color:'var(--red)' },\n      { label:'Annulées',    cnt: cancelled.length, color:'var(--text3)' },\n    ];\n    statusEl.innerHTML = statuses.map(s => {\n      const pct = Math.round((s.cnt / total) * 100);\n      return `<div style=\"display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);\">\n        <span style=\"font-size:13px;color:var(--text);min-width:80px;\">${s.label}<\u002Fspan>\n        <div style=\"flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;\">\n          <div style=\"width:${pct}%;height:100%;background:${s.color};border-radius:4px;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <span style=\"font-size:12px;color:var(--text2);min-width:32px;text-align:right;\">${s.cnt} (${pct}%)<\u002Fspan>\n      <\u002Fdiv>`;\n    }).join('');\n  } else if(statusEl){\n    statusEl.innerHTML = '<div class=\"empty\">Aucune donnée.<\u002Fdiv>';\n  }\n\n  // ── Top subcontractors ──────────────────────────────────────────────────────\n  const subEl = g('an-top-subs');\n  if(subEl){\n    const counts = {};\n    approved.forEach(d => { counts[d.company] = (counts[d.company]||0) + 1; });\n    const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]).slice(0,8);\n    if(!sorted.length){\n      subEl.innerHTML = '<div class=\"empty\">Aucune donnée.<\u002Fdiv>';\n    } else {\n      const maxS = sorted[0][1];\n      subEl.innerHTML = sorted.map(([co, cnt], i) =>\n        `<div style=\"display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);\">\n          <span style=\"font-size:11px;color:var(--text3);min-width:16px;text-align:right;\">${i+1}<\u002Fspan>\n          <span style=\"font-size:13px;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">${co}<\u002Fspan>\n          <div style=\"width:80px;height:7px;background:var(--bg3);border-radius:4px;overflow:hidden;\">\n            <div style=\"width:${Math.round((cnt/maxS)*100)}%;height:100%;background:var(--accent);border-radius:4px;\"><\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"font-size:12px;color:var(--text2);min-width:20px;text-align:right;\">${cnt}<\u002Fspan>\n        <\u002Fdiv>`\n      ).join('');\n    }\n  }\n\n  // ── Busiest days of week ────────────────────────────────────────────────────\n  const dayEl = g('an-busiest-days');\n  if(dayEl){\n    const dayNames = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];\n    const dayCounts = [0,0,0,0,0,0,0];\n    approved.forEach(d => {\n      const day = new Date(d.date + 'T12:00:00').getDay();\n      dayCounts[day]++;\n    });\n    const maxD = Math.max(...dayCounts, 1);\n    // Reorder Mon→Sun (1-6, 0)\n    const order = [1,2,3,4,5,6,0];\n    dayEl.innerHTML = order.map(i =>\n      `<div style=\"display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);\">\n        <span style=\"font-size:13px;color:var(--text);min-width:28px;\">${dayNames[i]}<\u002Fspan>\n        <div style=\"flex:1;height:7px;background:var(--bg3);border-radius:4px;overflow:hidden;\">\n          <div style=\"width:${Math.round((dayCounts[i]/maxD)*100)}%;height:100%;background:var(--blue);border-radius:4px;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <span style=\"font-size:12px;color:var(--text2);min-width:20px;text-align:right;\">${dayCounts[i]}<\u002Fspan>\n      <\u002Fdiv>`\n    ).join('');\n  }\n\n  // ── Weekly trend (last 8 weeks) ─────────────────────────────────────────────\n  const trendEl = g('an-trend');\n  if(trendEl){\n    // Build last 8 weeks\n    const weeks = [];\n    for(let w = 7; w >= 0; w--){\n      const wStart = new Date();\n      wStart.setDate(wStart.getDate() - (wStart.getDay() === 0 ? 6 : wStart.getDay()-1) - w*7);\n      wStart.setHours(0,0,0,0);\n      const wEnd = new Date(wStart); wEnd.setDate(wEnd.getDate()+6);\n      const wStartStr = dk(wStart);\n      const wEndStr   = dk(wEnd);\n      const cnt = deliveries.filter(d =>\n        d.status === 'approved' && d.date >= wStartStr && d.date <= wEndStr\n      ).length;\n      const label = wStart.toLocaleDateString('fr-CA', {month:'short', day:'numeric'});\n      weeks.push({label, cnt, wStartStr});\n    }\n    const maxW = Math.max(...weeks.map(w => w.cnt), 1);\n    const BAR_H = 80;\n    trendEl.innerHTML = `<div style=\"display:flex;align-items:flex-end;gap:8px;height:${BAR_H+40}px;padding-top:8px;\">\n      ${weeks.map(w => {\n        const barH = Math.max(4, Math.round((w.cnt/maxW)*BAR_H));\n        const isCurrent = w.wStartStr === dk(getMonday(new Date()));\n        return `<div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;\">\n          <span style=\"font-size:11px;color:var(--text2);font-weight:${isCurrent?700:400};\">${w.cnt}<\u002Fspan>\n          <div style=\"width:100%;height:${barH}px;background:${isCurrent?'var(--accent)':'var(--blue)'};border-radius:3px 3px 0 0;opacity:${isCurrent?1:0.7};\" title=\"${w.label}: ${w.cnt} livraisons\"><\u002Fdiv>\n          <span style=\"font-size:10px;color:var(--text3);white-space:nowrap;\">${w.label}<\u002Fspan>\n        <\u002Fdiv>`;\n      }).join('')}\n    <\u002Fdiv>`;\n  }\n}\n\nfunction togglePanel(id){\n  const panel = g(id);\n  if(panel) panel.classList.toggle('collapsed');\n}\n\nfunction exportCSV(){\n  const q=v=>'\"'+String(v??'').replace(/\"/g,'\"\"')+'\"';\n  let csv='Date,Début,Fin,Zone,Compagnie,Contact,Téléphone,Matériel,Camion,Statut,Notes\\n';\n  deliveries.forEach(d=>{const z=zones.find(z=>z.id===d.zone);\n    csv+=[d.date,d.timeStart||d.time,d.timeEnd||'',z?z.name:d.zone,d.company,d.contact,d.phone||'',d.material,d.truck||'',statusFr(d.status),d.notes||''].map(q).join(',')+'\\n';});\n  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='livraisons.csv';a.click();\n}\n\n// ── MODALS ────────────────────────────────────────────────\nfunction openMyDeliveries(){\n  if(!firebaseUser){ openUserAuth(); return; }\n  const myDels = deliveries\n    .filter(d => d.userId === firebaseUser.uid)\n    .sort((a,b) => new Date(b.submittedAt||0) - new Date(a.submittedAt||0));\n  const list = g('my-del-list');\n  if(!myDels.length){\n    list.innerHTML='<div style=\"text-align:center;padding:30px 0;font-size:13px;color:var(--text3);\">Aucune livraison pour le moment.<\u002Fdiv>';\n  } else {\n    list.innerHTML = myDels.map(d => {\n      const z = zones.find(z=>z.id===d.zone);\n      const sc = d.status==='approved'?'var(--green)':d.status==='pending'?'var(--amber)':d.status==='cancelled'?'var(--text3)':'var(--red)';\n      const timeStr = (d.timeStart||d.time)+(d.timeEnd?' – '+d.timeEnd:'');\n      const canEdit = d.status!=='cancelled';\n      return '<div style=\"padding:12px 0;border-bottom:1px solid var(--border);\">'\n        +'<div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px;\">'\n        +  '<div>'\n        +    '<div style=\"font-size:14px;font-weight:600;color:var(--text);\">'+escapeHtml(d.company)+'<\u002Fdiv>'\n        +    '<div style=\"font-size:11px;color:var(--text2);margin-top:2px;\">'+fmtDate(d.date)+' · '+timeStr+(z?' · '+z.name:'')+'<\u002Fdiv>'\n        +    '<div style=\"font-size:11px;color:var(--text2);\">'+escapeHtml(d.material)+'<\u002Fdiv>'\n        +  '<\u002Fdiv>'\n        +  '<span style=\"font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;background:'+sc+'22;color:'+sc+';border:1px solid '+sc+'55;white-space:nowrap;text-transform:uppercase;\">'+statusFr(d.status)+'<\u002Fspan>'\n        +'<\u002Fdiv>'\n        +'<div class=\"_user-del-actions\" data-id=\"'+d.id+'\" data-can-edit=\"'+(canEdit?'1':'0')+'\" style=\"display:flex;gap:6px;flex-wrap:wrap;\"><\u002Fdiv>'\n          +((d.status==='cancelled') ? '<div style=\"font-size:11px;color:var(--text3);margin-top:6px;\">Livraison annulée.<\u002Fdiv>' : '')\n        +'<\u002Fdiv>';\n    }).join('');\n  }\n  g('modal-my-deliveries').classList.add('open');\n  // Wire up edit/cancel buttons safely via DOM\n  document.querySelectorAll('._user-del-actions').forEach(div => {\n    const id = div.dataset.id;\n    const canEdit = div.dataset.canEdit === '1';\n    const againBtn = document.createElement('button');\n    againBtn.textContent = 'Réserver à nouveau';\n    againBtn.style.cssText = 'padding:5px 12px;border-radius:var(--r);border:1px solid var(--accent-bd);background:var(--accent-dim);color:var(--accent);font-size:11px;font-weight:700;cursor:pointer;';\n    againBtn.addEventListener('click', () => loadDeliveryTemplate(id));\n    div.appendChild(againBtn);\n    if(canEdit){\n      const editBtn = document.createElement('button');\n      editBtn.textContent = 'Modifier dans le calendrier';\n      editBtn.style.cssText = 'padding:5px 12px;border-radius:var(--r);border:1px solid var(--blue-bd);background:var(--blue-dim);color:var(--blue);font-size:11px;font-weight:700;cursor:pointer;';\n      editBtn.addEventListener('click', () => userEditDelivery(id));\n      div.appendChild(editBtn);\n      const cancelBtn = document.createElement('button');\n      cancelBtn.textContent = 'Annuler';\n      cancelBtn.style.cssText = 'padding:5px 12px;border-radius:var(--r);border:1px solid var(--red-bd);background:var(--red-dim);color:var(--red);font-size:11px;font-weight:700;cursor:pointer;';\n      cancelBtn.addEventListener('click', () => userCancelDelivery(id));\n      div.appendChild(cancelBtn);\n    }\n  });\n}\n\nfunction userCancelDelivery(id){\n  const d = deliveries.find(x=>x.id===id);\n  if(!d||d.userId!==firebaseUser?.uid||(d.status!=='pending'&&d.status!=='approved')) return;\n  if(!confirm('Annuler cette livraison ?')) return;\n  d.status='cancelled';\n  d.rejectionNote='Annulée par le sous-traitant.';\n  saveDelivery(d);\n  sendDeliveryEmail(d, 'cancelled');\n  notif(d.company+' a annulé sa livraison ('+fmtDate(d.date)+' '+(d.timeStart||d.time)+').','rejected');\n  openMyDeliveries(); // refresh modal\n  renderWeekCalendar();\n  updateBadges();\n}\n\nfunction userEditDelivery(id){\n  const d = deliveries.find(x=>x.id===id);\n  if(!firebaseUser || !d || d.userId!==firebaseUser.uid || d.status==='cancelled') return;\n  closeModal('modal-my-deliveries');\n  closeModal('modal-detail');\n  weekStart = getMonday(new Date((d.date||today())+'T12:00:00'));\n  showView('deliveries');\n  if(window.innerWidth <= 768) mobSwitchTab('cal');\n  setTimeout(()=>{\n    renderWeekCalendar();\n    openEdit(id);\n  }, 120);\n}\n\n\n// Resize listener: restore desktop layout if window grows past mobile breakpoint\nwindow.addEventListener('resize', ()=>{\n  if(window.innerWidth > 768){\n    const form=document.querySelector('.booking-panel');\n    const cal=document.querySelector('.cal-main');\n    if(form){ form.classList.remove('mob-panel-hidden'); form.style.display=''; }\n    if(cal){  cal.classList.remove('mob-panel-hidden');  cal.style.display='';  }\n  }\n  renderZoneFilters();\n  updateMobileFab();\n  syncMobAdminTab();\n  updateMobileCalendarMode();\n  renderMobWeekChips();\n});\n\n\n\nfunction mobilePrefillBookingFromCalendar(date, time){\n  showView('deliveries');\n  if(window.innerWidth <= 768){\n    mobSwitchTab('cal');\n    quickBook(date, time);\n    return;\n  }\n  let targetZone = selZone;\n  if((!targetZone || !zones.find(z=>z.id===targetZone)) && activeZF.size===1){\n    targetZone = Array.from(activeZF)[0];\n  }\n  if(!targetZone && zones.length) targetZone = zones[0].id;\n  selZone = targetZone;\n  renderZonePicker();\n  g('b-date').value = date;\n  renderStartTimes();\n  const startSel = g('b-time-start');\n  if(startSel){\n    for(let i=0;i<startSel.options.length;i++){\n      if(startSel.options[i].value === time){\n        startSel.selectedIndex = i;\n        break;\n      }\n    }\n  }\n  onStartChange();\n  const panel = document.querySelector('.booking-panel');\n  if(panel) panel.scrollTo({top:0, behavior:'smooth'});\n  setTimeout(()=>g('b-company')?.focus(), 180);\n}\n\n\nfunction nextTimeSlotValue(time){\n  const idx = TIME_SLOTS.indexOf(time);\n  if(idx === -1) return time;\n  return TIME_SLOTS[Math.min(idx + 1, TIME_SLOTS.length - 1)] || time;\n}\nfunction getAvailableZonesForSlot(date, startTime, endTime){\n  const start = startTime;\n  const end = endTime || nextTimeSlotValue(startTime);\n  return zones.filter(z =>\n    (activeZF.size === 0 || activeZF.has(z.id)) &&\n    !isZoneBlackedOut(z.id, date) &&\n    !deliveries.some(d =>\n      d.zone === z.id &&\n      d.date === date &&\n      d.status !== 'rejected' &&\n      d.status !== 'cancelled' &&\n      overlap(start, end, d.timeStart || d.time, d.timeEnd || nextTimeSlotValue(d.timeStart || d.time))\n    )\n  );\n}\nfunction quickBookWithZone(date, time, zoneId, ev){\n  if(ev){\n    ev.preventDefault();\n    ev.stopPropagation();\n  }\n  quickBook(date, time, zoneId);\n}\nfunction resetQuickBookSheetPosition(){\n  const modal = document.querySelector('#modal-quick-book .modal');\n  if(!modal) return;\n  modal.scrollTop = 0;\n  try{ modal.scrollTo({top:0, left:0, behavior:'instant'}); }catch(_){}\n}\nfunction quickBook(date, time, preferredZone){\n  if(!requireLoginForBooking('quick')) return;\n\n  const dateObj = new Date(date+'T12:00:00');\n  const dateDisp = dateObj.toLocaleDateString('fr-CA',{weekday:'long',day:'numeric',month:'long'});\n  const capDate = dateDisp.charAt(0).toUpperCase()+dateDisp.slice(1);\n  g('qb-title').textContent = 'Livraison — '+capDate;\n  g('qb-date').value = date;\n  // Populate company dropdown\n  const coQb=g('qb-company');\n  if(coQb) coQb.innerHTML='<option value=\"\">Sélectionner la compagnie…<\u002Foption>'\n    +subcontractors.map(c=>'<option value=\"'+escapeHtml(c)+'\">'+escapeHtml(c)+'<\u002Foption>').join('');\n  const zsel=g('qb-zone');\n  zsel.innerHTML=zones.map(z=>'<option value=\"'+z.id+'\">'+ z.name+'<\u002Foption>').join('');\n  if(preferredZone && zones.some(z=>z.id===preferredZone)) zsel.value=preferredZone;\n  else if(selZone) zsel.value=selZone;\n  if(zsel.value) selZone = zsel.value;\n  applyQuickBookPrefs();\n  setQbOptionalCollapsed(window.innerWidth <= 768);\n  const allowed=allowedSlotsForDate(date);\n  const startSel=g('qb-start');\n  startSel.innerHTML='<option value=\"\">Sélectionner...<\u002Foption>'\n    +allowed.map(t=>'<option value=\"'+t+'\"'+(t===time?' selected':'')+'>'+t+'<\u002Foption>').join('');\n  qbStartChange();\n  g('qb-err').style.display='none';\n  g('modal-quick-book').classList.add('open');\n  resetQuickBookSheetPosition();\n  requestAnimationFrame(resetQuickBookSheetPosition);\n  setTimeout(resetQuickBookSheetPosition, 40);\n  setTimeout(()=>{ resetQuickBookSheetPosition(); g('qb-date')?.scrollIntoView({block:'start'}); },80);\n}\nfunction qbStartChange(){\n  const sv=g('qb-start').value, date=g('qb-date').value, zoneId=g('qb-zone').value;\n  const endSel=g('qb-end');\n  endSel.innerHTML='<option value=\"\">Sélectionner...<\u002Foption>';\n  if(!sv) return;\n  const startIdx=TIME_SLOTS.indexOf(sv);\n  const allowed=allowedSlotsForDate(date);\n  const blockers=deliveries.filter(d=>d.zone===zoneId&&d.date===date&&d.status==='approved')\n    .map(d=>TIME_SLOTS.indexOf(d.timeStart||d.time)).filter(i=>i>startIdx).sort((a,b)=>a-b);\n  const ceil=blockers.length>0?blockers[0]:Infinity;\n  allowed.filter(t=>{const i=TIME_SLOTS.indexOf(t);return i>startIdx&&i<=ceil;}).forEach(t=>{\n    const o=document.createElement('option');\n    o.value=t;o.textContent=t;endSel.appendChild(o);\n  });\n  if(endSel.options.length>1) endSel.selectedIndex=1;\n}\nfunction submitQuickBook(){\n  if(!requireLoginForBooking('quick')) return;\n  const date=g('qb-date').value, zoneId=g('qb-zone').value;\n  const ts=g('qb-start').value, te=g('qb-end').value;\n  const company=g('qb-company').value.trim(), contact=g('qb-contact').value.trim();\n  const phone=g('qb-phone').value.trim(), material=g('qb-material').value.trim();\n  const truck=g('qb-truck').value, notes=g('qb-notes').value.trim();\n  const errEl=g('qb-err');\n  // Also update main form dropdown\n  renderCompanyDropdowns();\n  const errs=[];\n  if(!company)  errs.push('Compagnie');\n  if(!contact)  errs.push('Contact');\n  if(!material) errs.push('Matériel');\n  if(!ts)       errs.push('Heure de début');\n  if(!te)       errs.push('Heure de fin');\n  if(errs.length){errEl.textContent='Champs manquants : '+errs.join(', ');errEl.style.display='block';return;}\n  const ov=deliveries.find(d=>d.zone===zoneId&&d.date===date&&d.status==='approved'&&overlap(ts,te,d.timeStart||d.time,d.timeEnd||d.time));\n  if(ov){errEl.textContent='Chevauche une livraison approuvée pour '+ov.company+'.';errEl.style.display='block';return;}\n  const d={id:'D'+Date.now(),company,contact,phone,material,date,time:ts,timeStart:ts,timeEnd:te,\n    truck,notes,zone:zoneId,status:(projectInfo.autoApprove!==false?'approved':'pending'),\n    submittedAt:new Date().toISOString(),\n    userId:firebaseUser?firebaseUser.uid:null,userEmail:firebaseUser?firebaseUser.email:null};\n  deliveries.unshift(d);\n  saveMobileBookingPrefs({company, contact, phone, truck});\n  notif('Nouvelle livraison : '+company+' — '+fmtDate(date)+' '+ts+'–'+te+' ('+(zones.find(z=>z.id===zoneId)||{name:'?'}).name+')',d.status==='approved'?'approved':'pending');\n  saveDelivery(d);\n  if(d.status === 'approved') sendDeliveryEmail(d, 'approved');\n  closeModal('modal-quick-book');\n  renderWeekCalendar();updateBadges();\n  ['qb-company','qb-contact','qb-phone','qb-material','qb-notes'].forEach(id=>{const el=g(id);if(el)el.value='';});\n  g('qb-truck').value='';\n}\nfunction closeModal(id){ if(id==='modal-reschedule') pendingReschedule=null; g(id).classList.remove('open');}\n\nfunction openZoneModal(zoneId){\n  const z = zones.find(x => x.id === zoneId); if (!z) return;\n  const todayStr = today();\n  const weekDates = Array.from({length:7}, (_,i) => dk(addDays(getMonday(new Date()), i)));\n\n  const zoneDels  = deliveries.filter(d => d.zone === zoneId);\n  const todayDels = zoneDels.filter(d => d.date === todayStr && d.status !== 'rejected' && d.status !== 'cancelled');\n  const pendingCnt= zoneDels.filter(d => d.status === 'pending').length;\n  const weekCnt   = zoneDels.filter(d => weekDates.includes(d.date) && d.status === 'approved').length;\n\n  g('zm-dot').style.background  = z.color;\n  g('zm-name').textContent       = z.name;\n  g('zm-date').textContent       = new Date().toLocaleDateString('fr-CA', {weekday:'long', month:'long', day:'numeric'});\n  g('zm-header').style.borderBottom = '1px solid ' + z.color + '44';\n  g('zm-stat-today').textContent   = todayDels.filter(d => d.status === 'approved').length;\n  g('zm-stat-pending').textContent = pendingCnt;\n  g('zm-stat-week').textContent    = weekCnt;\n\n  const list = g('zm-list');\n  if (!todayDels.length) {\n    list.innerHTML = '<div style=\"text-align:center;padding:20px 0;font-size:12px;color:var(--text3);\">Aucune livraison prévue aujourd’hui.<\u002Fdiv>';\n  } else {\n    const sorted = [...todayDels].sort((a,b) => (a.timeStart||a.time).localeCompare(b.timeStart||b.time));\n    list.innerHTML = '';\n    sorted.forEach(d => {\n      const statusColor = d.status==='approved' ? 'var(--green)' : d.status==='pending' ? 'var(--amber)' : 'var(--red)';\n      const statusBg    = d.status==='approved' ? 'var(--green-dim)' : d.status==='pending' ? 'var(--amber-dim)' : 'var(--red-dim)';\n      const statusBd    = d.status==='approved' ? 'var(--green-bd)'  : d.status==='pending' ? 'var(--amber-bd)'  : 'var(--red-bd)';\n      const timeStr     = (d.timeStart||d.time) + (d.timeEnd ? ' – ' + d.timeEnd : '');\n      const row = document.createElement('div');\n      row.style.cssText = 'display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);';\n      row.innerHTML =\n        '<div style=\"font-family:var(--mono);font-size:11px;color:var(--text2);flex-shrink:0;min-width:90px;\">' + timeStr + '<\u002Fdiv>'\n        + '<div style=\"flex:1;min-width:0;\">'\n        +   '<div style=\"font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">' + escapeHtml(d.company) + '<\u002Fdiv>'\n        +   '<div style=\"font-size:11px;color:var(--text2);\">' + escapeHtml(d.contact) + (d.truck ? ' · ' + escapeHtml(d.truck) : '') + '<\u002Fdiv>'\n        + '<\u002Fdiv>'\n        + '<span style=\"font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;background:' + statusBg + ';color:' + statusColor + ';border:1px solid ' + statusBd + ';white-space:nowrap;text-transform:uppercase;letter-spacing:0.04em;\">' + (d.status==='approved'?'Approuvée':d.status==='pending'?'En attente':'Rejetée') + '<\u002Fspan>';\n\n      list.appendChild(row);\n    });\n  }\n\n  g('modal-zone').dataset.zoneId = zoneId;\n  g('modal-zone').classList.add('open');\n\n}\n\n\nfunction decideFromZoneModal(id, status) {\n  const d = deliveries.find(x => x.id === id); if (!d) return;\n  if (status === 'approved') {\n    const cf = deliveries.find(x => x.id !== id && x.zone === d.zone && x.date === d.date && x.status === 'approved' && overlap(d.timeStart||d.time, d.timeEnd||d.time, x.timeStart||x.time, x.timeEnd||x.time));\n    if (cf) { alert('Pris par ' + cf.company + '.'); return; }\n  }\n  d.status = status;\n  notif(d.company + ' — ' + statusFr(status) + ' (' + fmtDate(d.date) + ' ' + (d.timeStart||d.time) + ').', status);\n  saveDelivery(d);\n  // Refresh the modal in place\n  openZoneModal(d.zone);\n  updateBadges();\n}\n\nfunction bookForZone() {\n  if(!requireLoginForBooking('quick')) { closeModal('modal-zone'); return; }\n  const zoneId = g('modal-zone').dataset.zoneId;\n  closeModal('modal-zone');\n  // Pre-select this zone and switch to deliveries view\n  selZone = zoneId;\n  showView('deliveries');\n}\ndocument.querySelectorAll('.modal-backdrop').forEach(el=>{\n  el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');});\n});\n\n// ── INIT ──────────────────────────────────────────────────\nasync function initApp(){\n  tickClock(); setInterval(tickClock,1000);\n  startCurrentTimeTicker();\n  weekStart = getMonday(new Date());\n  document.querySelectorAll('.admin-only').forEach(el=>el.style.display='none');\n  g('nav-admin').style.display='none';\n  g('btn-logout').style.display='none';\n  g('tb-role').style.display='none';\n\n  // Show loading state\n  g('week-grid').innerHTML='<div style=\"padding:40px;text-align:center;color:var(--text3);font-size:13px;grid-column:1/-1;\">Connexion à la base de données…<\u002Fdiv>';\n  bindMobileCalendarSwipe();\n\n  // Restore local zones/project settings first as a fallback for refresh/offline cases.\n  const localZonesBeforeDb = loadLocalZones();\n  if(localZonesBeforeDb) zones = localZonesBeforeDb;\n  const localIconMarkersBeforeDb = loadLocalIconMarkers();\n  if(localIconMarkersBeforeDb) iconMarkers = localIconMarkersBeforeDb;\n  projectInfo = {...projectInfo, ...loadLocalProjectInfo()};\n  const localSubcontractorsBeforeDb = loadLocalSubcontractors();\n  if(localSubcontractorsBeforeDb) subcontractors = localSubcontractorsBeforeDb;\n\n  if(window._db){\n    // Load config docs in parallel\n    const [z, pi, no, mi, sch, bd, sc, im, sn] = await Promise.all([\n      fbLoadConfig('zones',          zones),\n      fbLoadConfig('projectInfo',    projectInfo),\n      fbLoadConfig('notifications',  []),\n      fbLoadConfig('mapImg',         null),\n      fbLoadConfig('siteSchedule',   siteSchedule),\n      fbLoadConfig('blackoutDates',  []),\n      fbLoadConfig('subcontractors', []),\n      fbLoadConfig('iconMarkers',    iconMarkers),\n      fbLoadConfig('siteNotices',     []),\n    ]);\n    // Firebase is the source of truth for zones/projectInfo/iconMarkers; the local\n    // copy is only an offline/pre-connection fallback. (Previously local always won\n    // and was written back, clobbering edits made from other devices/sessions.)\n    zones          = (Array.isArray(z) && z.length) ? z : zones;\n    saveLocalZones();\n    projectInfo    = {...projectInfo, ...pi};\n    saveLocalProjectInfo();\n    updateAutoApproveUI();\n    notifications  = no;\n    mapImg         = mi;\n    siteSchedule   = sch;\n    blackoutDates  = bd;\n    // Subcontractors: Firebase is the source of truth; the local copy is only\n    // an offline fallback. (Previously local always won and was written back,\n    // clobbering companies added from other devices/sessions.)\n    subcontractors = (Array.isArray(sc) && sc.length) ? sc : (loadLocalSubcontractors() || []);\n    saveLocalSubcontractors();\n    iconMarkers    = Array.isArray(im) ? im : [];\n    saveLocalIconMarkers();\n    siteNotices    = sn;\n    subscribeDeliveries(); // real-time listener handles deliveries\n    subscribeSubcontractors(); // real-time listener keeps the company list in sync\n    subscribeConfigDocs(); // real-time listeners for zones / icon markers / project settings\n    // Apply saved app name\n    const _an=g('app-name'); if(_an) _an.textContent=projectInfo.appname||'SiteDelivery';\n  }\n\n  // Restore admin session if previously logged in\n  try{\n    const savedAdmin = localStorage.getItem('sd_admin_session');\n    if(savedAdmin && ACCOUNTS[savedAdmin]){\n      currentUser = {username:savedAdmin, ...ACCOUNTS[savedAdmin]};\n      applyAdminUI();\n    }\n  }catch(e){}\n\n  renderCompanyDropdowns();\n  showView('home');\n  requestAnimationFrame(() => {\n    requestAnimationFrame(() => {\n      if (g('view-home').classList.contains('active')) renderHome();\n      if (g('app')) g('app').style.visibility = 'visible';\n    });\n  });\n}\n\nwindow.addEventListener('load', () => {\n  if (g('view-home')?.classList.contains('active')) renderHome();\n});\nif (document.fonts && document.fonts.ready) {\n  document.fonts.ready.then(() => {\n    if (g('view-home')?.classList.contains('active')) renderHome();\n  }).catch(() => {});\n}\n\n// Called by Firebase module once SDK is ready (see <script type=\"module\"> above)\nwindow._initApp = initApp;\n\n// Fallback: if DOMContentLoaded fires before Firebase module (shouldn't happen but safe)\nif(window._firebaseReady){ initApp(); }\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
