;outline:none;\"><\u002Fselect>\n      <\u002Fdiv>\n      <div class=\"mf\" style=\"grid-column:1/-1;\"><label>Compagnie / Sous-traitant <span class=\"req\">*<\u002Fspan><\u002Flabel><select id=\"qb-company\" style=\"width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:8px 10px;color:var(--text);font-size:13px;outline:none;\"><\u002Fselect><div id=\"qb-remembered-hint\">Dernières infos utilisées préremplies pour aller plus vite.<\u002Fdiv><\u002Fdiv>\n      <div class=\"mf\"><label>Nom du contact <span class=\"req\">*<\u002Fspan><\u002Flabel><input type=\"text\" id=\"qb-contact\" placeholder=\"ex. Marie Dubois\"><\u002Fdiv>\n      <div class=\"mf\" style=\"grid-column:1/-1;\"><label>Matériel / Description <span class=\"req\">*<\u002Fspan><\u002Flabel><input type=\"text\" id=\"qb-material\" placeholder=\"ex. Poutrelles d'acier, 12 pcs\"><\u002Fdiv>\n      <div class=\"mf\" style=\"grid-column:1/-1;\">\n        <button type=\"button\" id=\"qb-optional-toggle\" onclick=\"toggleQbOptional()\">\n          <span>Détails optionnels<\u002Fspan>\n          <span class=\"qb-toggle-caret\">⌄<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fdiv>\n      <div id=\"qb-optional-wrap\" class=\"collapsed\">\n        <div class=\"mf\"><label>Téléphone<\u002Flabel><input type=\"tel\" id=\"qb-phone\" placeholder=\"514-555-0100\"><\u002Fdiv>\n        <div class=\"mf\"><label>Taille du camion<\u002Flabel>\n          <select id=\"qb-truck\" style=\"width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:8px 10px;color:var(--text);font-size:13px;outline:none;\">\n            <option value=\"\">Sélectionner…<\u002Foption>\n            <option>Essieu simple (20 pi)<\u002Foption><option>Tandem (28 pi)<\u002Foption>\n            <option>Semi-remorque (48 pi)<\u002Foption><option>Semi-remorque (53 pi)<\u002Foption>\n            <option>Train B<\u002Foption><option>Fardier<\u002Foption><option>Plateau<\u002Foption>\n            <option>Camion-flèche<\u002Foption><option>Camion-grue<\u002Foption><option>Bétonnière<\u002Foption>\n            <option>Camion-pompe<\u002Foption><option>Conteneur (roll-off)<\u002Foption><option>Camion-benne<\u002Foption><option>Citerne<\u002Foption>\n          <\u002Fselect>\n        <\u002Fdiv>\n        <div class=\"mf\" style=\"grid-column:1/-1;\"><label>Notes<\u002Flabel><input type=\"text\" id=\"qb-notes\" placeholder=\"Exigences spéciales...\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div id=\"qb-err\" class=\"modal-err\" style=\"display:none;margin-top:8px;\"><\u002Fdiv>\n    <div class=\"m-actions\" style=\"margin-top:16px;\">\n      <button class=\"btn btn-gh\" onclick=\"closeModal('modal-quick-book')\">Annuler<\u002Fbutton>\n      <button class=\"btn btn-ac\" onclick=\"submitQuickBook()\">✓ Confirmer la livraison<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ZONE MODAL -->\n<div class=\"modal-backdrop\" id=\"modal-zone\">\n  <div class=\"modal\" style=\"width:420px;padding:0;overflow:hidden;border-radius:14px;\">\n    <!-- Header -->\n    <div id=\"zm-header\" style=\"padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);\">\n      <div style=\"display:flex;align-items:center;gap:10px;\">\n        <span id=\"zm-dot\" style=\"width:12px;height:12px;border-radius:3px;flex-shrink:0;display:inline-block;\"><\u002Fspan>\n        <div>\n          <div id=\"zm-name\" style=\"font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;color:var(--text);\"><\u002Fdiv>\n          <div style=\"font-size:11px;color:var(--text3);margin-top:1px;\" id=\"zm-date\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <button class=\"btn btn-gh\" onclick=\"closeModal('modal-zone')\" style=\"padding:5px 10px;font-size:12px;\">✕<\u002Fbutton>\n    <\u002Fdiv>\n    <!-- Stats strip -->\n    <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border);\">\n      <div style=\"background:var(--bg2);padding:12px 16px;\">\n        <div style=\"font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:4px;\">Aujourd'hui<\u002Fdiv>\n        <div id=\"zm-stat-today\" style=\"font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;color:var(--green);\">0<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:var(--bg2);padding:12px 16px;\">\n        <div style=\"font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:4px;\">En attente<\u002Fdiv>\n        <div id=\"zm-stat-pending\" style=\"font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;color:var(--amber);\">0<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:var(--bg2);padding:12px 16px;\">\n        <div style=\"font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:4px;\">Cette semaine<\u002Fdiv>\n        <div id=\"zm-stat-week\" style=\"font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;color:var(--blue);\">0<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- Delivery list -->\n    <div style=\"padding:16px 20px;max-height:280px;overflow-y:auto;\">\n      <div style=\"font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:10px;\">Horaire du jour<\u002Fdiv>\n      <div id=\"zm-list\"><\u002Fdiv>\n    <\u002Fdiv>\n    <!-- Footer -->\n    <div style=\"padding:14px 20px;border-top:1px solid var(--border);\">\n      <button id=\"zm-book-btn\" class=\"submit-btn\" style=\"font-size:13px;padding:10px;\" onclick=\"bookForZone()\">+ Réserver une livraison pour cette zone<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ZONE COLOR MODAL -->\n<div class=\"modal-backdrop\" id=\"modal-zone-color\" onclick=\"if(event.target===this)closeModal('modal-zone-color')\">\n  <div class=\"modal zone-color-modal\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;\">\n      <h2 style=\"margin:0;\">Choisir la couleur<\u002Fh2>\n      <button class=\"btn btn-gh\" onclick=\"closeModal('modal-zone-color')\" style=\"padding:5px 10px;font-size:12px;\">✕<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"zone-color-preview\">\n      <span id=\"zone-color-preview-dot\" class=\"zone-color-preview-dot\"><\u002Fspan>\n      <span id=\"zone-color-preview-name\" class=\"zone-color-preview-name\"><\u002Fspan>\n    <\u002Fdiv>\n    <div id=\"zone-color-grid\" class=\"zone-color-grid\"><\u002Fdiv>\n    <div class=\"zone-color-custom\">\n      <label for=\"zone-color-custom-input\">Couleur personnalisée<\u002Flabel>\n      <input type=\"color\" id=\"zone-color-custom-input\" onchange=\"selectZoneColor(this.value)\">\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- USER AUTH MODAL (signup / login for subcontractors) -->\n<div class=\"modal-backdrop\" id=\"modal-user-auth\">\n  <div class=\"modal\" style=\"width:380px;\">\n    <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:6px;\">\n      <div class=\"logo-icon\"><svg viewBox=\"0 0 24 24\" fill=\"white\" width=\"16\" height=\"16\"><path d=\"M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2\"><\u002Fpath><circle cx=\"12\" cy=\"7\" r=\"4\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n      <h2 style=\"margin:0;\" id=\"auth-modal-title\">Connexion sous-traitant<\u002Fh2>\n    <\u002Fdiv>\n    <p style=\"font-size:12px;color:var(--text2);margin-bottom:20px;\" id=\"auth-modal-sub\">Connectez-vous pour soumettre et suivre vos livraisons.<\u002Fp>\n    <div id=\"auth-name-field\" style=\"display:none;\" class=\"mf\">\n      <label>Compagnie / Votre nom <span class=\"req\">*<\u002Fspan><\u002Flabel>\n      <input type=\"text\" id=\"auth-name\" placeholder=\"e.g. Montoni Group\">\n    <\u002Fdiv>\n    <div class=\"mf\" style=\"margin-bottom:11px;\"><label>Courriel <span class=\"req\">*<\u002Fspan><\u002Flabel><input type=\"email\" id=\"auth-email\" placeholder=\"vous@entreprise.com\"><\u002Fdiv>\n    <div class=\"mf\" style=\"margin-bottom:6px;\"><label>Mot de passe <span class=\"req\">*<\u002Fspan><\u002Flabel><input type=\"password\" id=\"auth-pass\" placeholder=\"Mot de passe\" onkeydown=\"if(event.key==='Enter')submitUserAuth()\"><\u002Fdiv>\n    <div class=\"modal-err\" id=\"auth-err\" style=\"margin-bottom:8px;\"><\u002Fdiv>\n    <div class=\"m-actions\" style=\"margin-top:14px;flex-direction:column;gap:8px;\">\n      <button class=\"btn btn-ac\" style=\"width:100%;padding:11px;\" onclick=\"submitUserAuth()\" id=\"auth-submit-btn\">Se connecter<\u002Fbutton>\n      <button class=\"btn btn-gh\" style=\"width:100%;font-size:12px;\" onclick=\"toggleAuthMode()\" id=\"auth-toggle-btn\">Pas de compte&nbsp;? S’inscrire<\u002Fbutton>\n      <button class=\"btn btn-gh\" style=\"width:100%;font-size:12px;display:none;\" onclick=\"sendPasswordReset()\" id=\"auth-reset-btn\">Mot de passe oublié?<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"text-align:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);\">\n      <button onclick=\"closeModal('modal-user-auth')\" style=\"background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer;\">Annuler<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- MY DELIVERIES MODAL -->\n<div class=\"modal-backdrop\" id=\"modal-my-deliveries\">\n  <div class=\"modal\" style=\"width:500px;max-height:80vh;display:flex;flex-direction:column;\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;\">\n      <h2 style=\"margin:0;\">Mes livraisons<\u002Fh2>\n      <button class=\"btn btn-gh\" onclick=\"closeModal('modal-my-deliveries')\" style=\"padding:5px 10px;\">✕<\u002Fbutton>\n    <\u002Fdiv>\n    <div id=\"my-del-list\" style=\"overflow-y:auto;flex:1;\"><\u002Fdiv>\n    <div style=\"margin-top:14px;padding-top:14px;border-top:1px solid var(--border);display:flex;gap:8px;\">\n      <button class=\"btn btn-gh\" style=\"flex:1;\" onclick=\"doLogout();closeModal('modal-my-deliveries');\">Se déconnecter<\u002Fbutton>\n      <button class=\"btn btn-ac\" style=\"flex:1;\" onclick=\"closeModal('modal-my-deliveries');\">+ Nouvelle livraison<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ADMIN LOGIN MODAL -->\n<div class=\"modal-backdrop\" id=\"modal-login\">\n  <div class=\"modal\" style=\"width:320px;\">\n    <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:18px;\">\n      <div class=\"logo-icon\"><svg viewBox=\"0 0 24 24\" fill=\"white\" width=\"16\" height=\"16\"><path d=\"M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <h2 style=\"margin:0;\">Connexion administrateur<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"mf\" style=\"margin-bottom:11px;\"><label>Nom d’utilisateur<\u002Flabel><input type=\"text\" id=\"ali-user\" placeholder=\"Nom d’utilisateur\"><\u002Fdiv>\n    <div class=\"mf\"><label>Mot de passe<\u002Flabel><input type=\"password\" id=\"ali-pass\" placeholder=\"••••••••\" onkeydown=\"if(event.key==='Enter')doAdminLogin()\"><\u002Fdiv>\n    <div class=\"m-err\" id=\"ali-err\">Identifiants invalides.<\u002Fdiv>\n    <div class=\"m-actions\">\n      <button class=\"btn btn-gh\" onclick=\"closeModal('modal-login')\">Annuler<\u002Fbutton>\n      <button class=\"btn btn-ac\" onclick=\"doAdminLogin()\">Se connecter<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- DETAIL MODAL -->\n<div class=\"modal-backdrop\" id=\"modal-detail\">\n  <div class=\"modal\" id=\"modal-detail-body\"><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- EDIT DELIVERY MODAL -->\n<div class=\"modal-backdrop\" id=\"modal-edit\">\n  <div class=\"modal\">\n    <div class=\"sheet-head\">\n      <div class=\"sheet-grab\"><\u002Fdiv>\n      <div class=\"sheet-head-row\">\n        <h2>Modifier la livraison<\u002Fh2>\n        <button class=\"btn btn-gh sheet-x\" onclick=\"closeModal('modal-edit')\">✕<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <input type=\"hidden\" id=\"ed-id\">\n    <div class=\"mgrid\">\n      <div class=\"mf\"><label>Compagnie <span class=\"req\">*<\u002Fspan><\u002Flabel><input type=\"text\" id=\"ed-company\"><\u002Fdiv>\n      <div class=\"mf\"><label>Contact <span class=\"req\">*<\u002Fspan><\u002Flabel><input type=\"text\" id=\"ed-contact\"><\u002Fdiv>\n      <div class=\"mf\"><label>Téléphone<\u002Flabel><input type=\"text\" id=\"ed-phone\"><\u002Fdiv>\n      <div class=\"mf\"><label>Matériel <span class=\"req\">*<\u002Fspan><\u002Flabel><input type=\"text\" id=\"ed-material\"><\u002Fdiv>\n      <div class=\"mf\"><label>Date <span class=\"req\">*<\u002Fspan><\u002Flabel><input type=\"date\" id=\"ed-date\"><\u002Fdiv>\n      <div class=\"mf\"><label>Camion<\u002Flabel>\n        <select id=\"ed-truck\"><option value=\"\">Sélectionner…<\u002Foption><option>Pickup / Fourgonnette<\u002Foption><option>Essieu simple (20 pi)<\u002Foption><option>Tandem (30 pi)<\u002Foption><option>Semi-remorque (53 pi)<\u002Foption><option>Plateau<\u002Foption><option>Camion-grue<\u002Foption><\u002Fselect>\n      <\u002Fdiv>\n      <div class=\"mf\"><label>Heure de début <span class=\"req\">*<\u002Fspan><\u002Flabel><select id=\"ed-start\" onchange=\"edStartChange()\"><option value=\"\">Select…<\u002Foption><\u002Fselect><\u002Fdiv>\n      <div class=\"mf\"><label>Heure de fin <span class=\"req\">*<\u002Fspan><\u002Flabel><select id=\"ed-end\"><option value=\"\">Select…<\u002Foption><\u002Fselect><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"mf\" style=\"margin-bottom:12px;\"><label>Zone <span class=\"req\">*<\u002Fspan><\u002Flabel><div class=\"zpick-grid\" id=\"ed-zone-grid\" style=\"margin-top:6px;\"><\u002Fdiv><\u002Fdiv>\n    <div class=\"mf\"><label>Notes<\u002Flabel><textarea id=\"ed-notes\"><\u002Ftextarea><\u002Fdiv>\n    <div class=\"m-actions\">\n      <button class=\"btn btn-gh\" onclick=\"closeModal('modal-edit')\">Annuler<\u002Fbutton>\n      <button class=\"btn btn-ac\" onclick=\"saveEdit()\">Enregistrer<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n\n\n<!-- RESCHEDULE MODAL -->\n<div class=\"modal-backdrop\" id=\"modal-reschedule\">\n  <div class=\"modal res-modal\">\n    <div class=\"rs-head\">\n      <div class=\"sheet-grab\"><\u002Fdiv>\n      <div class=\"rs-title-wrap\">\n        <h2>Déplacer la livraison<\u002Fh2>\n        <div class=\"rs-sub\">Déplacement rapide depuis le calendrier. Ajustez la zone si nécessaire, puis confirmez.<\u002Fdiv>\n      <\u002Fdiv>\n      <button class=\"btn btn-gh sheet-x\" onclick=\"closeModal('modal-reschedule')\" style=\"flex-shrink:0;\">✕<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"mgrid rs-grid\">\n      <div class=\"mf\" style=\"grid-column:1/-1;\"><label>Compagnie<\u002Flabel><input type=\"text\" id=\"rs-company\" class=\"rs-readonly\" readonly=\"\"><\u002Fdiv>\n      <div class=\"mf\"><label>Nouvelle date<\u002Flabel><input type=\"text\" id=\"rs-date\" class=\"rs-readonly\" readonly=\"\"><\u002Fdiv>\n      <div class=\"mf\"><label>Zone<\u002Flabel><select id=\"rs-zone\" onchange=\"updateReschedulePreview()\"><\u002Fselect><\u002Fdiv>\n      <div class=\"mf\"><label>Début<\u002Flabel><input type=\"text\" id=\"rs-start\" class=\"rs-readonly\" readonly=\"\"><\u002Fdiv>\n      <div class=\"mf\"><label>Fin<\u002Flabel><input type=\"text\" id=\"rs-end\" class=\"rs-readonly\" readonly=\"\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div id=\"rs-summary\" class=\"rs-summary\"><\u002Fdiv>\n    <div class=\"m-err\" id=\"rs-err\" style=\"margin-bottom:8px;\"><\u002Fdiv>\n    <div class=\"m-actions\">\n      <button class=\"btn btn-gh\" onclick=\"closeModal('modal-reschedule')\">Annuler<\u002Fbutton>\n      <button class=\"btn btn-ac\" id=\"rs-save-btn\" onclick=\"commitDraggedReschedule()\">Confirmer<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- INFO MODAL -->\n<div class=\"modal-backdrop\" id=\"modal-info\">\n  <div class=\"modal\">\n    <h2>Informations du projet<\u002Fh2>\n    <div class=\"mgrid\">\n      <div class=\"mf\"><label>Nom affiché dans l'en-tête<\u002Flabel><input type=\"text\" id=\"mi-appname\" placeholder=\"ex. SiteDelivery\"><\u002Fdiv>\n      <div class=\"mf\" style=\"grid-column:1/-1;\">\n        <label style=\"display:flex;align-items:center;gap:10px;cursor:pointer;\" onclick=\"toggleAutoApprove()\">\n          <div id=\"auto-approve-toggle\" style=\"width:40px;height:22px;border-radius:11px;background:var(--green);position:relative;flex-shrink:0;transition:background .2s;\">\n            <div id=\"auto-approve-knob\" style=\"position:absolute;top:3px;left:21px;width:16px;height:16px;border-radius:50%;background:white;transition:left .2s;\"><\u002Fdiv>\n          <\u002Fdiv>\n          <span>Approbation automatique des livraisons<\u002Fspan>\n        <\u002Flabel>\n        <div style=\"font-size:11px;color:var(--text3);margin-top:4px;\" id=\"auto-approve-desc\">Activé — les livraisons sont approuvées immédiatement<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mf\"><label>Nom du projet<\u002Flabel><input type=\"text\" id=\"mi-name\"><\u002Fdiv>\n      <div class=\"mf\"><label>Adresse<\u002Flabel><input type=\"text\" id=\"mi-addr\"><\u002Fdiv>\n      <div class=\"mf\"><label>Heures de livraison<\u002Flabel><input type=\"text\" id=\"mi-hours\"><\u002Fdiv>\n      <div class=\"mf\"><label>Contact livraison<\u002Flabel><input type=\"text\" id=\"mi-contact\"><\u002Fdiv>\n      <div class=\"mf\"><label>Orientation sécurité<\u002Flabel><input type=\"text\" id=\"mi-safety\"><\u002Fdiv>\n      <div class=\"mf\"><label>Réunion de coordination<\u002Flabel><input type=\"text\" id=\"mi-coord\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"mf\"><label>Notes<\u002Flabel><textarea id=\"mi-notes\"><\u002Ftextarea><\u002Fdiv>\n    <div class=\"m-actions\">\n      <button class=\"btn btn-gh\" onclick=\"closeModal('modal-info')\">Annuler<\u002Fbutton>\n      <button class=\"btn btn-ac\" onclick=\"saveInfo()\">Save<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n// ── CONSTANTS ─────────────────────────────────────────────\nconst ACCOUNTS = { admin: { pass: 'admin123', role: 'admin', name: 'Surintendant' } };\nconst ZONE_COLORS = ['#4A8FD4','#4CAF7D','#E8622A','#A855F7','#E8A02A','#E05555','#0EA5E9','#6B7280'];\nconst ZONE_COLOR_PALETTE = ['#4A8FD4','#4CAF7D','#E8622A','#A855F7','#E8A02A','#E05555','#0EA5E9','#6B7280','#5DCAA5','#C9A96E','#F97316','#EF4444','#10B981','#3B82F6','#8B5CF6','#111827'];\nconst TIME_SLOTS = [];\nfor (let h=6; h<=18; h++) { TIME_SLOTS.push(String(h).padStart(2,'0')+':00'); if(h<18) TIME_SLOTS.push(String(h).padStart(2,'0')+':30'); }\n\n// ── EMAILJS NOTIFICATIONS ─────────────────────────────────\nfunction isValidEmail(value){\n  return /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(String(value || '').trim());\n}\nfunction deliveryZoneName(d){\n  return zones.find(z => z.id === d.zone)?.name || d.zone || 'Non précisée';\n}\nfunction deliveryTimeLabel(d){\n  const start = d.timeStart || d.time || '';\n  const end = d.timeEnd || '';\n  return end ? start + ' – ' + end : start;\n}\nfunction deliveryEmailText(type){\n  if(type === 'approved') return {\n    subject: 'Livraison confirmée',\n    message: 'Votre livraison a été confirmée.'\n  };\n  if(type === 'modified') return {\n    subject: 'Livraison modifiée',\n    message: 'Votre livraison a été modifiée. Voici les informations mises à jour.'\n  };\n  if(type === 'cancelled') return {\n    subject: 'Livraison annulée',\n    message: 'Votre livraison a été annulée.'\n  };\n  return { subject: 'Mise à jour de livraison', message: 'Une mise à jour a été apportée à votre livraison.' };\n}\nasync function sendDeliveryEmail(d, type){\n  try{\n    if(!d || !d.userEmail || !isValidEmail(d.userEmail)) return;\n    if(!window.emailjs){ console.warn('EmailJS is not loaded.'); return; }\n    const txt = deliveryEmailText(type);\n    await emailjs.send(window.EMAILJS_SERVICE_ID, window.EMAILJS_TEMPLATE_ID, {\n      to_email: d.userEmail,\n      subject: txt.subject + ' — ' + (d.company || 'Livraison'),\n      message: txt.message,\n      company: d.company || 'Non précisée',\n      delivery_date: d.date ? fmtDate(d.date) : 'Non précisée',\n      delivery_time: deliveryTimeLabel(d) || 'Non précisée',\n      zone: deliveryZoneName(d),\n      truck_type: d.truck || 'Non précisé'\n    });\n  }catch(err){\n    console.warn('Email notification failed:', err);\n  }\n}\n\n// ── STATE ─────────────────────────────────────────────────\nlet currentUser   = { role:'guest' }; // role: 'guest' | 'user' | 'admin'\nlet editingZoneColorId = null;\nlet firebaseUser  = null;  // Firebase Auth user object\nlet deliveries    = [];\nlet zones         = [\n  {id:'z1',name:'Zone A',color:'#4A8FD4',x:40, y:40, w:160,h:100,visible:true},\n  {id:'z2',name:'Zone B',color:'#4CAF7D',x:220,y:40, w:160,h:100,visible:true},\n  {id:'z3',name:'Zone C',color:'#E8622A',x:40, y:160,w:160,h:100,visible:true},\n  {id:'z4',name:'Zone D',color:'#A855F7',x:220,y:160,w:160,h:100,visible:true},\n];\nlet projectInfo   = {\n  name:'My Construction Site',addr:'123 Site Address, Montréal, QC',\n  hours:'7:00 AM – 4:00 PM',contact:'514-555-0000',\n  safety:'Mondays @ 9:30 AM',coord:'Tuesdays @ 10:00 AM',notes:'',\n  appname:'SiteDelivery',\n  autoApprove:true\n};\nlet mapImg        = null;\nlet subcontractors = []; // list of company names for dropdown\n\nconst MOBILE_BOOKING_PREF_KEY = 'hbml_mobile_booking_prefs_v1';\nconst PROJECT_INFO_PREF_KEY = 'hbml_project_info_v1';\nconst ZONES_PREF_KEY = 'hbml_zones_v1';\nconst ICON_MARKERS_PREF_KEY = 'hbml_icon_markers_v1';\nconst SUBCONTRACTORS_PREF_KEY = 'hbml_subcontractors_v1';\nlet mobZoneFiltersExpanded = false;\n\nfunction loadMobileBookingPrefs(){\n  try{\n    return JSON.parse(localStorage.getItem(MOBILE_BOOKING_PREF_KEY) || '{}') || {};\n  }catch(_){\n    return {};\n  }\n}\nfunction saveMobileBookingPrefs(prefs){\n  try{\n    localStorage.setItem(MOBILE_BOOKING_PREF_KEY, JSON.stringify({\n      company: prefs.company || '',\n      contact: prefs.contact || '',\n      phone: prefs.phone || '',\n      truck: prefs.truck || ''\n    }));\n  }catch(_){}\n}\n\nfunction loadLocalZones(){\n  try{\n    const saved = JSON.parse(localStorage.getItem(ZONES_PREF_KEY) || 'null');\n    if(Array.isArray(saved)) return saved;\n    if(saved && Array.isArray(saved.zones)) return saved.zones;\n  }catch(_){}\n  return null;\n}\nfunction saveLocalZones(){\n  try{\n    localStorage.setItem(ZONES_PREF_KEY, JSON.stringify({\n      updatedAt: Date.now(),\n      zones\n    }));\n  }catch(_){}\n}\nasync function saveZonesConfig(){\n  // Save locally first so add/delete/rename survives an immediate refresh,\n  // even if Firebase is unavailable or the remote write is delayed.\n  saveLocalZones();\n  if(window._db){\n    await fbSaveConfig('zones', zones);\n  }\n}\n\nfunction loadLocalIconMarkers(){\n  try{\n    const saved = JSON.parse(localStorage.getItem(ICON_MARKERS_PREF_KEY) || 'null');\n    if(Array.isArray(saved)) return saved;\n    if(saved && Array.isArray(saved.iconMarkers)) return saved.iconMarkers;\n  }catch(_){}\n  return null;\n}\nfunction saveLocalIconMarkers(){\n  try{\n    localStorage.setItem(ICON_MARKERS_PREF_KEY, JSON.stringify({\n      updatedAt: Date.now(),\n      iconMarkers\n    }));\n  }catch(_){}\n}\nasync function saveIconMarkersConfig(){\n  // Save locally first so add/delete/move/resize survives an immediate refresh,\n  // even if Firebase is unavailable or the remote write is delayed.\n  saveLocalIconMarkers();\n  if(window._db){\n    await fbSaveConfig('iconMarkers', iconMarkers);\n  }\n}\n\nfunction loadLocalSubcontractors(){\n  try{\n    const saved = JSON.parse(localStorage.getItem(SUBCONTRACTORS_PREF_KEY) || 'null');\n    if(Array.isArray(saved)) return saved;\n    if(saved && Array.isArray(saved.subcontractors)) return saved.subcontractors;\n  }catch(_){}\n  return null;\n}\nfunction saveLocalSubcontractors(){\n  try{\n    localStorage.setItem(SUBCONTRACTORS_PREF_KEY, JSON.stringify({\n      updatedAt: Date.now(),\n      subcontractors\n    }));\n  }catch(_){}\n}\nasync function saveSubcontractorsConfig(){\n  // Save locally first so new companies survive an immediate refresh,\n  // even if Firebase is unavailable or the remote write is delayed.\n  saveLocalSubcontractors();\n  renderCompanyDropdowns();\n  if(window._db){\n    await fbSaveConfig('subcontractors', subcontractors);\n  }\n}\nfunction renderCompanyDropdowns(){\n  const options = '<option value=\"\">Sélectionner la compagnie…<\u002Foption>'\n    + subcontractors.map(c => '<option value=\"'+String(c).replace(/\"/g,'&quot;')+'\">'+String(c).replace(/<\u002Fg,'&lt;').replace(/>/g,'&gt;')+'<\u002Foption>').join('');\n  ['b-company','qb-company'].forEach(id=>{\n    const sel = g(id);\n    if(!sel) return;\n    const prev = sel.value;\n    sel.innerHTML = options;\n    if(prev && subcontractors.includes(prev)) sel.value = prev;\n  });\n}\n\nfunction loadLocalProjectInfo(){\n  try{\n    return JSON.parse(localStorage.getItem(PROJECT_INFO_PREF_KEY) || '{}') || {};\n  }catch(_){\n    return {};\n  }\n}\nfunction saveLocalProjectInfo(){\n  try{\n    localStorage.setItem(PROJECT_INFO_PREF_KEY, JSON.stringify(projectInfo));\n  }catch(_){}\n}\nasync function saveProjectInfoConfig(){\n  // Save locally immediately so refresh always keeps the selected setting.\n  saveLocalProjectInfo();\n\n  const nameEl = g('app-name');\n  if(nameEl) nameEl.textContent = projectInfo.appname || 'SiteDelivery';\n  updateAutoApproveUI();\n\n  // Then sync to Firebase when available.\n  if(window._db){\n    await fbSaveConfig('projectInfo', projectInfo);\n  }\n}\n\nfunction ensureQuickBookCompanyOption(value){\n  const sel = g('qb-company');\n  if(!sel || !value) return;\n  const exists = Array.from(sel.options).some(o => o.value === value);\n  if(!exists){\n    const opt = document.createElement('option');\n    opt.value = value;\n    opt.textContent = value;\n    sel.appendChild(opt);\n  }\n}\nfunction applyQuickBookPrefs(){\n  const prefs = loadMobileBookingPrefs();\n  if(!prefs || (!prefs.company && !prefs.contact && !prefs.phone && !prefs.truck)) return;\n  if(prefs.company){\n    ensureQuickBookCompanyOption(prefs.company);\n    if(!g('qb-company').value) g('qb-company').value = prefs.company;\n  }\n  if(prefs.contact && !g('qb-contact').value) g('qb-contact').value = prefs.contact;\n  if(prefs.phone && !g('qb-phone').value) g('qb-phone').value = prefs.phone;\n  if(prefs.truck && !g('qb-truck').value) g('qb-truck').value = prefs.truck;\n}\nfunction setQbOptionalCollapsed(collapsed){\n  const wrap = g('qb-optional-wrap');\n  const btn = g('qb-optional-toggle');\n  if(!wrap || !btn) return;\n  wrap.classList.toggle('collapsed', !!collapsed);\n  btn.classList.toggle('expanded', !collapsed);\n}\nfunction toggleQbOptional(){\n  const wrap = g('qb-optional-wrap');\n  if(!wrap) return;\n  setQbOptionalCollapsed(!wrap.classList.contains('collapsed'));\n}\nfunction ensureMobileZoneFilterDefault(){\n  if(window.innerWidth > 768 || !zones.length) return;\n  if(!selZone || !zones.some(z => z.id === selZone)) selZone = zones[0].id;\n}\nfunction toggleMobileZoneFilters(forceExpanded){\n  mobZoneFiltersExpanded = typeof forceExpanded === 'boolean' ? forceExpanded : !mobZoneFiltersExpanded;\n  renderZoneFilters();\n}\n\nlet iconMarkers    = []; // standalone map icons\nlet blackoutDates  = []; // [{id, zoneId, dateFrom, dateTo, reason}]\nlet siteSchedule  = {\n  Mon: { open: '06:00', close: '18:00', closed: false },\n  Tue: { open: '06:00', close: '18:00', closed: false },\n  Wed: { open: '06:00', close: '18:00', closed: false },\n  Thu: { open: '06:00', close: '18:00', closed: false },\n  Fri: { open: '06:00', close: '18:00', closed: false },\n  Sat: { open: '06:00', close: '12:00', closed: true  },\n  Sun: { open: '06:00', close: '12:00', closed: true  },\n};\nlet notifications = [];\nlet siteNotices   = [];\nlet editingSiteNoticeId = null;\nlet weekStart     = getMonday(todayDateObj());\nlet pendingReschedule = null;\nlet activeBookingTemplate = null;\nlet _calendarDrag = { active:false, ghost:null, hoveredCol:null, hoveredSlotEl:null, hoveredTimeEl:null, tooltip:null, deliveryId:null, durationSlots:1 };\nlet _suppressCalendarClickUntil = 0;\nlet activeZF      = new Set();\nlet selZone       = null;\nlet zonesLocked   = true;\nlet iconsLocked   = true; // zones are locked by default; admin can unlock to reposition\nlet _unsubDeliveries = null; // Firestore real-time listener handle\nlet _unsubSubcontractors = null; // Firestore real-time listener (config/subcontractors)\nlet _unsubConfigDocs = []; // Firestore real-time listeners (config/zones, iconMarkers, projectInfo)\n\n// ── PERSISTENCE (Firestore) ───────────────────────────────\n// Deliveries: each delivery = one Firestore document (id = delivery.id)\n// Config: zones, projectInfo, notifications stored as single docs in 'config' collection\n\nasync function fbSaveDelivery(d){\n  if(!window._db)return;\n  try{ await window._setDoc(window._doc('deliveries',d.id), d); }catch(e){console.error('fbSaveDelivery',e);}\n}\nasync function fbDeleteDelivery(id){\n  if(!window._db)return;\n  try{ await window._delDoc(window._doc('deliveries',id)); }catch(e){console.error('fbDeleteDelivery',e);}\n}\nasync function fbSaveConfig(key, value){\n  if(!window._db)return;\n  try{ await window._setDoc(window._doc('config',key), {data: JSON.stringify(value)}); }\n  catch(e){\n    console.error('fbSaveConfig',e);\n    if(e && e.code==='permission-denied' && !window._permWarned){\n      window._permWarned = true;\n      alert('Écriture refusée par Firebase (permission-denied) — la modification ne sera pas enregistrée.\\n\\nVérifiez les règles Firestore : la collection « config » doit autoriser l\\'écriture.');\n    }\n  }\n}\nasync function fbLoadConfig(key, fallback){\n  if(!window._db)return fallback;\n  try{\n    const snap = await window._getDoc(window._doc('config',key));\n    if(snap.exists()) return JSON.parse(snap.data().data);\n  }catch(e){console.error('fbLoadConfig',e);}\n  return fallback;\n}\n\n// save() now writes to Firestore. Deliveries are individually saved.\n// For bulk ops (decide, edit, cancel etc.) we call save() which syncs all changed deliveries.\n// The real-time listener keeps the local array in sync automatically.\nasync function save(){\n  // Write all deliveries to Firestore (upsert each one)\n  if(window._db){\n    for(const d of deliveries){\n      await fbSaveDelivery(d);\n    }\n    await saveZonesConfig();\n    saveLocalProjectInfo();\n    await fbSaveConfig('projectInfo', projectInfo);\n    await fbSaveConfig('notifications', notifications);\n    await saveSubcontractorsConfig();\n    await fbSaveConfig('siteNotices', siteNotices);\n    if(mapImg){ await fbSaveConfig('mapImg', mapImg); }\n  }\n  updateBadges();\n}\n\n// Faster single-delivery save (used after decide/edit/cancel)\nasync function saveDelivery(d){\n  if(window._db) await fbSaveDelivery(d);\n  updateBadges();\n}\nasync function removeDelivery(id){\n  deliveries = deliveries.filter(x=>x.id!==id);\n  if(window._db) await fbDeleteDelivery(id);\n  updateBadges();\n}\n\nfunction notif(msg,type){\n  notifications.unshift({msg,type,time:new Date().toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'})});\n  if(notifications.length>40)notifications.pop();\n  fbSaveConfig('notifications', notifications).catch(()=>{});\n}\n\n// Subscribe to real-time delivery updates\nfunction subscribeDeliveries(){\n  if(!window._db)return;\n  if(_unsubDeliveries) _unsubDeliveries();\n  _unsubDeliveries = window._onSnapshot(\n    window._col('deliveries'),\n    (snapshot) => {\n      deliveries = snapshot.docs.map(d => d.data());\n      deliveries.sort((a,b)=> new Date(b.submittedAt||0)-new Date(a.submittedAt||0));\n      updateBadges();\n      // Re-render whichever view is active\n      const activeView = document.querySelector('.view.active');\n      if(activeView){\n        const v = activeView.id.replace('view-','');\n        if(v==='deliveries') renderWeekCalendar();\n        if(v==='admin')      renderAdmin();\n        if(v==='approvals')  renderApprovals();\n        if(v==='home')       { renderHome(); renderTodayDeliveries(); }\n        if(v==='analytics')  renderAnalytics();\n      }\n    },\n    (err) => console.error('Firestore listener error:', err)\n  );\n}\n\n// Subscribe to real-time subcontractor list updates (config/subcontractors)\nfunction subscribeSubcontractors(){\n  if(!window._db) return;\n  if(_unsubSubcontractors) _unsubSubcontractors();\n  _unsubSubcontractors = window._onSnapshot(\n    window._doc('config','subcontractors'),\n    (snap) => {\n      if(!snap.exists()) return;\n      let remote;\n      try{ remote = JSON.parse(snap.data().data); }catch(_){ return; }\n      if(!Array.isArray(remote)) return;\n      const changed = remote.length !== subcontractors.length || remote.some((c,i)=>c!==subcontractors[i]);\n      if(!changed) return;\n      subcontractors = remote;\n      saveLocalSubcontractors();\n      renderCompanyDropdowns();\n      renderSubList();\n      if(g('view-admin')?.classList.contains('active')) renderAdminKPIs();\n    },\n    (err) => console.error('Firestore subcontractors listener error:', err)\n  );\n}\n\n// Subscribe to real-time config updates (zones, icon markers, project settings)\n// so edits made on one device propagate live to all others — same pattern as\n// subscribeSubcontractors. Local echoes of our own writes are skipped.\nfunction subscribeConfigDocs(){\n  if(!window._db) return;\n  _unsubConfigDocs.forEach(u=>{ try{u();}catch(_){} });\n  _unsubConfigDocs = [];\n  const watch = (key, apply) => {\n    _unsubConfigDocs.push(window._onSnapshot(\n      window._doc('config', key),\n      (snap) => {\n        if(!snap.exists()) return;\n        if(snap.metadata && snap.metadata.hasPendingWrites) return; // own write echo\n        let remote;\n        try{ remote = JSON.parse(snap.data().data); }catch(_){ return; }\n        apply(remote);\n      },\n      (err) => console.error('Firestore config listener error ('+key+'):', err)\n    ));\n  };\n  watch('zones', (remote) => {\n    if(!Array.isArray(remote) || !remote.length) return;\n    if(JSON.stringify(remote) === JSON.stringify(zones)) return;\n    zones = remote;\n    saveLocalZones();\n    if(g('view-home')?.classList.contains('active')) renderHome();\n    if(g('view-admin')?.classList.contains('active')) renderAdmin();\n    if(g('view-deliveries')?.classList.contains('active')) renderWeekCalendar();\n  });\n  watch('iconMarkers', (remote) => {\n    if(!Array.isArray(remote)) return;\n    if(JSON.stringify(remote) === JSON.stringify(iconMarkers)) return;\n    iconMarkers = remote;\n    saveLocalIconMarkers();\n    renderIconMarkers();\n    if(g('view-admin')?.classList.contains('active')) renderImList();\n  });\n  watch('projectInfo', (remote) => {\n    if(!remote || typeof remote !== 'object' || Array.isArray(remote)) return;\n    const merged = {...projectInfo, ...remote};\n    if(JSON.stringify(merged) === JSON.stringify(projectInfo)) return;\n    projectInfo = merged;\n    saveLocalProjectInfo();\n    const an=g('app-name'); if(an) an.textContent = projectInfo.appname || 'SiteDelivery';\n    updateAutoApproveUI();\n    if(g('view-home')?.classList.contains('active')) renderHome();\n  });\n}\n\n// ── UTILS ─────────────────────────────────────────────────\nfunction today(){ const d=new Date(); return dk(d); }\nfunction dk(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }\nfunction todayDateObj(){ return new Date(today()+'T12:00:00'); }\nfunction getMonday(d){ const dt=new Date(d),day=dt.getDay(); dt.setDate(dt.getDate()-(day===0?6:day-1)); dt.setHours(0,0,0,0); return dt; }\nfunction addDays(d,n){ const dt=new Date(d); dt.setDate(dt.getDate()+n); return dt; }\nfunction fmtDate(s){ if(!s)return''; return new Date(s+'T12:00:00').toLocaleDateString('fr-CA',{weekday:'short',month:'short',day:'numeric'}); }\nfunction overlap(s1,e1,s2,e2){ return s1<e2&&e1>s2; }\nfunction isAdmin(){ return currentUser.role==='admin'; }\nfunction g(id){ return document.getElementById(id); }\nfunction escapeHtml(s){ return String(s??'').replace(/&/g,'&amp;').replace(/<\u002Fg,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;'); }\nfunction statusFr(s){ return s==='approved'?'approuvée':s==='pending'?'en attente':s==='rejected'?'rejetée':s==='cancelled'?'annulée':s; }\n\n\nfunction noticeSeverityRank(sev){ return sev==='urgent' ? 3 : sev==='warning' ? 2 : 1; }\nfunction noticeSeverityLabel(sev){ return sev==='urgent' ? 'Urgent' : sev==='warning' ? 'Avertissement' : 'Info'; }\nfunction noticeIconSVG(sev){\n  if(sev==='urgent') return '<svg viewBox=\"0 0 24 24\"><path d=\"M12 9v4\"/><path d=\"M12 17h.01\"/><path d=\"M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z\"/><\u002Fsvg>';\n  if(sev==='warning') return '<svg viewBox=\"0 0 24 24\"><path d=\"M12 9v4\"/><path d=\"M12 17h.01\"/><path d=\"M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z\"/><\u002Fsvg>';\n  return '<svg viewBox=\"0 0 24 24\"><circle cx=\"12\" cy=\"12\" r=\"10\"/><path d=\"M12 16v-4\"/><path d=\"M12 8h.01\"/><\u002Fsvg>';\n}\nfunction getDismissedNoticeMap(){\n  try{ return JSON.parse(localStorage.getItem('sd_notice_dismissed')||'{}'); }catch(e){ return {}; }\n}\nfunction setDismissedNoticeMap(map){\n  try{ localStorage.setItem('sd_notice_dismissed', JSON.stringify(map)); }catch(e){}\n}\nfunction isSiteNoticeActive(n, refDate){\n  if(!n || n.active===false) return false;\n  const d = refDate || today();\n  if(n.startDate && d < n.startDate) return false;\n  if(n.endDate && d > n.endDate) return false;\n  return true;\n}\nfunction getSortedActiveSiteNotices(includeDismissed=false){\n  const dismissed = getDismissedNoticeMap();\n  return siteNotices\n    .filter(n => isSiteNoticeActive(n))\n    .filter(n => includeDismissed || dismissed[n.id] !== (n.updatedAt||n.createdAt||''))\n    .sort((a,b) => {\n      const rank = noticeSeverityRank(b.severity) - noticeSeverityRank(a.severity);\n      if(rank !== 0) return rank;\n      return new Date(b.updatedAt||b.createdAt||0) - new Date(a.updatedAt||a.createdAt||0);\n    });\n}\nfunction formatNoticeDateRange(n){\n  if(n.startDate && n.endDate){\n    if(n.startDate===n.endDate) return 'Valide le ' + fmtDate(n.startDate);\n    return 'Valide du ' + fmtDate(n.startDate) + ' au ' + fmtDate(n.endDate);\n  }\n  if(n.startDate) return 'À partir du ' + fmtDate(n.startDate);\n  if(n.endDate) return 'Jusqu’au ' + fmtDate(n.endDate);\n  return 'Actif immédiatement';\n}\nfunction dismissActiveSiteNotice(){\n  const top = getSortedActiveSiteNotices(true)[0];\n  if(!top) return;\n  const map = getDismissedNoticeMap();\n  map[top.id] = top.updatedAt||top.createdAt||new Date().toISOString();\n  setDismissedNoticeMap(map);\n  closeMobileNoticeSheet();\n  renderSiteNoticeBanner();\n}\nfunction openMobileNoticeSheet(){\n  const modal = g('modal-mobile-notices'); if(!modal) return;\n  renderMobileNoticeSheet();\n  modal.classList.add('open');\n}\nfunction closeMobileNoticeSheet(){\n  const modal = g('modal-mobile-notices'); if(modal) modal.classList.remove('open');\n}\nfunction renderMobileNoticeSheet(){\n  const list = g('mobile-notices-list'); if(!list) return;\n  const items = getSortedActiveSiteNotices();\n  if(!items.length){\n    list.innerHTML = '<div class=\"notice-empty\">Aucun avis actif.<\u002Fdiv>';\n    return;\n  }\n  list.innerHTML = items.map(n => `\n    <div class=\"notice-sheet-item\">\n      <div class=\"notice-row-top\">\n        <span class=\"notice-tag ${(n.severity||'info')}\">${noticeSeverityLabel(n.severity||'info')}<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"notice-row-msg\">${escapeHtml(n.message||'')}<\u002Fdiv>\n      <div class=\"notice-row-meta\"><span>${formatNoticeDateRange(n)}<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  `).join('');\n}\nfunction renderSiteNoticeChip(){\n  const wrap = g('site-notice-chip-wrap');\n  const chip = g('site-notice-chip');\n  if(!wrap || !chip) return;\n  const items = getSortedActiveSiteNotices();\n  const top = items[0];\n  if(!top){\n    wrap.style.display = 'none';\n    chip.className = 'notice-chip info';\n    return;\n  }\n  const count = items.length;\n  wrap.style.display = '';\n  chip.className = 'notice-chip ' + (top.severity||'info');\n  const icon = g('site-notice-chip-icon');\n  if(icon) icon.textContent = (top.severity==='urgent' || top.severity==='warning') ? '⚠' : 'i';\n  const label = g('site-notice-chip-label');\n  if(label) label.textContent = count + ' avis actif' + (count>1?'s':'');\n}\nfunction renderSiteNoticeBanner(){\n  const el = g('site-notice-banner'); if(!el) return;\n  const top = getSortedActiveSiteNotices()[0];\n  if(!top){\n    el.className = 'notice-banner';\n    renderSiteNoticeChip();\n    renderMobileNoticeSheet();\n    return;\n  }\n  const all = getSortedActiveSiteNotices(true);\n  const countExtra = Math.max(0, all.length - 1);\n  el.className = 'notice-banner show notice-' + (top.severity||'info');\n  g('site-notice-icon').innerHTML = noticeIconSVG(top.severity||'info');\n  const tag = g('site-notice-tag');\n  tag.className = 'notice-tag ' + (top.severity||'info');\n  tag.textContent = noticeSeverityLabel(top.severity||'info');\n  g('site-notice-text').textContent = top.message||'';\n  const sub = [];\n  sub.push(formatNoticeDateRange(top));\n  if(countExtra>0) sub.push(countExtra + ' autre' + (countExtra>1?'s':'') + ' avis actif' + (countExtra>1?'s':''));\n  g('site-notice-sub').innerHTML = sub.map(s=>'<span>'+s+'<\u002Fspan>').join('');\n  renderSiteNoticeChip();\n  renderMobileNoticeSheet();\n}\nfunction clearSiteNoticeForm(){\n  editingSiteNoticeId = null;\n  const ids = ['sn-message','sn-start','sn-end'];\n  ids.forEach(id => { const el=g(id); if(el) el.value=''; });\n  const sev=g('sn-severity'); if(sev) sev.value='info';\n  const act=g('sn-active'); if(act) act.checked=true;\n}\nasync function saveSiteNotice(){\n  const msg = g('sn-message')?.value.trim() || '';\n  const severity = g('sn-severity')?.value || 'info';\n  const startDate = g('sn-start')?.value || '';\n  const endDate = g('sn-end')?.value || '';\n  const active = !!g('sn-active')?.checked;\n  if(!msg){ alert('Ajoutez un message pour l’avis de chantier.'); return; }\n  if(startDate && endDate && endDate < startDate){ alert('La date de fin doit être après la date de début.'); return; }\n  const nowIso = new Date().toISOString();\n  if(editingSiteNoticeId){\n    const n = siteNotices.find(x=>x.id===editingSiteNoticeId);\n    if(!n) return;\n    n.message = msg; n.severity = severity; n.startDate = startDate; n.endDate = endDate; n.active = active; n.updatedAt = nowIso;\n  } else {\n    siteNotices.unshift({ id:'sn'+Date.now(), message:msg, severity, startDate, endDate, active, createdAt:nowIso, updatedAt:nowIso });\n  }\n  await fbSaveConfig('siteNotices', siteNotices).catch(()=>{});\n  clearSiteNoticeForm();\n  renderSiteNoticesAdmin();\n  renderSiteNoticeBanner();\n}\nfunction editSiteNotice(id){\n  const n = siteNotices.find(x=>x.id===id); if(!n) return;\n  editingSiteNoticeId = id;\n  g('sn-message').value = n.message || '';\n  g('sn-severity').value = n.severity || 'info';\n  g('sn-start').value = n.startDate || '';\n  g('sn-end').value = n.endDate || '';\n  g('sn-active').checked = n.active !== false;\n  g('panel-notices')?.classList.remove('collapsed');\n  g('sn-message')?.scrollIntoView({behavior:'smooth', block:'center'});\n  setTimeout(()=>g('sn-message')?.focus(), 50);\n}\nasync function toggleSiteNoticeActive(id){\n  const n = siteNotices.find(x=>x.id===id); if(!n) return;\n  n.active = n.active === false;\n  n.updatedAt = new Date().toISOString();\n  await fbSaveConfig('siteNotices', siteNotices).catch(()=>{});\n  renderSiteNoticesAdmin();\n  renderSiteNoticeBanner();\n}\nasync function deleteSiteNotice(id){\n  if(!confirm('Supprimer cet avis de chantier ?')) return;\n  siteNotices = siteNotices.filter(x=>x.id!==id);\n  if(editingSiteNoticeId===id) clearSiteNoticeForm();\n  await fbSaveConfig('siteNotices', siteNotices).catch(()=>{});\n  renderSiteNoticesAdmin();\n  renderSiteNoticeBanner();\n}\nfunction renderSiteNoticesAdmin(){\n  const el = g('site-notices-list'); if(!el) return;\n  const rows = [...siteNotices].sort((a,b)=>new Date(b.updatedAt||b.createdAt||0)-new Date(a.updatedAt||a.createdAt||0));\n  if(!rows.length){ el.innerHTML = '<div class=\"notice-empty\">Aucun avis de chantier pour le moment.<\u002Fdiv>'; return; }\n  el.innerHTML = rows.map(n => {\n    const sev = n.severity || 'info';\n    const isActive = isSiteNoticeActive(n);\n    return '<div class=\"notice-row\">'\n      + '<div class=\"notice-row-main\">'\n      +   '<div class=\"notice-row-top\">'\n      +     '<span class=\"notice-tag '+sev+'\">'+noticeSeverityLabel(sev)+'<\u002Fspan>'\n      +     '<span class=\"badge '+(isActive?'b-approved':'b-cancelled')+'\">'+(n.active===false?'Inactif':(isActive?'Affiché':'Planifié / expiré'))+'<\u002Fspan>'\n      +   '<\u002Fdiv>'\n      +   '<div class=\"notice-row-msg\">'+n.message.replace(/<\u002Fg,'&lt;').replace(/>/g,'&gt;')+'<\u002Fdiv>'\n      +   '<div class=\"notice-row-meta\">'\n      +     '<span>'+formatNoticeDateRange(n)+'<\u002Fspan>'\n      +     '<span>Mis à jour: '+new Date(n.updatedAt||n.createdAt||0).toLocaleString('fr-CA')+'<\u002Fspan>'\n      +   '<\u002Fdiv>'\n      + '<\u002Fdiv>'\n      + '<div class=\"notice-row-actions\">'\n      +   '<button class=\"notice-mini-btn\" onclick=\"editSiteNotice(\\''+n.id+'\\')\">Modifier<\u002Fbutton>'\n      +   '<button class=\"notice-mini-btn '+(n.active===false?'good':'warn')+'\" onclick=\"toggleSiteNoticeActive(\\''+n.id+'\\')\">'+(n.active===false?'Activer':'Désactiver')+'<\u002Fbutton>'\n      +   '<button class=\"notice-mini-btn danger\" onclick=\"deleteSiteNotice(\\''+n.id+'\\')\">Supprimer<\u002Fbutton>'\n      + '<\u002Fdiv>'\n      + '<\u002Fdiv>';\n  }).join('');\n}\n\n// ── NAV ───────────────────────────────────────────────────\nfunction showView(v){\n  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));\n  document.querySelectorAll('.nav-btn').forEach(el=>el.classList.remove('active'));\n  const viewEl=g('view-'+v); if(viewEl) viewEl.classList.add('active');\n  const navEl=g('nav-'+v);   if(navEl)  navEl.classList.add('active');\n  // Sync mobile bottom nav\n  document.querySelectorAll('.mob-nav-item').forEach(el=>el.classList.remove('active'));\n  const mobNav=g('mob-nav-'+v); if(mobNav) mobNav.classList.add('active');\n  window.scrollTo(0,0);\n  if(viewEl) viewEl.scrollTop = 0;\n  const analyticsBody = document.querySelector('#view-analytics .analytics-body');\n  if(analyticsBody) analyticsBody.scrollTop = 0;\n  const analyticsView = g('view-analytics');\n  if(analyticsView) analyticsView.scrollTop = 0;\n  if(v==='home'){\n    renderHome();\n    // Extra deferred render to ensure canvas has fully painted\n    setTimeout(()=>{ if(mapImg){ renderMapZones(); renderIconMarkers(); } }, 150);\n  }\n  if(v==='deliveries') renderDeliveries();\n  if(v==='admin')      renderAdmin();\n  if(v==='approvals')  renderApprovals();\n  if(v==='analytics')  renderAnalytics();\n  updateMobileFab();\n  syncMobAdminTab();\n}\n\n// ── MOBILE HELPERS ────────────────────────────────────────────────────────────\nlet _mobDelTab = 'cal';\nlet _mobAdminTab = 'review';\nlet _mobCalView = 'day';\nlet _mobActiveDayIndex = -1;\n\nfunction getMobileTodayIndex(){\n  const t = todayDateObj();\n  const idx = Math.round((t - weekStart) / 86400000);\n  return (idx >= 0 && idx <= 6) ? idx : 0;\n}\nfunction syncMobDayIndex(){\n  if(window.innerWidth > 768) return;\n  if(typeof _mobActiveDayIndex !== 'number' || _mobActiveDayIndex < 0 || _mobActiveDayIndex > 6){\n    _mobActiveDayIndex = getMobileTodayIndex();\n  }\n}\nfunction updateMobCalModeUI(){\n  const switcher = g('mob-cal-mode-switch');\n  if(!switcher) return;\n  if(window.innerWidth > 768){\n    switcher.style.display = 'none';\n    return;\n  }\n  switcher.style.display = 'inline-flex';\n  g('mob-cal-mode-day')?.classList.toggle('active', _mobCalView === 'day');\n  g('mob-cal-mode-week')?.classList.toggle('active', _mobCalView === 'week');\n}\nfunction setMobCalView(view){\n  _mobCalView = (view === 'week') ? 'week' : 'day';\n  syncMobDayIndex();\n  if(_mobCalView === 'week' && _mobActiveDayIndex > 4){\n    _mobActiveDayIndex = 4;\n  }\n  updateMobCalModeUI();\n  renderWeekCalendar();\n}\nfunction updateMobileCalendarMode(){\n  if(window.innerWidth > 768){\n    updateMobCalModeUI();\n    updateTodayButtonLabel();\n    return;\n  }\n  syncMobDayIndex();\n  updateMobCalModeUI();\n  updateTodayButtonLabel();\n}\n\nfunction updateTodayButtonLabel(){\n  const btn = document.querySelector('#view-deliveries .today-btn');\n  if(!btn) return;\n  if(window.innerWidth > 768){\n    btn.textContent = \"Aujourd'hui\";\n    return;\n  }\n  const t = todayDateObj();\n  const shortDay = t.toLocaleDateString('fr-CA',{weekday:'short'});\n  btn.textContent = \"Aujourd’hui · \" + shortDay.charAt(0).toUpperCase() + shortDay.slice(1) + ' ' + t.getDate();\n}\n\nfunction updateMobileFab(){\n  const fab = g('mob-fab-book');\n  if(!fab) return;\n  if(window.innerWidth > 768){ fab.style.display = 'none'; return; }\n  const activeView = document.querySelector('.view.active')?.id;\n  const show = activeView === 'view-home' || activeView === 'view-deliveries';\n  fab.style.display = show ? 'flex' : 'none';\n}\nfunction mobOpenBooking(){\n  showView('deliveries');\n  if(window.innerWidth <= 768){\n    mobSwitchTab('cal');\n    updateMobileCalendarMode();\n    const calWrap = document.querySelector('#view-deliveries .week-grid');\n    if(calWrap) calWrap.scrollTo({top:0, behavior:'smooth'});\n  } else {\n    mobSwitchTab('form');\n    const panel = document.querySelector('.booking-panel');\n    if(panel) panel.scrollTo({top:0, behavior:'smooth'});\n    setTimeout(()=>{ g('b-company')?.focus(); }, 180);\n  }\n}\nfunction renderMobWeekChips(){\n  const wrap = g('mob-week-chips');\n  if(!wrap) return;\n  if(window.innerWidth > 768){ wrap.innerHTML=''; return; }\n  const showWorkWeekOnly = _mobCalView === 'week';\n  const dayCount = showWorkWeekOnly ? 5 : 7;\n  const days = Array.from({length:dayCount},(_,i)=>addDays(weekStart,i));\n  const labels = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];\n  syncMobDayIndex();\n  wrap.innerHTML = days.map((d,i)=>{\n    const isToday = dk(d)===today();\n    return `<button class=\"mob-week-chip ${i===_mobActiveDayIndex?'active':''} ${isToday?'today':''}\" data-day-index=\"${i}\" onclick=\"mobJumpToDay(${i})\"><span>${labels[(d.getDay()+6)%7]}<\u002Fspan><strong>${d.getDate()}<\u002Fstrong><\u002Fbutton>`;\n  }).join('');\n}\nfunction mobJumpToDay(idx){\n  _mobActiveDayIndex = idx;\n  const cols = Array.from(document.querySelectorAll('#week-grid .wg-day-col'));\n  const chips = Array.from(document.querySelectorAll('#mob-week-chips .mob-week-chip'));\n  chips.forEach((chip,i)=>chip.classList.toggle('active', i===idx));\n  if(window.innerWidth <= 768 && _mobCalView === 'day'){\n    renderWeekCalendar();\n    return;\n  }\n  if(cols[idx]) cols[idx].scrollIntoView({behavior:'smooth', inline:'start', block:'nearest'});\n}\n\nfunction mobCalendarSwipeNavigate(dir){\n  if(window.innerWidth > 768 || _mobDelTab !== 'cal') return;\n  syncMobDayIndex();\n  if(_mobCalView === 'day'){\n    let nextIdx = _mobActiveDayIndex + dir;\n    if(nextIdx < 0){\n      weekStart = addDays(weekStart, -7);\n      _mobActiveDayIndex = 6;\n    } else if(nextIdx > 6){\n      weekStart = addDays(weekStart, 7);\n      _mobActiveDayIndex = 0;\n    } else {\n      _mobActiveDayIndex = nextIdx;\n    }\n    renderWeekCalendar();\n    return;\n  }\n  changeWeek(dir);\n}\n\nfunction bindMobileCalendarSwipe(){\n  const grid = g('week-grid');\n  if(!grid || grid._mobileSwipeBound) return;\n  grid._mobileSwipeBound = true;\n\n  let startX = 0;\n  let startY = 0;\n  let startAt = 0;\n  let tracking = false;\n  let startedOnInteractive = false;\n\n  grid.addEventListener('touchstart', (e) => {\n    if(window.innerWidth > 768 || _mobDelTab !== 'cal') return;\n    const touch = e.touches && e.touches[0];\n    if(!touch) return;\n    startX = touch.clientX;\n    startY = touch.clientY;\n    startAt = Date.now();\n    tracking = true;\n    startedOnInteractive = !!e.target.closest('button,input,select,textarea,a,[role=\"button\"]');\n  }, { passive:true });\n\n  grid.addEventListener('touchend', (e) => {\n    if(!tracking){\n      return;\n    }\n    tracking = false;\n    if(window.innerWidth > 768 || _mobDelTab !== 'cal' || startedOnInteractive){\n      return;\n    }\n    const touch = (e.changedTouches && e.changedTouches[0]) || null;\n    if(!touch) return;\n\n    const dx = touch.clientX - startX;\n    const dy = touch.clientY - startY;\n    const elapsed = Date.now() - startAt;\n    const absX = Math.abs(dx);\n    const absY = Math.abs(dy);\n\n    if(elapsed > 900) return;\n    if(absX < 48) return;\n    if(absX <= absY * 1.25) return;\n\n    mobCalendarSwipeNavigate(dx < 0 ? 1 : -1);\n  }, { passive:true });\n\n  grid.addEventListener('touchcancel', () => {\n    tracking = false;\n  }, { passive:true });\n}\nfunction setMobAdminTab(tab){\n  _mobAdminTab = tab;\n  const tabs = Array.from(document.querySelectorAll('#mob-admin-tabs .mob-admin-tab'));\n  tabs.forEach(btn => btn.classList.toggle('active', btn.dataset.adminTab === tab));\n  if(window.innerWidth > 768){\n    document.querySelectorAll('#view-admin .panel').forEach(p=>p.style.display='');\n    return;\n  }\n  const groups = {\n    review:['panel-all-del','panel-cancelled'],\n    config:['panel-zones','panel-subs','panel-markers','panel-schedule'],\n    notices:['panel-notices','panel-blackout'],\n    history:['panel-notif']\n  };\n  const visible = new Set(groups[tab] || []);\n  document.querySelectorAll('#view-admin .panel').forEach(panel=>{\n    panel.style.display = visible.has(panel.id) ? '' : 'none';\n    if(visible.has(panel.id)) panel.classList.remove('collapsed');\n  });\n}\nfunction syncMobAdminTab(){\n  if(window.innerWidth > 768){\n    document.querySelectorAll('#view-admin .panel').forEach(panel=>panel.style.display='');\n    return;\n  }\n  setMobAdminTab(_mobAdminTab);\n}\n\nfunction mobSwitchTab(tab){\n  _mobDelTab = tab;\n  const form = document.querySelector('.booking-panel');\n  const cal  = document.querySelector('.cal-main');\n  const plan = g('mob-plan-panel');\n  const tc   = g('mob-tab-cal');\n  const tp   = g('mob-tab-plan');\n\n  if(window.innerWidth > 768){\n    if(form){ form.classList.remove('mob-panel-hidden'); form.style.display=''; }\n    if(cal){  cal.classList.remove('mob-panel-hidden');  cal.style.display=''; }\n    if(plan){ plan.classList.add('mob-panel-hidden');    plan.style.display='none'; }\n    if(tc) tc.classList.remove('active');\n    if(tp) tp.classList.remove('active');\n    updateMobileCalendarMode();\n    return;\n  }\n\n  if(form){ form.classList.add('mob-panel-hidden'); form.style.display='none'; }\n\n  if(tab === 'plan'){\n    if(cal){  cal.classList.add('mob-panel-hidden');  cal.style.display='none'; }\n    if(plan){ plan.classList.remove('mob-panel-hidden'); plan.style.display='block'; }\n    if(tc) tc.classList.remove('active');\n    if(tp) tp.classList.add('active');\n    renderMobilePlanPanel();\n  } else {\n    if(cal){  cal.classList.remove('mob-panel-hidden');  cal.style.display=''; }\n    if(plan){ plan.classList.add('mob-panel-hidd
