  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"fc58039e-9f5f-486b-8fb2-26d624771e61\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n/* ── MONTONI THEME — Teal Blue ── */\n:root {\n  --bg:#0F3240; --bg2:#12394A; --bg3:#164054; --surface:#1C4D62;\n  --border:rgba(240,235,224,0.08); --border2:rgba(240,235,224,0.15);\n  --text:#F0EBE0; --text2:#9FB8C2; --text3:#4A6E7A;\n  --accent:#C9A96E; --accent2:#DFC088; --accent-dim:rgba(201,169,110,0.16); --accent-bd:rgba(201,169,110,0.42);\n  --green:#7A8C6E; --green-dim:rgba(122,140,110,0.18); --green-bd:rgba(122,140,110,0.4);\n  --red:#D46060; --red-dim:rgba(212,96,96,0.15); --red-bd:rgba(212,96,96,0.35);\n  --amber:#C9A96E; --amber-dim:rgba(201,169,110,0.15); --amber-bd:rgba(201,169,110,0.35);\n  --blue:#5DCAA5; --blue-dim:rgba(93,202,165,0.15); --blue-bd:rgba(93,202,165,0.35);\n  --teal:#1A4D5C; --teal2:#1F5A6A;\n  --r:6px; --r2:10px; --mono:'JetBrains Mono',monospace;\n}\n*{box-sizing:border-box;margin:0;padding:0;}\nhtml,body{height:100%;}\nbody{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);font-size:15px;overflow:hidden;}\n#app{height:100dvh;display:flex;flex-direction:column;overflow:hidden;visibility:hidden;}\nbutton,input,select,textarea{font-family:'Barlow',sans-serif;}\n\n/* SCROLLBARS — softened to blend with theme */\n*{scrollbar-width:thin;scrollbar-color:rgba(159,184,194,0.26) transparent;}\n*::-webkit-scrollbar{width:10px;height:10px;}\n*::-webkit-scrollbar-track{background:transparent;}\n*::-webkit-scrollbar-thumb{background:rgba(159,184,194,0.18);border:2px solid transparent;background-clip:padding-box;border-radius:999px;}\n*::-webkit-scrollbar-thumb:hover{background:rgba(159,184,194,0.30);border:2px solid transparent;background-clip:padding-box;}\n*::-webkit-scrollbar-corner{background:transparent;}\n.sidebar-scroll,.analytics-body,.booking-panel,.modal,.week-grid>div:last-child{scrollbar-gutter:stable;}\n\n/* TOPBAR */\n.topbar{background:var(--bg2);border-bottom:1px solid var(--border);height:58px;display:flex;align-items:center;padding:0 22px;gap:14px;position:sticky;top:0;z-index:200;flex-shrink:0;}\n.topbar-logo{display:flex;align-items:center;gap:10px;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;letter-spacing:.05em;color:var(--text);}\n.logo-icon{width:30px;height:30px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;}\n.logo-icon svg{width:17px;height:17px;fill:white;}\n.sep{width:1px;height:24px;background:var(--border2);}\n.nav-btn{padding:8px 16px;border-radius:6px;border:none;background:transparent;font-size:16px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .14s;display:flex;align-items:center;gap:6px;}\n.nav-btn:hover{background:var(--surface);color:var(--text);}\n.nav-btn.active{background:var(--accent-dim);color:var(--accent);}\n.nav-badge{background:var(--red);color:white;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700;}\n.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}\n.role-pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-bd);}\n.tb-btn{padding:5px 13px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;transition:all .14s;}\n.tb-btn:hover{background:var(--surface);color:var(--text);}\n.tb-btn.primary{background:var(--accent);color:white;border-color:var(--accent);}\n.tb-btn.primary:hover{background:var(--accent2);}\n\n/* VIEWS */\n.view{display:none;min-height:0;}\n.view.active{display:block;flex:1;min-height:0;overflow:auto;}\n#view-home.active{display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;}\n#view-home.active > .dash-layout{flex:1;min-height:0;height:auto;}\n#view-deliveries.active,#view-admin.active{height:100%;}\n#view-admin.active{overflow:auto;}\n\n/* STAT LABELS (used by analytics / modals) */\n.stat-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:4px;}\n.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;}\n.c-amber{color:var(--amber);} .c-green{color:var(--green);} .c-blue{color:var(--blue);} .c-red{color:var(--red);}\n\n/* DASHBOARD */\n.dash-layout{display:grid;grid-template-columns:300px 1fr;min-height:0;height:100%;overflow:hidden;align-items:stretch;grid-template-rows:minmax(0,1fr);}\n.dash-sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:0;overflow:hidden;display:flex;flex-direction:column;min-height:0;}\n.proj-name{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;margin-bottom:2px;line-height:1.05;}\n.proj-addr{font-size:13px;color:var(--text3);margin-bottom:16px;}\n.clock-card{padding:12px 16px;border:1px solid var(--border);border-radius:var(--r2);background:var(--bg3);margin-bottom:18px;}\n.clk{font-family:'Barlow Condensed',sans-serif;font-size:38px;font-weight:600;line-height:1;margin-bottom:4px;}\n.clk-date{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;}\n.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;}\n.quick-btn{padding:10px 8px;border-radius:var(--r);border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;text-align:center;transition:all .14s;display:flex;flex-direction:column;align-items:center;gap:4px;}\n.quick-btn:hover{border-color:var(--accent-bd);background:var(--accent-dim);color:var(--accent);}\n.quick-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.5;}\n.quick-btn.quick-btn-primary{background:var(--accent);border-color:var(--accent);color:white;}\n.quick-btn.quick-btn-primary:hover{background:var(--accent2);border-color:var(--accent2);color:white;}\n.quick-btn.quick-btn-primary svg{stroke:white;}\n.sec-lbl{display:flex;align-items:center;gap:10px;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;margin-top:18px;}\n.sec-lbl::after{content:'';flex:1;height:1px;background:var(--border);}\n.info-row{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;border-bottom:1px solid var(--border);}\n.info-row:last-child{border-bottom:none;}\n.info-k{font-size:13px;color:var(--text2);}\n.info-v{font-size:13px;color:var(--text);text-align:right;max-width:55%;}\n.pi-row{display:grid;grid-template-columns:118px 1fr;gap:12px;align-items:baseline;padding:7px 0;border-bottom:1px solid var(--border);}\n.pi-row:last-child{border-bottom:none;}\n.pi-k{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;line-height:1.5;}\n.pi-v{font-size:13px;color:var(--text);line-height:1.45;min-width:0;overflow-wrap:break-word;}\n.zone-row{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border);}\n.zone-row:last-child{border-bottom:none;}\n.zone-row-chip{width:10px;height:10px;border-radius:3px;flex-shrink:0;}\n.zone-row-name{flex:1;min-width:0;font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}\n.zone-row-count{font-size:11px;color:var(--text3);font-variant-numeric:tabular-nums;flex-shrink:0;}\n.zone-row-count.has-count{color:var(--green);font-weight:600;}\n.edit-info-btn{display:block;width:100%;padding:7px;margin-top:10px;background:transparent;border:1px solid var(--border2);border-radius:var(--r);color:var(--text3);font-size:12px;cursor:pointer;transition:all .14s;}\n.edit-info-btn:hover{border-color:var(--accent-bd);color:var(--accent);}\n\n/* MAP */\n.map-area{position:relative;background:var(--bg3);min-height:0;overflow:hidden;margin:16px;border:1px solid var(--border);border-radius:14px;}\n.sidebar-top{padding:20px 20px 0;flex-shrink:0;}\n.sidebar-scroll{flex:1;overflow-y:auto;padding:0 20px 20px;min-height:0;}\n.map-canvas{position:relative;width:100%;height:100%;background:var(--bg3);display:flex;align-items:center;justify-content:center;overflow:hidden;}\n.map-stage{position:relative;flex-shrink:0;overflow:hidden;}\n.map-stage img.map-img{display:block;width:100%;height:100%;object-fit:cover;opacity:.85;pointer-events:none;user-select:none;}\n.map-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text3);}\n.map-placeholder svg{width:52px;height:52px;stroke:currentColor;fill:none;stroke-width:1;}\n.upload-map-btn{padding:9px 20px;background:var(--accent);color:white;border:none;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;}\n.zone-rect{position:absolute;border:2px solid;border-radius:4px;cursor:move;display:flex;align-items:center;justify-content:center;}\n.zone-lbl{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;padding:2px 7px;border-radius:3px;white-space:nowrap;text-transform:uppercase;cursor:pointer;letter-spacing:.02em;line-height:1.1;max-width:180px;overflow:hidden;text-overflow:ellipsis;}\n.zone-resize{position:absolute;bottom:-4px;right:-4px;width:12px;height:12px;border-radius:2px;cursor:se-resize;}\n.map-ctrls{position:absolute;top:12px;right:12px;display:flex;flex-direction:column;gap:8px;z-index:10;}\n.map-ctrl{padding:7px 14px;background:rgba(17,18,16,.88);border:1px solid var(--border2);border-radius:var(--r);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;transition:all .14s;}\n.map-ctrl:hover{background:var(--surface);color:var(--text);}\n.map-ctrl.ac{background:var(--accent);color:white;border-color:var(--accent);}\n.zone-legend{position:absolute;bottom:8px;left:8px;right:8px;background:rgba(17,18,16,.88);border:1px solid var(--border2);border-radius:var(--r2);padding:8px 12px;display:flex;flex-wrap:wrap;gap:6px 12px;z-index:5;}\n.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--text2);white-space:nowrap;}\n.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}\n\n/* DELIVERIES */\n.del-layout{display:grid;grid-template-columns:300px 1fr;min-height:100%;height:100%;}\n.booking-panel{background:var(--bg2);border-right:1px solid var(--border);padding:20px;overflow-y:auto;}\n.booking-panel h2{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;margin-bottom:16px;}\n.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:11px;}\n.fg label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;}\n.fg input,.fg select,.fg textarea{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:8px 11px;color:var(--text);font-size:13px;outline:none;transition:border .14s;width:100%;}\n.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent);}\n.fg textarea{resize:vertical;min-height:60px;}\n.req{color:var(--accent);}\n.zpick-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}\n.zpick{padding:8px 10px;border:1.5px solid var(--border2);border-radius:var(--r);background:var(--bg3);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .14s;text-align:left;}\n.zpick:hover{background:var(--surface);}\n.zpick.sel{background:var(--accent-dim);border-color:var(--accent-bd);color:var(--accent);}\n.zpick-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}\n.err-box{display:none;background:var(--red-dim);border:1px solid var(--red-bd);border-radius:var(--r);padding:10px 14px;margin-bottom:10px;font-size:12px;color:var(--red);line-height:1.6;}\n.submit-btn{width:100%;padding:11px;background:var(--accent);color:white;border:none;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;transition:background .14s;font-family:'Barlow Condensed',sans-serif;letter-spacing:.05em;}\n.submit-btn:hover{background:var(--accent2);}\n.req-note{font-size:11px;color:var(--text3);margin-top:6px;text-align:center;}\n.success-box{text-align:center;padding:32px 16px;}\n.success-box h3{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--green);margin-bottom:8px;}\n.success-box p{font-size:13px;color:var(--text2);line-height:1.5;}\n.success-box button{margin-top:16px;padding:8px 22px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);color:var(--text2);font-size:13px;cursor:pointer;}\n\n/* CALENDAR */\n.cal-main{display:flex;flex-direction:column;min-height:0;overflow:hidden;}\n.cal-toolbar{display:flex;align-items:center;gap:10px;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;}\n.cal-title{font-family:'Barlow Condensed',sans-serif;font-size:25px;font-weight:700;color:var(--text);}\n.cal-current-time-pill{display:inline-flex;align-items:center;gap:8px;padding:6px 11px;border-radius:999px;border:1px solid var(--border2);background:rgba(255,255,255,0.04);color:var(--text2);font-size:12px;font-weight:700;white-space:nowrap;}\n.cal-current-time-pill::before{content:'';width:7px;height:7px;border-radius:50%;background:#E5533D;box-shadow:0 0 0 3px rgba(229,83,61,0.14);flex-shrink:0;}\n.cal-current-time-pill span{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);}\n.cal-current-time-pill strong{font-family:var(--mono);font-size:13px;color:var(--text);font-weight:800;letter-spacing:.01em;}\n.cal-nav{width:28px;height:28px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-size:14px;transition:all .14s;}\n.cal-nav:hover{background:var(--surface);color:var(--text);}\n.today-btn{padding:6px 16px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;transition:all .14s;}\n.today-btn:hover{background:var(--surface);color:var(--text);}\n.zf-btn{padding:5px 13px;border-radius:20px;border:1px solid var(--border2);background:transparent;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .14s;}\n.zf-btn.zf-active{box-shadow:inset 0 0 0 1px currentColor;}\n.zf-btn.zf-aux{background:rgba(255,255,255,.03);}\n#qb-optional-toggle{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;padding:10px 12px;border-radius:12px;border:1px dashed var(--border2);background:rgba(255,255,255,.02);color:var(--text2);font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;}\n#qb-optional-toggle .qb-toggle-caret{transition:transform .16s ease;}\n#qb-optional-toggle.expanded .qb-toggle-caret{transform:rotate(180deg);}\n#qb-optional-wrap{display:grid;grid-template-columns:1fr 1fr;gap:12px;grid-column:1/-1;}\n#qb-optional-wrap.collapsed{display:none;}\n#qb-remembered-hint{display:none;font-size:11px;color:var(--text3);margin-top:-2px;}\n\n.week-grid{flex:1;display:flex;flex-direction:column;min-height:0;min-width:0;touch-action:pan-y;}\n.wg-time-col{width:60px;flex-shrink:0;display:flex;flex-direction:column;background:var(--bg2);}\n.wg-day-col{flex:1;position:relative;min-width:0;overflow:visible;}\n.wg-corner{border-right:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:10;}\n.wg-dh{background:var(--bg2);border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:10px 6px;text-align:center;position:sticky;top:0;z-index:10;}\n.wg-dn{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);}\n.wg-dd{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;color:var(--text);margin-top:2px;}\n.wg-dh.today .wg-dd{color:var(--accent);}\n.wg-t{height:34px;flex-shrink:0;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-family:var(--mono);font-size:11px;color:var(--text3);border-right:1px solid var(--border);border-bottom:1px solid var(--border);}\n.wg-t.half{border-bottom:1px dashed rgba(255,255,255,0.04);}\n.wg-c{border-right:none;border-bottom:1px solid var(--border);cursor:pointer;}\n.wg-c.half{border-bottom:1px dashed rgba(255,255,255,0.04);}\n.wg-c:hover{background:rgba(232,98,42,0.05);}\n.db{position:absolute;border-radius:6px;padding:6px 8px 6px 18px;font-size:11px;overflow:hidden;cursor:pointer;transition:transform .14s ease,box-shadow .16s ease,filter .14s;z-index:5;box-sizing:border-box;box-shadow:0 5px 12px rgba(15,50,64,0.08);}\n.db::before{content:'';position:absolute;left:0;top:0;bottom:0;width:8px;background:var(--db-accent,var(--accent));opacity:.96;}\n.db:hover{filter:none;transform:translateY(-1px);box-shadow:0 8px 18px rgba(15,50,64,0.12);}\n.db-co{position:relative;z-index:1;font-size:11px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#12394A;}\n.db-sub{position:relative;z-index:1;font-size:10px;line-height:1.25;color:rgba(18,57,74,0.70);}\n.db-status{position:absolute;top:6px;right:7px;z-index:2;display:inline-flex;align-items:center;justify-content:center;padding:2px 7px;border-radius:6px;font-size:9px;font-weight:800;line-height:1.15;white-space:nowrap;letter-spacing:.01em;}\n.db-status-pending{background:rgba(255,255,255,0.78);border:1px solid rgba(232,98,42,0.55);color:#E8622A;}\n.db-pending .db-co,.db-pending .db-sub{padding-right:78px;}\n.db.compact-free{padding-right:56px;}\n.db-free-badge{position:relative;z-index:1;display:inline-flex;align-items:center;gap:4px;margin-top:5px;padding:3px 8px;border-radius:999px;border:1px solid rgba(93,202,165,0.40);background:rgba(255,255,255,0.70);color:var(--blue);font-size:10px;font-weight:700;line-height:1;cursor:pointer;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}\n.db-free-badge.compact{position:absolute;top:5px;right:5px;margin-top:0;padding:2px 6px;min-height:18px;height:18px;font-size:9px;line-height:1;max-width:60px;justify-content:center;}\n.db-free-badge:hover{background:rgba(255,255,255,0.88);}\n.db-approved{background:#FFFCF7;border:1px solid rgba(201,169,110,0.34);color:#12394A;}\n.db-pending{background:#FFF8F1;border-style:dashed !important;border-width:1.5px !important;color:#12394A;}\n\n\n/* OUTLOOK-STYLE CURRENT TIME INDICATOR */\n.current-time-line{\n  position:absolute;\n  left:0;\n  right:0;\n  height:2px;\n  background:#E5533D;\n  box-shadow:0 0 0 1px rgba(229,83,61,0.08);\n  pointer-events:none;\n  z-index:12;\n}\n.current-time-line::before{\n  content:'';\n  position:absolute;\n  left:-5px;\n  top:-4px;\n  width:10px;\n  height:10px;\n  border-radius:50%;\n  background:#E5533D;\n  box-shadow:0 1px 4px rgba(0,0,0,0.18);\n}\n.current-time-line::after{display:none;}\n.current-time-chip{\n  position:absolute;\n  right:6px;\n  transform:translateY(-50%);\n  padding:2px 6px;\n  border-radius:999px;\n  background:#E5533D;\n  color:#fff;\n  font-family:var(--mono);\n  font-size:10px;\n  font-weight:700;\n  line-height:1.25;\n  pointer-events:none;\n  z-index:13;\n  box-shadow:0 2px 7px rgba(0,0,0,0.16);\n}\n@media(max-width:768px){\n  .current-time-chip{right:4px;font-size:9px;padding:2px 5px;}\n  .current-time-line::after{left:8px;font-size:9px;padding:2px 6px;}\n}\n\n/* ADMIN */\n.admin-wrap{padding:24px;max-width:1400px;margin:0 auto;}\n.admin-wrap h1{font-family:'Barlow Conde
