ser\n    openMyDeliveries();\n  } else {\n    // Not logged in: show the same login used on desktop\n    openUserAuth();\n  }\n}\n\nfunction updateBadges(){\n  const pend=deliveries.filter(d=>d.status==='pending').length;\n  const showBadge = isAdmin() && pend>0;\n  const badge=g('pending-badge');\n  if(badge){ badge.textContent=pend; badge.style.display=showBadge?'':'none'; }\n  const mobBadge=g('mob-pending-badge');\n  if(mobBadge){ mobBadge.textContent=pend; mobBadge.style.display=showBadge?'flex':'none'; }\n}\n\nfunction getConflicts(){\n  const map={};\n  deliveries.filter(d=>d.status==='pending').forEach(d=>{\n    const k=d.zone+'|'+d.date+'|'+(d.timeStart||d.time);\n    if(!map[k])map[k]=[];\n    map[k].push(d);\n  });\n  return Object.values(map).filter(a=>a.length>1);\n}\n\n// ── CLOCK ─────────────────────────────────────────────────\nfunction tickClock(){\n  const n=new Date();\n  const clk=g('clock'); if(clk) clk.textContent=n.toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit',hour12:false});\n  const clkd=g('clock-date'); if(clkd) clkd.textContent=n.toLocaleDateString('fr-CA',{weekday:'long',month:'short',day:'numeric'}).toUpperCase();\n}\n\n// ── AUTH ──────────────────────────────────────────────────\n// ── Admin login (unchanged — hardcoded credentials) ───────────────────────\nfunction openAdminLogin(){\n  g('ali-user').value=''; g('ali-pass').value=''; g('ali-err').style.display='none';\n  g('modal-login').classList.add('open');\n  setTimeout(()=>g('ali-user').focus(),50);\n}\nfunction doAdminLogin(){\n  const u=g('ali-user').value.trim(), p=g('ali-pass').value.trim(), acc=ACCOUNTS[u];\n  if(!acc||acc.pass!==p){ g('ali-err').style.display='block'; return; }\n  currentUser={username:u,...acc};\n  try{ localStorage.setItem('sd_admin_session', u); }catch(e){}\n  closeModal('modal-login');\n  applyAdminUI();\n  renderCompanyDropdowns();\n  showView('home');\n  requestAnimationFrame(() => {\n    requestAnimationFrame(() => {\n      if (g('view-home').classList.contains('active')) renderHome();\n      if (g('app')) g('app').style.visibility = 'visible';\n    });\n  });\n}\nfunction applyAdminUI(){\n  g('tb-role').style.display='';\n  g('tb-username').textContent='Surintendant';\n  g('btn-login').style.display='none';\n  g('btn-user-login').style.display='none';\n  g('btn-logout').style.display='';\n  document.querySelectorAll('.admin-only').forEach(el=>el.style.display='');\n  g('nav-admin').style.display='';\n  // Mobile bottom nav admin items\n  const mna=g('mob-nav-admin'); if(mna) mna.style.display='';\n  const mny=g('mob-nav-analytics'); if(mny) mny.style.display='';\n  // Update account button label\n  const lbl=g('mob-account-lbl'); if(lbl) lbl.textContent='Admin ✓';\n}\nfunction doLogout(){\n  if(window._auth && firebaseUser){ window._signOut(); }\n  firebaseUser = null;\n  currentUser  = {role:'guest'};\n  try{ localStorage.removeItem('sd_admin_session'); }catch(e){}\n  g('tb-role').style.display='none';\n  g('tb-username').textContent='';\n  g('btn-login').style.display='';\n  g('btn-user-login').style.display='none';\n  g('btn-logout').style.display='none';\n  document.querySelectorAll('.admin-only').forEach(el=>el.style.display='none');\n  g('nav-admin').style.display='none';\n  const mna=g('mob-nav-admin'); if(mna) mna.style.display='none';\n  const mny=g('mob-nav-analytics'); if(mny) mny.style.display='none';\n  const lbl=g('mob-account-lbl'); if(lbl) lbl.textContent='Se connecter';\n  showView('home');\n  updateMobileFab();\n  syncMobAdminTab();\n  renderMobWeekChips();\n}\n\n// ── Firebase Auth state change handler ───────────────────────────────────────\nwindow._onAuthChange = function(fbUser){\n  if(fbUser && currentUser.role !== 'admin'){\n    // A Firebase user signed in (subcontractor)\n    firebaseUser = fbUser;\n    currentUser  = { role:'user', uid: fbUser.uid, name: fbUser.displayName || fbUser.email };\n    g('tb-username').textContent = fbUser.displayName || fbUser.email;\n    g('btn-user-login').style.display='';\n    g('btn-login').style.display='none';\n    g('btn-logout').style.display='';\n    g('tb-role').style.display='none';\n    const mobLbl = g('mob-account-lbl'); if(mobLbl) mobLbl.textContent='Mes livraisons';\n    // Re-render deliveries view if open\n    if(g('view-deliveries').classList.contains('active')) renderDeliveries();\n    if(g('view-home').classList.contains('active')) renderHome();\n  } else if(!fbUser && currentUser.role !== 'admin'){\n    // Signed out\n    firebaseUser = null;\n    currentUser  = {role:'guest'};\n    g('tb-username').textContent='';\n    g('btn-user-login').style.display='none';\n    g('btn-login').style.display='';\n    g('btn-logout').style.display='none';\n    const mobLbl = g('mob-account-lbl'); if(mobLbl) mobLbl.textContent='Se connecter';\n    if(g('view-deliveries').classList.contains('active')) renderDeliveries();\n    if(g('view-home').classList.contains('active')) renderHome();\n  }\n};\n\n// ── User auth modal (signup / login) ─────────────────────────────────────────\nlet _authMode = 'login'; // 'login' or 'signup'\nfunction openUserAuthFromBanner(){\n  _authMode='login';\n  renderAuthModal();\n  g('modal-user-auth').classList.add('open');\n  setTimeout(()=>g('auth-email').focus(),50);\n}\nfunction openUserAuth(){\n  _authMode = firebaseUser ? 'account' : 'login';\n  renderAuthModal();\n  g('modal-user-auth').classList.add('open');\n  setTimeout(()=>g('auth-email').focus(),50);\n}\n\nfunction requireLoginForBooking(source){\n  if(firebaseUser || isAdmin()) return true;\n  const msg = '<strong>Connexion requise<\u002Fstrong><br>Vous devez vous connecter ou créer un compte avant de réserver une livraison.';\n  const mainErr = g('err-box');\n  if(source === 'main' && mainErr){\n    mainErr.innerHTML = msg;\n    mainErr.style.display = 'block';\n    try{ mainErr.scrollIntoView({behavior:'smooth', block:'nearest'}); }catch(e){}\n  }\n  const qbErr = g('qb-err');\n  if(source === 'quick' && qbErr){\n    qbErr.textContent = 'Connexion requise : connectez-vous ou créez un compte avant de réserver une livraison.';\n    qbErr.style.display = 'block';\n  }\n  openUserAuthFromBanner();\n  return false;\n}\nfunction renderAuthModal(){\n  if(firebaseUser){\n    // Logged in — show account info\n    g('auth-modal-title').textContent = 'Mon compte';\n    g('auth-modal-sub').textContent = 'Connecté en tant que ' + (firebaseUser.displayName||firebaseUser.email);\n    g('auth-name-field').style.display='none';\n    g('auth-email').value = firebaseUser.email;\n    g('auth-email').disabled = true;\n    g('auth-pass').style.display='none';\n    g('auth-submit-btn').textContent = 'Se déconnecter';\n    g('auth-submit-btn').onclick = ()=>{ doLogout(); closeModal('modal-user-auth'); };\n    g('auth-toggle-btn').style.display='none';\n    g('auth-reset-btn').style.display='none';\n    g('auth-err').style.display='none';\n  } else if(_authMode==='login'){\n    g('auth-modal-title').textContent = 'Se connecter';\n    g('auth-modal-sub').textContent = 'Connectez-vous pour réserver, modifier ou annuler vos livraisons. Les administrateurs peuvent utiliser leurs identifiants admin.';\n    g('auth-name-field').style.display='none';\n    g('auth-email').value=''; g('auth-email').disabled=false;\n    g('auth-pass').value=''; g('auth-pass').style.display='';\n    g('auth-submit-btn').textContent='Se connecter';\n    g('auth-submit-btn').onclick = submitUserAuth;\n    g('auth-toggle-btn').style.display='';\n    g('auth-toggle-btn').textContent = \"Pas de compte ? S’inscrire\";\n    g('auth-reset-btn').style.display='';\n    g('auth-err').style.display='none';\n  } else {\n    g('auth-modal-title').textContent = 'Créer un compte';\n    g('auth-modal-sub').textContent = 'Créez un compte pour réserver et suivre vos livraisons.';\n    g('auth-name-field').style.display='';\n    g('auth-email').value=''; g('auth-email').disabled=false;\n    g('auth-pass').value=''; g('auth-pass').style.display='';\n    g('auth-submit-btn').textContent='Créer un compte';\n    g('auth-submit-btn').onclick = submitUserAuth;\n    g('auth-toggle-btn').style.display='';\n    g('auth-toggle-btn').textContent = 'Déjà un compte ? Se connecter';\n    g('auth-reset-btn').style.display='none';\n    g('auth-err').style.display='none';\n  }\n}\nfunction toggleAuthMode(){\n  _authMode = _authMode==='login' ? 'signup' : 'login';\n  renderAuthModal();\n}\n\nasync function sendPasswordReset(){\n  const email = g('auth-email').value.trim();\n  const errEl = g('auth-err');\n  errEl.style.display='none';\n  if(!email){\n    errEl.textContent='Veuillez entrer votre courriel, puis cliquez sur Mot de passe oublié.';\n    errEl.style.display='block';\n    return;\n  }\n  try{\n    await window._resetPassword(email);\n    errEl.textContent='Un courriel de réinitialisation du mot de passe a été envoyé. Vérifiez votre boîte de réception et vos courriels indésirables.';\n    errEl.style.display='block';\n    errEl.style.color='var(--green)';\n  } catch(err){\n    errEl.style.color='var(--red)';\n    const msg = err.code==='auth/invalid-email' ? 'Adresse courriel invalide.'\n              : err.code==='auth/user-not-found' ? 'Aucun compte trouvé avec ce courriel.'\n              : 'Impossible d’envoyer le courriel de réinitialisation. Veuillez réessayer.';\n    errEl.textContent = msg;\n    errEl.style.display='block';\n  }\n}\n\nasync function submitUserAuth(){\n  const email = g('auth-email').value.trim();\n  const pass  = g('auth-pass').value.trim();\n  const errEl = g('auth-err');\n  errEl.style.display='none';\n  errEl.style.color='var(--red)';\n  if(!email||!pass){ errEl.textContent='Veuillez entrer votre courriel et votre mot de passe.'; errEl.style.display='block'; return; }\n  try{\n    if(_authMode==='signup'){\n      const name = g('auth-name').value.trim();\n      if(!name){ errEl.textContent='Veuillez entrer votre compagnie ou votre nom.'; errEl.style.display='block'; return; }\n      const cred = await window._createUser(email, pass);\n      await window._updateProfile(cred.user, {displayName: name});\n      closeModal('modal-user-auth');\n    } else {\n      // Allow admin to use the same Se connecter modal with the existing admin credentials.\n      if (ACCOUNTS[email] && ACCOUNTS[email].pass === pass) {\n        if (window._auth && firebaseUser) await window._signOut();\n        currentUser = { username: email, ...ACCOUNTS[email] };\n        try { localStorage.setItem('sd_admin_session', email); } catch(e) {}\n        closeModal('modal-user-auth');\n        applyAdminUI();\n        renderCompanyDropdowns();\n        showView('home');\n        return;\n      }\n      await window._signIn(email, pass);\n      closeModal('modal-user-auth');\n    }\n  } catch(err){\n    const msg = err.code==='auth/email-already-in-use' ? 'Ce courriel est déjà enregistré. Essayez de vous connecter.'\n              : err.code==='auth/user-not-found'||err.code==='auth/wrong-password'||err.code==='auth/invalid-credential' ? 'Courriel ou mot de passe invalide.'\n              : err.code==='auth/weak-password' ? 'Le mot de passe doit contenir au moins 6 caractères.'\n              : err.code==='auth/invalid-email' ? 'Adresse courriel invalide.'\n              : err.message;\n    errEl.textContent = msg; errEl.style.display='block';\n  }\n}\n\n// ── HOME ──────────────────────────────────────────────────\nfunction renderHome(){\n  updateBadges();\n  renderSiteNoticeBanner();\n  g('proj-name').textContent=projectInfo.name;\n  g('proj-addr').textContent=projectInfo.addr;\n  const fields=[['Heures de livraison',projectInfo.hours],\n    ['Orientation sécurité',projectInfo.safety],['Réunion de coordination',projectInfo.coord],['Contact',projectInfo.contact]];\n  g('info-rows').innerHTML=fields.map(([k,v])=>`<div class=\"pi-row\"><span class=\"pi-k\">${k}<\u002Fspan><span class=\"pi-v\">${escapeHtml(v)||'—'}<\u002Fspan><\u002Fdiv>`).join('');\n  g('sidebar-zones').innerHTML=zones.map(z=>{\n    const n=deliveries.filter(d=>d.zone===z.id&&d.status==='approved'&&d.date===today()).length;\n    return `<div class=\"zone-row\">\n    <span class=\"zone-row-chip\" style=\"background:${z.color};\"><\u002Fspan>\n    <span class=\"zone-row-name\">${escapeHtml(z.name)}<\u002Fspan>\n    <span class=\"zone-row-count${n?' has-count':''}\">${n?n+' auj.':'—'}<\u002Fspan>\n  <\u002Fdiv>`;}).join('');\n  renderMapZones(); renderIconMarkers(); renderMobilePlanPanel();\n  // Re-render after layout settles (fixes first-load sizing)\n  setTimeout(()=>{ if(mapImg){ renderMapZones(); renderIconMarkers(); } }, 120);\n  renderTodayDeliveries();\n}\n\nfunction renderTodayDeliveries(){\n  const el = g('sidebar-today'); if (!el) return;\n  const todayStr = today();\n  const todayDels = deliveries\n    .filter(d => d.date === todayStr && d.status !== 'cancelled' && d.status !== 'rejected')\n    .sort((a,b) => (a.timeStart||a.time).localeCompare(b.timeStart||b.time));\n  if (!todayDels.length) {\n    el.innerHTML = '<div style=\"font-size:12px;color:var(--text3);padding:6px 0;\">Aucune livraison prévue aujourd’hui.<\u002Fdiv>';\n    return;\n  }\n  el.innerHTML = todayDels.map(d => {\n    const z = zones.find(z => z.id === d.zone);\n    const timeStr = (d.timeStart||d.time) + (d.timeEnd ? ' – ' + d.timeEnd : '');\n    const isApproved = d.status === 'approved';\n    const isPending  = d.status === 'pending';\n    const dotColor   = isApproved ? 'var(--green)' : isPending ? 'var(--amber)' : 'var(--text3)';\n    return '<div style=\"display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);\">'\n      + '<span style=\"width:7px;height:7px;border-radius:50%;background:' + dotColor + ';flex-shrink:0;margin-top:4px;\"><\u002Fspan>'\n      + '<div style=\"flex:1;min-width:0;\">'\n      +   '<div style=\"font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">' + escapeHtml(d.company) + '<\u002Fdiv>'\n      +   '<div style=\"font-size:11px;color:var(--text2);margin-top:1px;\">'\n      +     (z ? '<span style=\"display:inline-block;width:7px;height:7px;border-radius:1px;background:' + z.color + ';margin-right:4px;vertical-align:middle;\"><\u002Fspan>' : '')\n      +     (z ? z.name + ' · ' : '') + timeStr\n      +   '<\u002Fdiv>'\n      + '<\u002Fdiv>'\n      + '<\u002Fdiv>';\n  }).join('');\n}\n\n// Convert old pixel zones to % if needed (one-time migration)\n// ── Map stage helpers ───────────────────────────────────────────────────────\n// The map-stage div is sized to the image's natural aspect ratio, filling the\n// available width. Zones are % of map-stage = % of the image. Perfectly stable.\n\nfunction toggleZoneEdit(){\n  zonesLocked = !zonesLocked;\n  if(!zonesLocked) iconsLocked = true; // lock icons when editing zones\n  const btn = g('btn-edit-zones');\n  if(!zonesLocked){\n    btn.textContent = 'Terminé';\n    btn.style.background = 'var(--amber)';\n    btn.style.color = '#1a0f00';\n    btn.style.borderColor = 'var(--amber)';\n  } else {\n    btn.textContent = 'Modifier zones';\n    btn.style.background = '';\n    btn.style.color = 'var(--amber)';\n    btn.style.borderColor = 'rgba(232,160,42,0.4)';\n  }\n  renderMapZones();\n  renderIconMarkers();\n}\n\nfunction toggleIconEdit(){\n  iconsLocked = !iconsLocked;\n  if(!iconsLocked) zonesLocked = true; // lock zones when editing icons\n  const ibtn = g('btn-edit-icons');\n  const zbtn = g('btn-edit-zones');\n  if(!iconsLocked){\n    ibtn.textContent = 'Terminé';\n    ibtn.style.background = 'var(--blue)';\n    ibtn.style.color = '#001a14';\n    ibtn.style.borderColor = 'var(--blue)';\n    // Also reset zones button\n    zbtn.textContent = 'Modifier zones';\n    zbtn.style.background = '';\n    zbtn.style.color = 'var(--amber)';\n    zbtn.style.borderColor = 'rgba(232,160,42,0.4)';\n  } else {\n    ibtn.textContent = 'Modifier icônes';\n    ibtn.style.background = '';\n    ibtn.style.color = 'var(--blue)';\n    ibtn.style.borderColor = 'rgba(93,202,165,0.4)';\n  }\n  renderMapZones();\n  renderIconMarkers();\n}\n\nfunction getOrCreateStage(canvas){\n  let stage = canvas.querySelector('.map-stage');\n  if (!stage) {\n    stage = document.createElement('div');\n    stage.className = 'map-stage';\n    canvas.insertBefore(stage, canvas.firstChild);\n  }\n  return stage;\n}\n\nfunction renderMapZones(){\n  const canvas = g('map-canvas');\n  // Remove old zone rects (but not the stage or image)\n  canvas.querySelectorAll('.zone-rect').forEach(el => el.remove());\n  const legend = g('zone-legend');\n  legend.innerHTML = '';\n\n  if (!mapImg) return;\n\n  g('map-ph').style.display = 'none';\n  g('map-ctrls').style.display = isAdmin() ? '' : 'none';\n\n  const stage = getOrCreateStage(canvas);\n\n  // Set up image inside stage\n  let img = stage.querySelector('img.map-img');\n  if (!img) {\n    img = document.createElement('img');\n    img.className = 'map-img';\n    stage.appendChild(img);\n  }\n\n  const doRender = () => {\n    // Size stage to fit the canvas while preserving the image's aspect ratio.\n    // We use object-fit:contain logic manually so zones stay correctly positioned.\n    const canvas = stage.parentElement;\n    const _rect  = canvas.getBoundingClientRect();\n    const canvasW = Math.floor(_rect.width)  || canvas.clientWidth  || 800;\n    const canvasH = Math.floor(_rect.height) || canvas.clientHeight || 600;\n    const natW = img.naturalWidth  || img.width  || canvasW;\n    const natH = img.naturalHeight || img.height || canvasH;\n    const imgAR = natW / natH;\n    const canAR = canvasW / canvasH;\n    let stageW, stageH;\n    if(imgAR > canAR){\n      // Image is wider than canvas — constrain by width\n      stageW = canvasW;\n      stageH = Math.round(canvasW / imgAR);\n    } else {\n      // Image is taller than canvas — constrain by height\n      stageH = canvasH;\n      stageW = Math.round(canvasH * imgAR);\n    }\n    stage.style.width  = stageW + 'px';\n    stage.style.height = stageH + 'px';\n    stage.style.minWidth  = '';\n    stage.style.minHeight = '';\n\n    // Legend\n    legend.style.display = '';\n    legend.innerHTML = zones.map(z =>\n      `<div class=\"legend-item\"><span class=\"legend-dot\" style=\"background:${z.color}\"><\u002Fspan>${z.name}<\u002Fdiv>`\n    ).join('');\n    canvas.appendChild(legend);\n\n    // Migrate old pixel-based zones to %\n    let needsSave = false;\n    const sw = stage.offsetWidth  || 800;\n    const sh = stage.offsetHeight || 600;\n    zones.forEach((z, i) => {\n      if (z.x > 2 || z.y > 2 || z.w > 2 || z.h > 2) {\n        const col = i % 2, row = Math.floor(i / 2);\n        z.xPct = 5 + col * 45;\n        z.yPct = 5 + row * 40;\n        z.wPct = 18;\n        z.hPct = 15;\n        z.x = 0; z.y = 0; z.w = 0; z.h = 0;\n        needsSave = true;\n      }\n    });\n    if (needsSave) saveZonesConfig().catch(() => {});\n\n    // Render zone rects — positioned as % of stage (= % of image)\n    zones.filter(z => z.visible).forEach(z => {\n      const rect = document.createElement('div');\n      rect.className = 'zone-rect';\n      // Use % positioning directly — no pixel math needed!\n      const editable = isAdmin() && !zonesLocked;\n      rect.style.cssText = [\n        `left:${z.xPct||5}%`,\n        `top:${z.yPct||5}%`,\n        `width:${z.wPct||18}%`,\n        `height:${z.hPct||15}%`,\n        `border-color:${z.color}`,\n        `background:${z.color}22`,\n        `cursor:${editable ? 'move' : 'pointer'}`,\n      ].join(';') + ';';\n      rect.innerHTML = `<span class=\"zone-lbl\" style=\"background:${z.color};color:white;\">${z.name}<\u002Fspan><div class=\"zone-resize\" style=\"background:${z.color};display:${editable?'block':'none'};\"><\u002Fdiv>`;\n      if (isAdmin() && !zonesLocked) { makeDrag(rect, z, stage); makeResize(rect, z, stage); }\n      // Click anywhere on zone rect to open modal — use mousedown/mouseup distance\n      // to distinguish a click from a drag (threshold: 5px)\n      let _downX = 0, _downY = 0;\n      rect.addEventListener('mousedown', e => {\n        if (e.target.classList.contains('zone-resize')) return;\n        _downX = e.clientX; _downY = e.clientY;\n      });\n      rect.addEventListener('mouseup', e => {\n        if (e.target.classList.contains('zone-resize')) return;\n        const dist = Math.hypot(e.clientX - _downX, e.clientY - _downY);\n        if (dist < 5 && zonesLocked) {\n          e.stopPropagation();\n          openZoneModal(z.id);\n        }\n      });\n      canvas.appendChild(rect);\n      canvas.removeChild(rect);\n      stage.appendChild(rect);\n    });\n  };\n\n  if (img.src !== mapImg) {\n    img.onload = doRender;\n    img.src = mapImg;\n  } else {\n    doRender();\n  }\n}\n\nfunction renderIconMarkers(){\n  const stage = document.querySelector('.map-stage'); if(!stage) return;\n  stage.querySelectorAll('.icon-marker').forEach(el=>el.remove());\n  const editable = isAdmin() && !iconsLocked;\n  iconMarkers.forEach(m=>{\n    const el=document.createElement('div');\n    el.className='icon-marker';\n    el.dataset.id=m.id;\n    const sz = m.size||40;\n    el.style.cssText=`position:absolute;left:${m.xPct}%;top:${m.yPct}%;transform:translate(-50%,-50%);z-index:8;cursor:${editable?'move':'default'};user-select:none;`;\n    const bg=m.color||'#C9A96E';\n    const iconPx = Math.round(sz * 0.4);\n    const fsPx   = Math.round(sz * 0.28);\n    el.innerHTML=`<div class=\"im-body\" style=\"background:${bg};border-radius:${Math.round(sz*0.18)}px;padding:${Math.round(sz*0.12)}px ${Math.round(sz*0.2)}px;display:flex;align-items:center;gap:${Math.round(sz*0.1)}px;border:${editable?'2px dashed rgba(255,255,255,0.6)':'none'};\">\n      ${zoneIconSVG(m.iconKey,iconPx,'white')}\n      ${m.label?`<span style=\"font-size:${fsPx}px;font-weight:700;color:white;white-space:nowrap;\">${m.label}<\u002Fspan>`:''}\n    <\u002Fdiv>\n    ${editable?`<div class=\"im-resize\" style=\"position:absolute;bottom:-6px;right:-6px;width:14px;height:14px;background:white;border:2px solid ${bg};border-radius:3px;cursor:se-resize;z-index:9;\"><\u002Fdiv>`:''}`;\n\n    if(editable){\n      // Drag to move\n      el.querySelector('.im-body').addEventListener('mousedown',e=>{\n        e.preventDefault(); e.stopPropagation();\n        const sr=stage.getBoundingClientRect();\n        const ox=e.clientX-sr.left-m.xPct/100*sr.width;\n        const oy=e.clientY-sr.top-m.yPct/100*sr.height;\n        const mv=e=>{\n          m.xPct=parseFloat(Math.max(0,Math.min(100,(e.clientX-sr.left-ox)/sr.width*100)).toFixed(3));\n          m.yPct=parseFloat(Math.max(0,Math.min(100,(e.clientY-sr.top-oy)/sr.height*100)).toFixed(3));\n          el.style.left=m.xPct+'%'; el.style.top=m.yPct+'%';\n        };\n        const up=()=>{ saveIconMarkersConfig().catch(()=>{}); document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); };\n        document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);\n      });\n      // Resize handle\n      const rh=el.querySelector('.im-resize');\n      if(rh) rh.addEventListener('mousedown',e=>{\n        e.preventDefault(); e.stopPropagation();\n        const startSz=m.size||40;\n        const sx=e.clientX, sy=e.clientY;\n        const mv=e=>{\n          const delta=Math.max(e.clientX-sx, e.clientY-sy);\n          m.size=Math.max(24,Math.min(120,Math.round(startSz+delta)));\n          renderIconMarkers();\n        };\n        const up=()=>{ saveIconMarkersConfig().catch(()=>{}); document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); };\n        document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);\n      });\n    }\n    stage.appendChild(el);\n  });\n}\n\n// Resize observer: re-render map zones when canvas size changes (debounced)\nif(window.ResizeObserver){\n  const _mapCanvas = document.getElementById('map-canvas');\n  if(_mapCanvas){\n    let _resizeTimer;\n    new ResizeObserver(()=>{\n      clearTimeout(_resizeTimer);\n      _resizeTimer = setTimeout(()=>{ if(mapImg) renderMapZones(); }, 50);\n    }).observe(_mapCanvas);\n  }\n}\n\nfunction makeDrag(el, z, stage){\n  el.addEventListener('mousedown', e => {\n    if (e.target.classList.contains('zone-resize')) return;\n    e.preventDefault();\n    const sr = stage.getBoundingClientRect();\n    const ox = e.clientX - sr.left - ((z.xPct||0)/100)*sr.width;\n    const oy = e.clientY - sr.top  - ((z.yPct||0)/100)*sr.height;\n    const mv = e => {\n      const wPct = z.wPct||18;\n      const hPct = z.hPct||15;\n      const xPct = Math.max(0, Math.min((e.clientX - sr.left - ox) / sr.width  * 100, 100 - wPct));\n      const yPct = Math.max(0, Math.min((e.clientY - sr.top  - oy) / sr.height * 100, 100 - hPct));\n      z.xPct = parseFloat(xPct.toFixed(4));\n      z.yPct = parseFloat(yPct.toFixed(4));\n      el.style.left = xPct + '%';\n      el.style.top  = yPct + '%';\n    };\n    const up = () => {\n      saveZonesConfig();\n      document.removeEventListener('mousemove', mv);\n      document.removeEventListener('mouseup', up);\n    };\n    document.addEventListener('mousemove', mv);\n    document.addEventListener('mouseup', up);\n  });\n}\n\nfunction makeResize(el, z, stage){\n  el.querySelector('.zone-resize').addEventListener('mousedown', e => {\n    e.preventDefault(); e.stopPropagation();\n    const sr = stage.getBoundingClientRect();\n    const sx = e.clientX, sy = e.clientY;\n    const startWpct = z.wPct||18;\n    const startHpct = z.hPct||15;\n    const startW = startWpct/100 * sr.width;\n    const startH = startHpct/100 * sr.height;\n    const mv = e => {\n      const wPx = Math.max(20, startW + e.clientX - sx);\n      const hPx = Math.max(15, startH + e.clientY - sy);\n      z.wPct = parseFloat((wPx / sr.width  * 100).toFixed(4));\n      z.hPct = parseFloat((hPx / sr.height * 100).toFixed(4));\n      el.style.width  = z.wPct + '%';\n      el.style.height = z.hPct + '%';\n    };\n    const up = () => {\n      saveZonesConfig();\n      document.removeEventListener('mousemove', mv);\n      document.removeEventListener('mouseup', up);\n    };\n    document.addEventListener('mousemove', mv);\n    document.addEventListener('mouseup', up);\n  });\n}\n\nfunction uploadMap(e){\n  const file=e.target.files[0]; if(!file)return;\n  if(file.type==='application/pdf'){\n    const r=new FileReader();\n    r.onload=async ev=>{\n      try{\n        const typedArr=new Uint8Array(ev.target.result);\n        const pdf=await pdfjsLib.getDocument({data:typedArr}).promise;\n        const page=await pdf.getPage(1);\n        const viewport=page.getViewport({scale:2.0});\n        const cvs=document.createElement('canvas');\n        cvs.width=viewport.width; cvs.height=viewport.height;\n        await page.render({canvasContext:cvs.getContext('2d'),viewport}).promise;\n        mapImg=cvs.toDataURL('image/jpeg',0.88);\n        await fbSaveConfig('mapImg',mapImg);\n        renderHome(); renderMobilePlanPanel();\n      }catch(err){alert('Impossible de lire le PDF : '+err.message);}\n    };\n    r.readAsArrayBuffer(file);\n  } else {\n    const r=new FileReader();\n    r.onload=ev=>{mapImg=ev.target.result;fbSaveConfig('mapImg',mapImg);renderHome(); renderMobilePlanPanel();};\n    r.readAsDataURL(file);\n  }\n  e.target.value='';\n}\nfunction addZone(){\n  zones.push({id:'z'+Date.now(),name:'Nouvelle zone',color:ZONE_COLORS[zones.length%ZONE_COLORS.length],x:0,y:0,w:0,h:0,xPct:5,yPct:5,wPct:15,hPct:12,visible:true,icon:'none'});\n  saveZonesConfig();renderHome();if(g('view-admin').classList.contains('active'))renderAdmin();\n}\nfunction updateAutoApproveUI(){\n  const on = projectInfo.autoApprove!==false;\n  const tog=g('auto-approve-toggle'), knob=g('auto-approve-knob'), desc=g('auto-approve-desc');\n  if(tog)  tog.style.background = on?'var(--green)':'var(--text3)';\n  if(knob) knob.style.left      = on?'21px':'3px';\n  if(desc) desc.textContent     = on\n    ? 'Activé — les livraisons sont approuvées immédiatement'\n    : 'Désactivé — les livraisons nécessitent une approbation';\n}\nfunction toggleAutoApprove(){\n  projectInfo.autoApprove = projectInfo.autoApprove===false;\n  // Persist before any async Firebase operation, so a refresh cannot reset the toggle.\n  saveLocalProjectInfo();\n  updateAutoApproveUI();\n  saveProjectInfoConfig().catch(e => console.error('saveProjectInfoConfig', e));\n}\nfunction openInfoModal(){\n  [['name','mi-name'],['addr','mi-addr'],['hours','mi-hours'],['contact','mi-contact'],['safety','mi-safety'],['coord','mi-coord'],['notes','mi-notes']]\n    .forEach(([k,id])=>{const el=g(id);if(el)el.value=projectInfo[k]||'';});\n  const appEl = g('mi-appname'); if(appEl) appEl.value = projectInfo.appname||'SiteDelivery';\n  updateAutoApproveUI();\n  g('modal-info').classList.add('open');\n}\nfunction saveInfo(){\n  [['name','mi-name'],['addr','mi-addr'],['hours','mi-hours'],['contact','mi-contact'],['safety','mi-safety'],['coord','mi-coord'],['notes','mi-notes']]\n    .forEach(([k,id])=>{const el=g(id);if(el)projectInfo[k]=el.value;});\n  const appEl = g('mi-appname');\n  if(appEl) projectInfo.appname = appEl.value.trim() || 'SiteDelivery';\n  // Persist project information, including auto-approval setting.\n  saveProjectInfoConfig().catch(e => console.error('saveProjectInfoConfig', e));\n  closeModal('modal-info');renderHome();\n}\n\n// ── DELIVERIES ────────────────────────────────────────────\nfunction ensureCompanyOption(value){\n  const sel = g('b-company'); if(!sel || !value) return;\n  const exists = Array.from(sel.options).some(o => o.value === value);\n  if(!exists){\n    const opt = document.createElement('option');\n    opt.value = value; opt.textContent = value;\n    sel.appendChild(opt);\n  }\n}\nfunction bookingDateLimitMax(){\n  if(isAdmin()) return null;\n  const maxDate = new Date();\n  maxDate.setDate(maxDate.getDate()+14);\n  return dk(maxDate);\n}\nfunction isSlotBookableForTemplate(zoneId,dateStr,ts,te,ignoreId){\n  if(!zoneId || !dateStr || !ts || !te) return false;\n  if(!isAdmin()){\n    const maxDate = bookingDateLimitMax();\n    if(dateStr > maxDate) return false;\n  }\n  if(dateStr < today()) return false;\n  if(isZoneBlackedOut(zoneId,dateStr)) return false;\n  const allowed = allowedSlotsForDate(dateStr);\n  if(!allowed.length || !allowed.includes(ts) || !allowed.includes(te)) return false;\n  const si = TIME_SLOTS.indexOf(ts), ei = TIME_SLOTS.indexOf(te);\n  if(si < 0 || ei <= si) return false;\n  return !deliveries.some(d => d.id !== ignoreId && d.zone===zoneId && d.date===dateStr && d.status==='approved' && overlap(ts,te,d.timeStart||d.time,d.timeEnd||d.time));\n}\nfunction findTemplateDate(delivery){\n  const maxDate = bookingDateLimitMax();\n  let candidate = delivery.date && delivery.date >= today() ? delivery.date : today();\n  if(maxDate && candidate > maxDate) candidate = today();\n  for(let i=0;i<21;i++){\n    const test = dk(addDays(new Date(candidate+'T12:00:00'), i));\n    if(test < today()) continue;\n    if(maxDate && test > maxDate) break;\n    if(allowedSlotsForDate(test).length===0) continue;\n    if(isZoneBlackedOut(delivery.zone, test)) continue;\n    return test;\n  }\n  return today();\n}\nfunction setTemplateBanner(message){\n  const banner = g('booking-template-banner');\n  const textEl = g('booking-template-text');\n  if(!banner || !textEl) return;\n  textEl.innerHTML = message;\n  banner.style.display = 'flex';\n}\nfunction clearBookingTemplate(silent){\n  activeBookingTemplate = null;\n  const banner = g('booking-template-banner');\n  if(banner) banner.style.display = 'none';\n  const textEl = g('booking-template-text');\n  if(textEl) textEl.innerHTML = 'Les informations d’une livraison précédente ont été copiées.';\n  if(!silent){\n    ['b-company','b-contact','b-phone','b-material','b-notes'].forEach(id=>{const el=g(id); if(el) el.value='';});\n    if(g('b-truck')) g('b-truck').value='';\n    if(g('b-date')) g('b-date').value=today();\n    if(g('b-time-start')) g('b-time-start').value='';\n    if(g('b-time-end')) g('b-time-end').innerHTML='<option value=\"\">Sélectionner fin…<\u002Foption>';\n    selZone = zones.length ? zones[0].id : null;\n    renderZonePicker();\n    renderStartTimes();\n  }\n}\nfunction loadDeliveryTemplate(id){\n  const d = deliveries.find(x => x.id === id); if(!d) return;\n  activeBookingTemplate = { sourceId:d.id, company:d.company, material:d.material };\n  closeModal('modal-my-deliveries');\n  closeModal('modal-detail');\n  showView('deliveries');\n  if(window.innerWidth <= 768) mobSwitchTab('form');\n  g('booking-content').style.display='';\n  g('booking-success').style.display='none';\n  const dateEl = g('b-date');\n  const pickedDate = findTemplateDate(d);\n  ensureCompanyOption(d.company);\n  g('b-company').value = d.company || '';\n  g('b-contact').value = d.contact || '';\n  g('b-phone').value = d.phone || '';\n  g('b-material').value = d.material || '';\n  g('b-truck').value = d.truck || '';\n  g('b-notes').value = d.notes || '';\n  selZone = d.zone;\n  renderZonePicker();\n  if(dateEl) dateEl.value = pickedDate;\n  renderStartTimes();\n  let bannerMsg = '<strong>'+d.company+'<\u002Fstrong> · ' + (d.material||'Livraison');\n  const ts = d.timeStart || d.time;\n  const te = d.timeEnd || '';\n  if(ts && te && isSlotBookableForTemplate(d.zone, pickedDate, ts, te, d.id)){\n    g('b-time-start').value = ts;\n    onStartChange();\n    g('b-time-end').value = te;\n    bannerMsg += '<br>Créneau repris automatiquement : <strong>'+fmtDate(pickedDate)+'<\u002Fstrong> · <strong>'+ts+'–'+te+'<\u002Fstrong>';\n  } else {\n    g('b-time-start').value = '';\n    g('b-time-end').innerHTML = '<option value=\"\">Sélectionner fin…<\u002Foption>';\n    bannerMsg += '<br>Les informations ont été recopiées. Choisissez une nouvelle date/heure avant de soumettre.';\n  }\n  setTemplateBanner(bannerMsg);\n  const errEl = g('err-box'); if(errEl) errEl.style.display='none';\n  const panel = document.querySelector('.booking-panel'); if(panel) panel.scrollTo({top:0,behavior:'smooth'});\n}\nfunction renderDeliveries(){\n  _initMobDelTabs();\n  // Show/hide My Deliveries button and sign-in banner based on auth state\n  const myDelBtn = g('btn-my-deliveries');\n  if(myDelBtn) myDelBtn.style.display = firebaseUser ? '' : 'none';\n  const notice = g('booking-limit-notice');\n  if(notice) notice.style.display = isAdmin() ? 'none' : '';\n  // Populate company dropdown\n  const coSel = g('b-company');\n  if(coSel){\n    const prev = coSel.value;\n    coSel.innerHTML = '<option value=\"\">Sélectionner la compagnie…<\u002Foption>'\n      + subcontractors.map(c=>'<option value=\"'+escapeHtml(c)+'\"'+(c===prev?' selected':'')+'>'+escapeHtml(c)+'<\u002Foption>').join('');\n    if(!subcontractors.length){\n      coSel.innerHTML += '<option value=\"\" disabled>— Aucune compagnie (voir Admin)<\u002Foption>';\n    }\n  }\n  const banner = g('signin-banner');\n  const bookingAllowed = !!firebaseUser || isAdmin();\n  if(banner) banner.style.display = bookingAllowed ? 'none' : 'flex';\n  document.querySelectorAll('#booking-content input, #booking-content select, #booking-content textarea, #booking-content .zpick').forEach(el=>{\n    if(el.id === 'auth-email' || el.id === 'auth-pass') return;\n    el.disabled = !bookingAllowed;\n    el.style.opacity = bookingAllowed ? '' : '0.55';\n    el.style.cursor = bookingAllowed ? '' : 'not-allowed';\n  });\n  const tplBanner = g('booking-template-banner');\n  if(tplBanner) tplBanner.style.display = activeBookingTemplate ? 'flex' : 'none';\n  const dateEl=g('b-date');\n  if(!dateEl.value||dateEl.value<today())dateEl.value=today();\n  dateEl.min=today();\n  // Max 2 weeks ahead for non-admins\n  if(!isAdmin()){\n    const maxD = new Date(); maxD.setDate(maxD.getDate()+14);\n    dateEl.max = dk(maxD);\n  } else {\n    dateEl.max = ''; // admin: no limit\n  }\n  dateEl.onchange=()=>{\n    onStartChange();\n    renderStartTimes();\n    // Jump calendar week to match selected date\n    const selectedDate = new Date(dateEl.value + 'T12:00:00');\n    if (!isNaN(selectedDate)) {\n      weekStart = getMonday(selectedDate);\n      renderWeekCalendar();\n    }\n  };\n  if(!selZone&&zones.length>0)selZone=zones[0].id;\n  renderZonePicker();\n  renderStartTimes();\n  renderWeekCalendar();\n  renderZoneFilters();\n  if(window.innerWidth <= 768) renderWeekCalendar();\n  renderMobilePlanPanel();\n  updateMobileFab();\n}\n\nfunction renderZonePicker(){\n  const bookingAllowed = !!firebaseUser || isAdmin();\n  g('zone-pick-grid').innerHTML=zones.map(z=>\n    `<button class=\"zpick ${selZone===z.id?'sel':''}\" ${bookingAllowed ? '' : 'disabled'} style=\"${bookingAllowed ? '' : 'opacity:.55;cursor:not-allowed;'}\" onclick=\"pickZone('${z.id}')\">\n      <span class=\"zpick-dot\" style=\"background:${z.color}\"><\u002Fspan>${z.name}\n    <\u002Fbutton>`).join('');\n}\nfunction pickZone(id){ selZone=id; renderZonePicker(); renderStartTimes(); }\n\nfunction renderStartTimes(){\n  const sel = g('b-time-start');\n  const prev = sel.value;\n  const dateStr = g('b-date') ? g('b-date').value : today();\n  const allowed = allowedSlotsForDate(dateStr);\n  sel.innerHTML = '<option value=\"\">Sélectionner début…<\u002Foption>';\n  // Check blackout for selected zone\n  if(selZone && isZoneBlackedOut(selZone, dateStr)){\n    const bos = getBlackoutsForZoneDate(selZone, dateStr);\n    const reason = bos[0]?.reason || 'Zone bloquée';\n    const o = document.createElement('option');\n    o.disabled = true;\n    o.textContent = '⛔ ' + reason + ' — zone bloquée';\n    o.style.color = '#D46060';\n    sel.appendChild(o);\n    g('b-time-end').innerHTML = '<option value=\"\">Sélectionner fin…<\u002Foption>';\n    return;\n  }\n  if (allowed.length === 0) {\n    const o = document.createElement('option');\n    o.disabled = true;\n    o.textContent = 'Aucune livraison ce jour';\n    sel.appendChild(o);\n  } else {\n    allowed.forEach(t => {\n      const taken = takenBy(selZone, dateStr, t);\n      const o = document.createElement('option');\n      if (taken.length > 0) {\n        o.value = '';\n        o.disabled = true;\n        o.textContent = t + '  —  Pris par ' + taken[0].company;\n        o.style.color = '#E05555';\n      } else {\n        o.value = t;\n        o.textContent = t;\n        if (t === prev) o.selected = true;\n      }\n      sel.appendChild(o);\n    });\n  }\n  g('b-time-end').innerHTML = '<option value=\"\">Sélectionner fin…<\u002Foption>';\n  if (prev) onStartChange();\n}\nfunction onStartChange(){\n  const sv = g('b-time-start').value;\n  const endSel = g('b-time-end');\n  endSel.innerHTML = '<option value=\"\">Sélectionner fin…<\u002Foption>';\n  if (!sv) return;\n  const dateStr = g('b-date') ? g('b-date').value : today();\n  const allowed = allowedSlotsForDate(dateStr);\n  const startIdx = TIME_SLOTS.indexOf(sv);\n\n  // Find the earliest approved delivery in this zone+date that starts AFTER sv\n  // End time must not reach or cross that delivery's start\n  const zone = selZone;\n  const blockers = deliveries\n    .filter(d => d.zone === zone && d.date === dateStr && d.status === 'approved')\n    .map(d => TIME_SLOTS.indexOf(d.timeStart || d.time))\n    .filter(idx => idx > startIdx)\n    .sort((a,b) => a - b);\n  // The earliest blocker index is the ceiling — end time must be <= that slot\n  const ceilIdx = blockers.length > 0 ? blockers[0] : Infinity;\n\n  allowed\n    .filter(t => {\n      const ti = TIME_SLOTS.indexOf(t);\n      return ti > startIdx && ti <= ceilIdx;\n    })\n    .forEach(t => {\n      const o = document.createElement('option');\n      o.value = t; o.textContent = t;\n      endSel.appendChild(o);\n    });\n}\n\n\nfunction hexToRgb(hex){\n  const clean = String(hex || '').replace('#','').trim();\n  if(!/^[0-9a-fA-F]{6}$/.test(clean)) return {r:93,g:202,b:165};\n  return {\n    r: parseInt(clean.slice(0,2),16),\n    g: parseInt(clean.slice(2,4),16),\n    b: parseInt(clean.slice(4,6),16)\n  };\n}\nfunction rgbaFromHex(hex, alpha){\n  const c = hexToRgb(hex);\n  return 'rgba('+c.r+','+c.g+','+c.b+','+alpha+')';\n}\nfunction readableTextOn(hex){\n  const c = hexToRgb(hex);\n  const lum = (0.299*c.r + 0.587*c.g + 0.114*c.b) / 255;\n  return lum > 0.62 ? '#12394A' : '#FFFFFF';\n}\nfunction zoneFilterChipStyle(z, active){\n  const color = z?.color || '#5DCAA5';\n  if(active){\n    return 'background:'+color+' !important;'\n      + 'border-color:'+color+' !important;'\n      + 'color:'+readableTextOn(color)+' !important;'\n      + 'box-shadow:0 2px 7px '+rgbaFromHex(color,0.22)+', inset 0 0 0 1px rgba(255,255,255,0.34) !important;';\n  }\n  return 'background:'+rgbaFromHex(color,0.10)+' !important;'\n    + 'border-color:'+rgbaFromHex(color,0.46)+' !important;'\n    + 'color:'+color+' !important;';\n}\n\nfunction renderZoneFilters(){\n  const wrap = g('zone-filters');\n  if(!wrap) return;\n  const isMobile = window.innerWidth <= 768;\n  if(isMobile){\n    ensureMobileZoneFilterDefault();\n    const isAllZones = activeZF.size === 0;\n    const activeId = !isAllZones && activeZF.size ? Array.from(activeZF)[0] : selZone;\n    const activeZone = zones.find(z => z.id === activeId) || zones[0];\n    wrap.className = mobZoneFiltersExpanded ? 'mobile-expanded' : 'mobile-collapsed';\n\n    const allBtn = `<button class=\"zf-btn ${isAllZones ? 'zf-active' : ''}\" onclick=\"toggleZF('__all__')\">Toutes les zones<\u002Fbutton>`;\n    const zoneBtns = zones.map(z=>{\n      const on = !isAllZones && activeZone && z.id === activeZone.id;\n      return `<button class=\"zf-btn ${on ? 'zf-active' : ''}\" onclick=\"toggleZF('${z.id}')\" style=\"${zoneFilterChipStyle(z,on)}\">${z.name}<\u002Fbutton>`;\n    }).join('');\n\n    const activeZoneBtn = !isAllZones && activeZone\n      ? `<button class=\"zf-btn zf-active\" onclick=\"toggleZF('${activeZone.id}')\" style=\"${zoneFi :'<path d=\"M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4\"/><polyline points=\"7 10 12 15 17 10\"/><line x1=\"12\" y1=\"15\" x2=\"12\" y2=\"3\"/>' },\n};\n\nfunction zoneIconSVG(iconKey, size=14, color='white'){\n  const ic = ZONE_ICONS[iconKey];\n  if(!ic||!ic.svg) return '';\n  return '<svg viewBox=\"0 0 24 24\" width=\"'+size+'\" height=\"'+size+'\" fill=\"none\" stroke=\"'+color+'\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0;vertical-align:middle;\">'+ic.svg+'<\u002Fsvg>';\n}\n\n// ── STANDALONE ICON MARKERS (no zone, just placed on map) ────────────────────\n// Stored as: [{id, iconKey, label, xPct, yPct, color}]\n\nfunction slotIndex(t){return TIME_SLOTS.indexOf(t);}\n\n// Check if a zone is blacked out on a given date\nfunction getBlackoutsForZoneDate(zoneId, dateStr){\n  return blackoutDates.filter(b => {\n    if(b.zoneId !== zoneId) return false;\n    // dateStr between dateFrom and dateTo inclusive\n    return dateStr >= b.dateFrom && dateStr <= b.dateTo;\n  });\n}\nfunction isZoneBlackedOut(zoneId, dateStr){\n  return getBlackoutsForZoneDate(zoneId, dateStr).length > 0;\n}\n\nconst DAY_KEYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];\nfunction allowedSlotsForDate(dateStr){\n  if (!dateStr) return TIME_SLOTS;\n  const d = new Date(dateStr + 'T12:00:00');\n  const dayKey = DAY_KEYS[d.getDay()];\n  if (dayKey === 'Sat' || dayKey === 'Sun') return []; // aucune livraison la fin de semaine\n  const sch = siteSchedule[dayKey];\n  if (!sch || sch.closed) return [];\n  const openIdx  = TIME_SLOTS.indexOf(sch.open);\n  const closeIdx = TIME_SLOTS.indexOf(sch.close);\n  if (openIdx < 0 || closeIdx < 0) return TIME_SLOTS;\n  return TIME_SLOTS.slice(openIdx, closeIdx);\n}\n\n// Returns approved deliveries that overlap a given slot for a zone+date\nfunction takenBy(zone, dateStr, slotTime){\n  return deliveries.filter(d =>\n    d.zone === zone && d.date === dateStr && d.status === 'approved' &&\n    overlap(slotTime, TIME_SLOTS[slotIndex(slotTime)+1] || slotTime,\n            d.timeStart || d.time, d.timeEnd || d.time)\n  );\n}\n\nfunction getDeliveryDurationSlots(del){\n  const si = slotIndex(del.timeStart||del.time);\n  const ei = slotIndex(del.timeEnd||'');\n  return ei>si ? (ei-si) : 1;\n}\nfunction endTimeForStart(del, startTime){\n  const startIdx = slotIndex(startTime);\n  const endIdx = startIdx + getDeliveryDurationSlots(del);\n  return TIME_SLOTS[endIdx] || '';\n}\nfunction validateCalendarMove(del, newDate, newStart, newZone){\n  const startIdx = slotIndex(newStart);\n  if(startIdx < 0) return {ok:false,msg:'Créneau invalide.'};\n  const endTime = endTimeForStart(del, newStart);\n  const endIdx = slotIndex(endTime);\n  if(!endTime || endIdx <= startIdx) return {ok:false,msg:'La durée ne peut pas être conservée dans ce créneau.'};\n  const dayKey = DAY_KEYS[new Date(newDate+'T12:00:00').getDay()];\n  if(dayKey === 'Sat' || dayKey === 'Sun') return {ok:false,msg:'Aucune livraison la fin de semaine.'};\n  const sch = siteSchedule[dayKey];\n  if(!sch || sch.closed) return {ok:false,msg:'Le chantier est fermé cette journée.'};\n  const openIdx = slotIndex(sch.open);\n  const closeIdx = slotIndex(sch.close);\n  if(startIdx < openIdx || endIdx > closeIdx) return {ok:false,msg:'La livraison sort des heures permises pour cette journée.'};\n  if(isZoneBlackedOut(newZone, newDate)) return {ok:false,msg:'Cette zone est bloquée pour la date sélectionnée.'};\n  const conflict = deliveries.find(x =>\n    x.id !== del.id &&\n    x.zone === newZone &&\n    x.date === newDate &&\n    x.status === 'approved' &&\n    overlap(newStart, endTime, x.timeStart||x.time, x.timeEnd||x.time)\n  );\n  if(conflict) return {ok:false,msg:'Conflit avec '+conflict.company+' ('+(conflict.timeStart||conflict.time)+' – '+(conflict.timeEnd||conflict.time)+').'};\n  return {ok:true, endTime};\n}\nfunction getCalendarDropTarget(clientX, clientY){\n  const cols = Array.from(document.querySelectorAll('#week-grid .wg-day-col'));\n  const col = cols.find(c => {\n    const r = c.getBoundingClientRect();\n    return clientX >= r.left && clientX <= r.right && clientY >= r.top && clientY <= r.bottom;\n  });\n  if(!col) return null;\n  const rect = col.getBoundingClientRect();\n  const SLOT_H = 34;\n  const rawIdx = Math.floor((clientY - rect.top) / SLOT_H);\n  const idx = Math.max(0, Math.min(TIME_SLOTS.length - 1, rawIdx));\n  return { date: col.dataset.date, start: TIME_SLOTS[idx], slotIndex: idx, col };\n}\nfunction clearCalendarDropPreview(){\n  if(_calendarDrag.hoveredCol){\n    _calendarDrag.hoveredCol.classList.remove('drag-col-active','invalid');\n  }\n  if(_calendarDrag.hoveredSlotEl && _calendarDrag.hoveredSlotEl.parentNode){\n    _calendarDrag.hoveredSlotEl.parentNode.removeChild(_calendarDrag.hoveredSlotEl);\n  }\n  if(_calendarDrag.hoveredTimeEl){\n    _calendarDrag.hoveredTimeEl.classList.remove('drag-time-active','invalid');\n  }\n  if(_calendarDrag.tooltip && _calendarDrag.tooltip.parentNode){\n    _calendarDrag.tooltip.parentNode.removeChild(_calendarDrag.tooltip);\n  }\n  _calendarDrag.hoveredCol = null;\n  _calendarDrag.hoveredSlotEl = null;\n  _calendarDrag.hoveredTimeEl = null;\n  _calendarDrag.tooltip = null;\n}\nfunction ensureDragTooltip(){\n  if(_calendarDrag.tooltip) return _calendarDrag.tooltip;\n  const tip = document.createElement('div');\n  tip.className = 'drag-cursor-tooltip';\n  tip.innerHTML = '<div class=\"tt-main\"><\u002Fdiv><div class=\"tt-sub\"><\u002Fdiv>';\n  document.body.appendChild(tip);\n  _calendarDrag.tooltip = tip;\n  return tip;\n}\nfunction updateCalendarDropPreview(target, clientX, clientY){\n  if(!target || !_calendarDrag.deliveryId){\n    clearCalendarDropPreview();\n    return;\n  }\n  const del = deliveries.find(x => x.id === _calendarDrag.deliveryId);\n  if(!del){\n    clearCalendarDropPreview();\n    return;\n  }\n  const result = validateCalendarMove(del, target.date, target.start, del.zone);\n  const endTime = result.endTime || endTimeForStart(del, target.start) || '';\n  const isValid = !!result.ok;\n  if(_calendarDrag.hoveredCol && _calendarDrag.hoveredCol !== target.col) clearCalendarDropPreview();\n\n  target.col.classList.add('drag-col-active');\n  target.col.classList.toggle('invalid', !isValid);\n  _calendarDrag.hoveredCol = target.col;\n\n  const SLOT_H = 34;\n  const durationSlots = Math.max(1, _calendarDrag.durationSlots || 1);\n  const previewHeight = Math.max((durationSlots * SLOT_H) - 4, 28);\n  const previewTop = target.slotIndex * SLOT_H + 2;\n  let preview = _calendarDrag.hoveredSlotEl;\n  if(!preview || preview.parentNode !== target.col){\n    if(preview && preview.parentNode) preview.parentNode.removeChild(preview);\n    preview = document.createElement('div');\n    preview.className = 'drag-slot-preview';\n    target.col.appendChild(preview);\n    _calendarDrag.hoveredSlotEl = preview;\n  }\n  preview.classList.toggle('invalid', !isValid);\n  preview.style.top = previewTop + 'px';\n  preview.style.height = previewHeight + 'px';\n  preview.innerHTML = '<span class=\"drag-slot-label\">' + target.start + (endTime ? ' – ' + endTime : '') + '<\u002Fspan>';\n\n  if(_calendarDrag.hoveredTimeEl){\n    _calendarDrag.hoveredTimeEl.classList.remove('drag-time-active','invalid');\n  }\n  const timeEls = Array.from(document.querySelectorAll('#week-grid .wg-time-col .wg-t'));\n  const timeEl = timeEls[target.slotIndex];\n  if(timeEl){\n    timeEl.classList.add('drag-time-active');\n    timeEl.classList.toggle('invalid', !isValid);\n    _calendarDrag.hoveredTimeEl = timeEl;\n  }\n\n  const tip = ensureDragTooltip();\n  tip.classList.toggle('invalid', !isValid);\n  tip.classList.toggle('valid', isValid);\n  tip.querySelector('.tt-main').textContent = fmtDate(target.date) + ' · ' + target.start + (endTime ? ' – ' + endTime : '');\n  tip.querySelector('.tt-sub').textContent = isValid ? 'Déposez pour ouvrir la confirmation' : result.msg;\n  if(typeof clientX === 'number' && typeof clientY === 'number'){\n    tip.style.left = clientX + 'px';\n    tip.style.top = clientY + 'px';\n  }\n}\nfunction startCalendarDrag(e, id, el){\n  if(!isAdmin() || e.button !== 0) return;\n  const del = deliveries.find(x => x.id === id);\n  if(!del || del.status === 'cancelled' || del.status === 'rejected') return;\n  const sx = e.clientX, sy = e.clientY;\n  const baseRect = el.getBoundingClientRect();\n  const ox = e.clientX - baseRect.left;\n  const oy = e.clientY - baseRect.top;\n  let started = false;\n  const mv = (ev) => {\n    const dist = Math.hypot(ev.clientX - sx, ev.clientY - sy);\n    if(!started && dist < 5) return;\n    if(!started){\n      started = true;\n      _calendarDrag.active = true;\n      _calendarDrag.deliveryId = id;\n      _calendarDrag.durationSlots = getDeliveryDurationSlots(del);\n      _calendarDrag.ghost = el.cloneNode(true);\n      _calendarDrag.ghost.style.position = 'fixed';\n      _calendarDrag.ghost.style.left = (ev.clientX - ox) + 'px';\n      _calendarDrag.ghost.style.top = (ev.clientY - oy) + 'px';\n      _calendarDrag.ghost.style.width = baseRect.width + 'px';\n      _calendarDrag.ghost.style.height = baseRect.height + 'px';\n      _calendarDrag.ghost.style.pointerEvents = 'none';\n      _calendarDrag.ghost.style.opacity = '0.92';\n      _calendarDrag.ghost.style.zIndex = '1200';\n      _calendarDrag.ghost.style.boxShadow = '0 10px 30px rgba(0,0,0,.28)';\n      _calendarDrag.ghost.style.transform = 'rotate(2deg)';\n      document.body.appendChild(_calendarDrag.ghost);\n      el.style.opacity = '0.35';\n    }\n    if(_calendarDrag.ghost){\n      _calendarDrag.ghost.style.left = (ev.clientX - ox) + 'px';\n      _calendarDrag.ghost.style.top = (ev.clientY - oy) + 'px';\n    }\n    updateCalendarDropPreview(getCalendarDropTarget(ev.clientX, ev.clientY), ev.clientX, ev.clientY);\n  };\n  const up = (ev) => {\n    document.removeEventListener('mousemove', mv);\n    document.removeEventListener('mouseup', up);\n    el.style.opacity = '';\n    const target = started ? getCalendarDropTarget(ev.clientX, ev.clientY) : null;\n    if(_calendarDrag.ghost && _calendarDrag.ghost.parentNode) _calendarDrag.ghost.parentNode.removeChild(_calendarDrag.ghost);\n    _calendarDrag.ghost = null;\n    _calendarDrag.active = false;\n    _calendarDrag.deliveryId = null;\n    _calendarDrag.durationSlots = 1;\n    clearCalendarDropPreview();\n    if(started){\n      _suppressCalendarClickUntil = Date.now() + 350;\n      if(target) openRescheduleDropModal(id, target.date, target.start);\n    }\n  };\n  document.addEventListener('mousemove', mv);\n  document.addEventListener('mouseup', up);\n}\nfunction openRescheduleDropModal(id, newDate, newStart){\n  const del = deliveries.find(x => x.id === id);\n  if(!del) return;\n  pendingReschedule = { id, date: newDate, start: newStart, zone: del.zone };\n  g('rs-company').value = del.company;\n  g('rs-date').value = fmtDate(newDate);\n  g('rs-start').value = newStart;\n  const zoneSel = g('rs-zone');\n  zoneSel.innerHTML = zones.map(z => '<option value=\"'+z.id+'\">'+z.name+'<\u002Foption>').join('');\n  zoneSel.value = del.zone;\n  updateReschedulePreview();\n  g('modal-reschedule').classList.add('open');\n}\nfunction updateReschedulePreview(){\n  if(!pendingReschedule) return;\n  const del = deliveries.find(x => x.id === pendingReschedule.id);\n  if(!del) return;\n  pendingReschedule.zone = g('rs-zone').value;\n  const result = validateCalendarMove(del, pendingReschedule.date, pendingReschedule.start, pendingReschedule.zone);\n  const errEl = g('rs-err');\n  const saveBtn = g('rs-save-btn');\n  g('rs-end').value = result.endTime || endTimeForStart(del, pendingReschedule.start) || '—';\n  const oldZone = zones.find(z => z.id === del.zone)?.name || del.zone;\n  const newZone = zones.find(z => z.id === pendingReschedule.zone)?.name || pendingReschedule.zone;\n  g('rs-summary').innerHTML = '<strong>Avant :<\u002Fstrong> '+fmtDate(del.date)+' · '+(del.timeStart||del.time)+' – ' tart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');\n  const strong = el.querySelector('strong');\n  if(strong) strong.textContent = time;\n  el.title = now.toLocaleDateString('fr-CA', { weekday:'long', day:'numeric', month:'long', year:'numeric' }) + ' · ' + time;\n}\n\nfunction currentTimeMarker(SLOT_H, totalH){\n  if(!TIME_SLOTS.length) return null;\n  const now = new Date();\n  const startMin = timeToMinutes(TIME_SLOTS[0]);\n  if(startMin === null) return null;\n  const nowMin = now.getHours() * 60 + now.getMinutes() + (now.getSeconds() / 60);\n  const endMin = startMin + (TIME_SLOTS.length * 30);\n  if(nowMin < startMin || nowMin > endMin) return null;\n  const top = ((nowMin - startMin) / 30) * SLOT_H;\n  const label = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');\n  return { top: Math.max(0, Math.min(totalH, top)), label };\n}\nfunction currentTimeLineHtml(dateStr, SLOT_H, totalH){\n  if(dateStr !== dk(new Date())) return '';\n  const m = currentTimeMarker(SLOT_H, totalH);\n  if(!m) return '';\n  return '<div class=\"current-time-line\" aria-hidden=\"true\" data-label=\"'+m.label+'\" style=\"top:'+m.top+'px;\"><\u002Fdiv>';\n}\nfunction currentTimeChipHtml(visibleDays, SLOT_H, totalH){\n  if(!visibleDays.some(d => dk(d) === dk(new Date()))) return '';\n  const m = currentTimeMarker(SLOT_H, totalH);\n  if(!m) return '';\n  return '<div class=\"current-time-chip\" aria-hidden=\"true\" style=\"top:'+m.top+'px;\">'+m.label+'<\u002Fdiv>';\n}\nfunction startCurrentTimeTicker(){\n  if(window._currentTimeTicker) clearInterval(window._currentTimeTicker);\n  window._currentTimeTicker = setInterval(() => {\n    const view = g('view-deliveries');\n    if(view && view.classList.contains('active')) renderWeekCalendar();\n  }, 30000);\n}\n\nfunction renderWeekCalendar(){\n  const allDays=Array.from({length:7},(_,i)=>addDays(weekStart,i)),tod=today();\n  const workWeekDays = allDays.slice(0,5);\n  syncMobDayIndex();\n  con ridLines+='<div class=\"wg-c '+(half?'half':'')+'\" style=\"position:absolute;left:0;right:0;top:'+(slotIndex(t)*SLOT_H)+'px;height:'+SLOT_H+'px;\" '+cellAction+'=\"quickBook(\\''+ds+'\\',\\''+t+'\\')\"><\u002Fdiv>';\n    });\n\n    // Sort and assign side-by-side columns\n    const sorted=[...dayDels].sort((a,b)=>slotIndex(a.timeStart||a.time)-slotIndex(b.timeStart||b.time));\n    const colEnds=[];\n    const layout=sorted.map(del=>{\n      const si=slotIndex(del.timeStart||del.time);\n      const te=del.timeEnd;\n      const ei=te&&slotIndex(te)>si?slotIndex(te):si+1;\n      let col=colEnds.findIndex(e=>e<=si);\n      if(col===-1)col=colEnds.length;\n      colEnds[col]=ei;\n      return{del,col,si,ei};\n    });\n    // Column count must be shared across the whole connected cluster of\n    // overlapping deliveries — per-block counts made widths disagree and blocks overlap.\n    const parent=layout.map((_,i)=>i);\n    const find=i=>parent[i]===i?i:(parent[i]=find(parent[i]));\n    for(let i=0;i<layout.length;i++)for(let j=i+1;j<layout.length;j++){\n      if(layout[i].si<layout[j].ei&&layout[j].si<layout[i].ei) parent[find(i)]=find(j);\n    }\n    const clusterCols={};\n    layout.forEach((it,i)=>{const r=find(i);clusterCols[r]=Math.max(clusterCols[r]||0,it.col+1);});\n    const blockInfos=layout.map((it,i)=>({...it,totalCols:clusterCols[find(i)]}));\n\n    // Render blocks\n    let blocks='';\n    blockInfos.forEach(({del,col,si,ei,totalCols})=>{\n      const z=zones.find(z=>z.id===del.zone),appr=del.status==='approved';\n      const top=si*SLOT_H+2;\n      const height=Math.max((ei-si)*SLOT_H-4,24);\n      const pct=100/totalCols;\n      const zoneColor = z ? z.color : '#C9A96E';\n      const accentColor = appr ? zoneColor : '#E8622A';\n      const fillColor = appr ? rgbaFromHex(zoneColor, 0.12) : 'rgba(232,98,42,0.10)';\n      const borderColor = appr ? rgbaFromHex(zoneColor, 0.36) : 'rgba(232,98,42,0.34)';\n      const sty='--db-accent:'+accentColor+';background
